    <script>
        var node_sql_map = {"cte_cummdemand_final": "SELECT\n  *\n  EXCLUDE (\"NextToNext_DlvryEvdyDmndQtyPBI\", \"NextToNext_DlvryPrmoDmndQtyPBI\", \"NextToNext_DlvryFcstDmndQtyPBI\"),\n  IFF(\n    \"rnk\" IS NULL,\n    NULL,\n    RANK() OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY CASE WHEN \"rnk\" IS NULL THEN 0 ELSE \"rnk\" END DESC\n    )\n  ) AS \"maxrnk\",\n  CASE WHEN \"maxrnk\" > 1 THEN \"NextToNext_DlvryEvdyDmndQtyPBI\" ELSE 0 END AS \"NextToNext_DlvryEvdyDmndQtyPBI\",\n  CASE WHEN \"maxrnk\" > 1 THEN \"NextToNext_DlvryPrmoDmndQtyPBI\" ELSE 0 END AS \"NextToNext_DlvryPrmoDmndQtyPBI\",\n  CASE WHEN \"maxrnk\" > 1 THEN \"NextToNext_DlvryFcstDmndQtyPBI\" ELSE 0 END AS \"NextToNext_DlvryFcstDmndQtyPBI\"\nFROM (\n  SELECT\n    a.\"CustomerNumber\",\n    a.\"MaterialNumber\",\n    a.\"BusDate\",\n    a.\"OrderDate\",\n    a.\"DeliveryDate\",\n    a.\"InvoiceDate\",\n    a.\"EveryDay_Demand_Qty\",\n    a.\"Promo_Demand_Qty\",\n    a.\"ForecastDemandQty\",\n    a.\"NextDeliveryDate\",\n    a.\"NextToNextDeliveryDate\",\n    COALESCE((\n      b.\"EveryDay_Demand_Qty\"\n    ), 0) AS \"NextToNext_DlvryEvdyDmndQty\",\n    COALESCE((\n      b.\"Promo_Demand_Qty\"\n    ), 0) AS \"NextToNext_DlvryPrmoDmndQty\",\n    COALESCE((\n      b.\"ForecastDemandQty\"\n    ), 0) AS \"NextToNext_DlvryFcstDmndQty\",\n    COALESCE((\n      c.\"EveryDay_Demand_Qty\"\n    ), 0) AS \"NextToNext_DlvryEvdyDmndQtyPBI\",\n    COALESCE((\n      c.\"Promo_Demand_Qty\"\n    ), 0) AS \"NextToNext_DlvryPrmoDmndQtyPBI\",\n    COALESCE((\n      c.\"ForecastDemandQty\"\n    ), 0) AS \"NextToNext_DlvryFcstDmndQtyPBI\",\n    CASE\n      WHEN NOT a.\"DeliveryDate\" IS NULL\n      AND a.\"OrderDate\" IS NULL\n      AND a.\"DeliveryDate\" > TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      THEN a.\"DeliveryDate\"\n      ELSE NULL\n    END AS \"DeliveryDateRnk\",\n    IFF(\n      \"DeliveryDateRnk\" IS NULL,\n      NULL,\n      ROW_NUMBER() OVER (PARTITION BY a.\"CustomerNumber\", a.\"MaterialNumber\" ORDER BY \"DeliveryDateRnk\")\n    ) AS \"rnk\"\n  /*     ,iff(\"rnk\" IS NULL, NULL, RANK() OVER ( */ /* PARTITION BY a.\"CustomerNumber\" */ /* ,a.\"MaterialNumber\" ORDER BY CASE WHEN \"rnk\" IS NULL THEN 0 ELSE \"rnk\" END  desc */ /* )) AS \"maxrnk\"        */\n  FROM \"Cte_CummDemand_3\" AS a\n  LEFT JOIN \"Cte_CummDemand_5_CurrentDates\" AS b\n    ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n    AND a.\"rnk_2\" = b.\"rnk1\"\n  JOIN \"Cte_CummDemand_4\" AS c\n    ON a.\"CustomerNumber\" = c.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = c.\"MaterialNumber\"\n    AND a.\"rnk1\" = c.\"rnk1\"\n)", "cte_cummdemand_5_currentdates": "/* This CTE calculates cumulative sums of daily, promotional, and forecast demand quantities by customer, material, and delivery rank, enabling analysis of total demand over time. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\",\n  SUM(\"EveryDay_Demand_Qty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"EveryDay_Demand_Qty\",\n  SUM(\"Promo_Demand_Qty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"Promo_Demand_Qty\",\n  SUM(\"ForecastDemandQty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"ForecastDemandQty\"\nFROM \"Cte_CummDemand_4_CurrentDates\" AS a", "cte_cummdemand_3": "/* This CTE assigns a dense rank to each entry for customer and material combinations based on the new delivery date, allowing for easy identification of unique delivery sequences. */\nSELECT\n  *,\n  DENSE_RANK() OVER (\n    PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n    ORDER BY CASE\n      WHEN \"BusDate\" >= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      THEN \"rnk1\"\n    END\n  ) AS \"rnk_2\"\nFROM (\n  SELECT\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    \"BusDate\",\n    \"OrderDate\",\n    \"DeliveryDate\",\n    \"InvoiceDate\",\n    \"EveryDay_Demand_Qty\",\n    \"Promo_Demand_Qty\",\n    \"ForecastDemandQty\",\n    \"NextDeliveryDate\",\n    \"NextToNextDeliveryDate\",\n    \"NewDeliveryDate\", /* * */\n    DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"NewDeliveryDate\") AS \"rnk1\"\n  FROM \"Cte_CummDemand_2\"\n)", "cte_cummdemand_4": "/* This CTE aggregates daily and promotional demand quantities along with forecast demand by customer, material, and rank, providing a summarized view of demand metrics across different delivery ranks. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\",\n  SUM(\"EveryDay_Demand_Qty\") AS \"EveryDay_Demand_Qty\",\n  SUM(\"Promo_Demand_Qty\") AS \"Promo_Demand_Qty\",\n  SUM(\"ForecastDemandQty\") AS \"ForecastDemandQty\"\nFROM \"Cte_CummDemand_3\" AS a\nGROUP BY\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\"", "cte_cummdemand_2": "/* This CTE adds a new delivery date for each customer and material combination by capturing the last available delivery date, replacing any nulls with a default date of '1900-01-01'. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"ForecastDemandQty\",\n  \"NextDeliveryDate\",\n  \"NextToNextDeliveryDate\", /* * */\n  COALESCE(\n    LAST_VALUE(\"DeliveryDate\") IGNORE NULLS OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY \"BusDate\" ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ),\n    '1900-01-01'\n  ) AS \"NewDeliveryDate\"\nFROM \"Cte_CummDemand_1\"", "cte_cummdemand_1": "/* This CTE extracts cumulative demand data, including daily and promotional quantities, along with forecasted demand and the next two delivery dates for each customer and material combination. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  COALESCE(\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n  COALESCE(\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n  COALESCE(\"Forecast_Demand_Qty\", 0) AS \"ForecastDemandQty\",\n  LEAD(\"DeliveryDate\", 1) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\") AS \"NextDeliveryDate\",\n  LEAD(\"DeliveryDate\", 2) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\") AS \"NextToNextDeliveryDate\"\nFROM \"final_data\"", "orderpredicted": "SELECT DISTINCT\n  \"BusDate\",\n  MO.\"CustomerNumber\",\n  \"MaterialNumber\",\n  COALESCE(\"EverydayDemandQty\", 0) AS \"EveryDay_Demand_Qty\",\n  COALESCE(\"PromoLiftQty\", 0) AS \"Promo_Demand_Qty\",\n  COALESCE(\"ForecastedSalesQty\", 0) AS \"Forecast_Demand_Qty\"\nFROM \"&{VAR_SNOWDB_RETAILER}\".FORECAST.\"Fact_RetailerShpmnt_OrderPredicted_ML_Outbound\" AS MO\nJOIN \"CTE_StoreList\" AS PO\n  ON LTRIM(MO.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", '0')", "cte_storelist": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"NationalChainName\",\n  \"CustomerName\"\nFROM \"&{VAR_SNOWDB_MD}\".TECHNICAL.\"V_PerfOrderShpmnt_StoreList\"\nWHERE\n  NOT \"DSD_CustomerNumber\" IS NULL\n  AND \"NationalChainID\" IN (\n    '0001001518',\n    '0001001836',\n    '0001000741',\n    '0001000410',\n    '0001015614',\n    '0001016104',\n    '0001016106',\n    '0001014910',\n    '0001001628',\n    '0001015610',\n    '0001013185',\n    '0001017095'\n  )\n  AND \"PBIBranch\" = 1 /* commented on 23rd jan to move all stores in UDS */", "cte_agg_last60dayorderqty": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  SUM(CASE WHEN \"ForecastDemandQty\" > 0 THEN 1 ELSE 0 END) AS \"non_zero_forecast_days\",\n  COUNT(DISTINCT \"DeliveryDate\") AS \"Delivery_Cnt_Last60\",\n  CASE\n    WHEN \"non_zero_forecast_days\" < 80\n    THEN SUM(\"Ordered_CaseQty\")\n    ELSE SUM(\"ForecastDemandQty\")\n  END AS \"ForecastDemandQty_Agg_Last60\",\n  SUM(\"Ordered_CaseQty\") AS \"Ordered_CaseQty_Agg_Last60\",\n  SUM(\"Invoiced_CaseQty\") AS \"Invoiced_CaseQty_Agg_Last60\"\n/* sum(\"ForecastDemandQty\") as \"ForecastDemandQty_Agg_Last60\", */\nFROM \"Cte_CummDemand_final_agg_1\"\nWHERE\n  \"BusDate\" BETWEEN TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 AND TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) /* 60 */\nGROUP BY ALL", "cte_cummdemand_final_agg_1": "SELECT\n  *,\n  IFF(\n    \"rnk1\" IS NULL,\n    NULL,\n    DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"rnk1\")\n  ) AS \"OrderRnk\",\n  CASE WHEN \"OrderRnk\" = 1 THEN \"OrderDate\" ELSE NULL END AS \"LastOrderDate\",\n  CASE WHEN NOT \"OrderRnk\" IS NULL THEN \"OrderRnk\" END AS \"LastOrderRnk\",\n  IFF(\n    \"rnk2\" IS NULL,\n    NULL,\n    DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"rnk2\")\n  ) AS \"InvoiceRnk\",\n  CASE WHEN \"InvoiceRnk\" = 1 THEN \"InvoiceDate\" ELSE NULL END AS \"LastInvoiceDate\",\n  CASE WHEN NOT \"InvoiceRnk\" IS NULL THEN \"InvoiceRnk\" END AS \"LastInvoiceRnk\"\nFROM (\n  SELECT\n    *,\n    CASE\n      WHEN \"OrderDate\" <= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \"OrderDate\" IS NULL\n      THEN IFF(\n        \"OrderDate\" IS NULL,\n        NULL,\n        DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"OrderDate\" DESC)\n      )\n      ELSE NULL\n    END AS \"rnk1\",\n    CASE\n      WHEN \"InvoiceDate\" <= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \"InvoiceDate\" IS NULL\n      THEN IFF(\n        \"InvoiceDate\" IS NULL,\n        NULL,\n        DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"InvoiceDate\" DESC)\n      )\n      ELSE NULL\n    END AS \"rnk2\"\n  FROM (\n    SELECT DISTINCT\n      a.*,\n      b.\"Ordered_CaseQty\",\n      b.\"Intransit_CaseQty\",\n      b.\"Invoiced_CaseQty\",\n      CASE\n        WHEN a.\"BusDate\" <= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n        AND NOT a.\"DeliveryDate\" IS NULL\n        THEN a.\"NextToNext_DlvryFcstDmndQtyPBI\"\n        ELSE NULL\n      END AS \"NextToNext_DlvryFcstDmndQtyPBI_sum\"\n    FROM \"Cte_CummDemand_final\" AS a\n    LEFT JOIN \"Inbound_Prep\" AS b\n      ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n      AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n      AND a.\"BusDate\" = b.\"BusDate\"\n  )\n)", "inbound_prep_mod": "SELECT DISTINCT\n  SP.\"CustomerNumber\",\n  SP.\"MaterialNumber\",\n  SP.\"BusDate\",\n  SP.\"OrderDate\",\n  SP.\"DeliveryDate\",\n  SP.\"InvoiceDate\",\n  SUM(COALESCE(\"Intransit_CaseQty\", 0)) AS \"Intransit_CaseQty\",\n  SUM(COALESCE(\"Ordered_CaseQty\", 0)) AS \"Ordered_CaseQty\",\n  SUM(COALESCE(\"Delivered_CaseQty\", 0)) AS \"Delivered_CaseQty\",\n  SUM(COALESCE(\"Invoiced_CaseQty\", 0)) AS \"Invoiced_CaseQty\"\nFROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\" AS SP\nINNER JOIN \"CTE_StoreList\" AS UDSS\n  ON LTRIM(SP.\"CustomerNumber\", 0) = LTRIM(UDSS.\"DSD_CustomerNumber\", 0)\nINNER JOIN \"&{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderUDS_CMA\" AS UDS\n  ON LTRIM(SP.\"CustomerNumber\", 0) = LTRIM(UDS.\"CustomerNumber\", 0)\n  AND LTRIM(SP.\"MaterialNumber\", 0) = LTRIM(UDS.\"MaterialNumber\", 0)\nLEFT JOIN \"&{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS DP\n  ON LTRIM(SP.\"MaterialNumber\", 0) = LTRIM(DP.\"SAPMaterialID\", 0)\nLEFT JOIN \"Cte_PB_Bottlers\" AS PB\n  ON LTRIM(SP.\"CustomerNumber\", 0) = PB.\"CustomerNumber\"\n  AND DP.\"TradeMarkID\" = PB.\"TradeMarkID\"\nINNER JOIN (\n  SELECT DISTINCT\n    \"AccountID\"\n  FROM \"&{VAR_SNOWDB_SOLUTIONS}\".commercials.\"V_Dim_Account\"\n  WHERE\n    \"NationalChainName\" = 'ALL OTHER'\n    AND \"ChannelDesc\" = 'INDEPEND CONVENIENCE'\n    AND \"BranchID\" IN ('1080', '1009', '1103', '1225')\n) AS DA /* -Ref #1 */\n  ON LTRIM(SP.\"CustomerNumber\", 0) = LTRIM(DA.\"AccountID\", 0)\nWHERE\n  \"IsPB\" = 1 AND dp.\"TradeMarkID\" = 'G28'\nGROUP BY ALL", "cte_pb_bottlers": "SELECT DISTINCT\n  LTRIM(\"AccountID\", '0') AS \"CustomerNumber\",\n  \"TrademarkID\" AS \"TradeMarkID\",\n  1 AS \"IsPB\"\nFROM \"&{VAR_SNOWDB_SOLUTIONS}\".DSD.\"V_DIM_CUSTTRADEMARKSVC\"", "cte_cummdemand_final_agg_2": "SELECT\n  *,\n  IFF(\n    \"Delivery_Cnt_Last60Day\" = 0 AND NOT \"ForecastDemandQty_Agg_Last60Day\" IS NULL,\n    0,\n    \"ForecastDemandQty_Agg_Last60Day\" / \"Delivery_Cnt_Last60Day\"\n  ) AS \"AvgDemand_60day\",\n  (\n    \"ForecastDemandQty_Agg_LastOrder\" + \"NextToNext_DlvryFcstDmndQtyPBI\"\n  ) AS \"Cumm_Demand\",\n  (\n    \"ForecastDemandQty_Agg_LastOrder\" + \"NextToNext_DlvryFcstDmndQtyPBI\"\n  ) * 1.1 AS \"Cumm_Demand_Buffer\"\nFROM (\n  SELECT DISTINCT\n    a.*,\n    CASE WHEN \"rnk\" = 1 THEN c.\"Last_Ordered_CaseQty\" ELSE NULL END AS \"Last_Ordered_CaseQty\",\n    CASE WHEN \"rnk\" = 1 THEN c.\"Last_Intransit_CaseQty\" ELSE NULL END AS \"Last_Intransit_CaseQty\",\n    COALESCE(CASE WHEN \"rnk\" = 1 THEN c.\"Last_Invoiced_CaseQty\" ELSE NULL END, 0) AS \"Last_Invoiced_CaseQty\",\n    CASE WHEN \"rnk\" = 1 THEN d.\"Last_Ordered_CaseQty_Inv\" ELSE NULL END AS \"Last_Ordered_CaseQty_Inv\",\n    CASE WHEN \"rnk\" = 1 THEN d.\"Last_Intransit_CaseQty_Inv\" ELSE NULL END AS \"Last_Intransit_CaseQty_Inv\",\n    COALESCE(CASE WHEN \"rnk\" = 1 THEN d.\"Last_Invoiced_CaseQty_Inv\" ELSE NULL END, 0) AS \"Last_Invoiced_CaseQty_Inv\",\n    CASE WHEN \"rnk\" = 1 THEN b.\"Delivery_Cnt_Last60\" ELSE NULL END AS \"Delivery_Cnt_Last60Day\", /*  \t\t,CASE */ /* WHEN \"rnk\" = 1 */ /* \tTHEN b.\"Ordered_CaseQty_Agg_Last60\" */ /* ELSE NULL */ /* END AS \"Ordered_CaseQty_Agg_Last60Day\" */\n    CASE WHEN \"rnk\" = 1 THEN b.\"ForecastDemandQty_Agg_Last60\" ELSE NULL END AS \"ForecastDemandQty_Agg_Last60Day\",\n    CASE WHEN \"rnk\" = 1 THEN c.\"ForecastDemandQty_Agg_LastOrder1\" ELSE NULL END AS \"ForecastDemandQty_Agg_LastOrder\"\n  FROM \"Cte_CummDemand_final_agg_1\" AS a\n  LEFT JOIN \"Cte_Agg_Last60DayOrderQty\" AS b\n    ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n  LEFT JOIN \"Cte_Agg_LastOrderQty\" AS c\n    ON a.\"CustomerNumber\" = c.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = c.\"MaterialNumber\"\n  LEFT JOIN \"Cte_Agg_LastInvoiceQty\" AS d\n    ON a.\"CustomerNumber\" = d.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = d.\"MaterialNumber\"\n)", "cte_agg_lastorderqty": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  SUM(CASE WHEN \"LastOrderRnk\" = 1 THEN \"Ordered_CaseQty\" END) AS \"Last_Ordered_CaseQty\",\n  SUM(CASE WHEN \"LastOrderRnk\" = 1 THEN \"Intransit_CaseQty\" END) AS \"Last_Intransit_CaseQty\",\n  SUM(CASE WHEN \"LastOrderRnk\" = 1 THEN \"Invoiced_CaseQty\" END) AS \"Last_Invoiced_CaseQty\",\n  SUM(\"ForecastDemandQty\") AS \"ForecastDemandQty_Agg_LastOrder1\"\nFROM (\n  SELECT\n    *,\n    LAST_VALUE(\"LastOrderRnkBrk\") IGNORE NULLS OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY \"BusDate\" ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ) AS \"LastOrderRnkRpt\"\n  FROM (\n    SELECT DISTINCT\n      a.*\n      EXCLUDE (\"LastOrderRnk\", \"Ordered_CaseQty\", \"Invoiced_CaseQty\", \"Intransit_CaseQty\"),\n      b.\"Ordered_CaseQty\",\n      b.\"Intransit_CaseQty\",\n      b.\"Invoiced_CaseQty\",\n      b.\"LastOrderRnk\",\n      CASE\n        WHEN a.\"BusDate\" = TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) + 1\n        THEN 2\n      END AS \"LastOrderRnkBrk1\",\n      COALESCE(b.\"LastOrderRnk\", \"LastOrderRnkBrk1\") AS \"LastOrderRnkBrk\"\n    FROM \"Cte_CummDemand_final_agg_1\" AS a\n    LEFT JOIN \"Cte_CummDemand_final_agg_1\" AS b\n      ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n      AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n      AND a.\"BusDate\" = b.\"LastOrderDate\"\n  )\n)\nWHERE\n  \"LastOrderRnkRpt\" = 1\nGROUP BY ALL", "cte_agg_lastinvoiceqty": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  SUM(CASE WHEN \"LastInvoiceRnk\" = 1 THEN \"Ordered_CaseQty\" END) AS \"Last_Ordered_CaseQty_Inv\",\n  SUM(CASE WHEN \"LastInvoiceRnk\" = 1 THEN \"Intransit_CaseQty\" END) AS \"Last_Intransit_CaseQty_Inv\",\n  SUM(CASE WHEN \"LastInvoiceRnk\" = 1 THEN \"Invoiced_CaseQty\" END) AS \"Last_Invoiced_CaseQty_Inv\",\n  SUM(\"ForecastDemandQty\") AS \"ForecastDemandQty_Agg_LastInvoice1\"\nFROM (\n  SELECT\n    *,\n    LAST_VALUE(\"LastInvoiceRnkBrk\") IGNORE NULLS OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY \"BusDate\" ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ) AS \"LastInvoiceRnkRpt\"\n  FROM (\n    SELECT DISTINCT\n      a.*\n      EXCLUDE (\"LastInvoiceRnk\", \"Ordered_CaseQty\", \"Invoiced_CaseQty\", \"Intransit_CaseQty\"),\n      b.\"Ordered_CaseQty\",\n      b.\"Intransit_CaseQty\",\n      b.\"Invoiced_CaseQty\",\n      b.\"LastInvoiceRnk\",\n      CASE\n        WHEN a.\"BusDate\" = TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) + 1\n        THEN 2\n      END AS \"LastInvoiceRnkBrk1\",\n      COALESCE(b.\"LastInvoiceRnk\", \"LastInvoiceRnkBrk1\") AS \"LastInvoiceRnkBrk\"\n    FROM \"Cte_CummDemand_final_agg_1\" AS a\n    LEFT JOIN \"Cte_CummDemand_final_agg_1\" AS b\n      ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n      AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n      AND a.\"BusDate\" = b.\"LastInvoiceDate\"\n  )\n)\nWHERE\n  \"LastInvoiceRnkRpt\" = 1\nGROUP BY ALL", "final_data": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"IsMod\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"SalesQty\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  CASE\n    WHEN NOT \"DeliveryDate\" IS NULL\n    AND \"OrderDate\" IS NULL /* Ref #2 */\n    AND \"DeliveryDate\" > TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n    THEN \"DeliveryDate\"\n    ELSE NULL\n  END AS \"DeliveryDateRnk\",\n  IFF(\n    \"DeliveryDateRnk\" IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDateRnk\")\n  ) AS \"rnk\"\nFROM (\n  SELECT DISTINCT\n    IB.\"CustomerNumber\",\n    PO.\"DSD_CustomerNumber\",\n    IB.\"MaterialNumber\",\n    IB.\"BusDate\", /* ,COALESCE(IB.\"OrderDate\", RMD1.\"OrderDate\") AS \"OrderDate\" --Ref #2 */ /* ,COALESCE(IB.\"DeliveryDate\", RMD1.\"DeliveryDate\") AS \"DeliveryDate\" */\n    IB.\"OrderDate\",\n    IB.\"DeliveryDate\",\n    IB.\"InvoiceDate\",\n    IB.\"IsMod\",\n    NULL AS \"OnHandQty\",\n    NULL AS \"Max_ShelfCapacityQty\",\n    NULL AS \"Incremental_Capacity\",\n    NULL AS \"SalesQty\",\n    NULL AS \"SalesAmt\",\n    COALESCE(IB.\"Intransit_CaseQty\", 0) AS \"Intransit_CaseQty\",\n    COALESCE(IB.\"Ordered_CaseQty\", 0) AS \"Ordered_CaseQty\",\n    COALESCE(IB.\"Delivered_CaseQty\", 0) AS \"Delivered_CaseQty\",\n    COALESCE(IB.\"Invoiced_CaseQty\", 0) AS \"Invoiced_CaseQty\",\n    COALESCE(OP.\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n    COALESCE(OP.\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n    COALESCE(OP.\"Forecast_Demand_Qty\", 0) AS \"Forecast_Demand_Qty\",\n    SUM(COALESCE(OP.\"Forecast_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0)) OVER (PARTITION BY IB.\"CustomerNumber\", IB.\"MaterialNumber\" ORDER BY IB.\"BusDate\" DESC) AS \"Next14DaysForecastDemand\"\n  FROM \"Inbound_Prep\" AS IB\n  JOIN \"CTE_StoreList\" AS PO\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", '0')\n  /* LEFT JOIN ( */ /*\tSELECT DISTINCT \"CustomerNumber\" */ /*\t\t,\"DeliveryDate\" */ /*\t\t,\"OrderDate\" --Ref #2 */ /*\tFROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\" */ /*\t) RMD1 ON LTRIM(PO.\"DSD_CustomerNumber\", 0) = LTRIM(RMD1.\"CustomerNumber\", 0) */ /*\tAND IB.\"BusDate\" = RMD1.\"DeliveryDate\" */ /*\tAND RMD1.\"OrderDate\" IS NOT NULL */\n  LEFT JOIN \"Case_Conversion\" AS CC\n    ON LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(CC.\"MaterialNumber\", 0)\n  /* LEFT JOIN \"&{VAR_SNOWDB_RETAILER}\".INVENTORY.\"V_Fact_CustModularPlan_Active\" MP ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(MP.\"CustomerNumber\", '0') */ /* \tAND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(MP.\"MaterialNumber\", '0') */\n  LEFT JOIN \"OrderPredicted\" AS OP\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(OP.\"CustomerNumber\", 0)\n    AND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(OP.\"MaterialNumber\", 0)\n    AND IB.\"BusDate\" = OP.\"BusDate\"\n)\nWHERE\n  \"BusDate\" >= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 /* 60 */", "case_conversion": "SELECT DISTINCT\n  E.\"SAPMaterialID\" AS \"MaterialNumber\",\n  COALESCE(UOM_SU.\"ConvFactorToBase\", UOM_PC.\"ConvFactorToBase\", UOM_EA.\"ConvFactorToBase\", 1) AS \"ConvFactorToBase\"\nFROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS E\nLEFT JOIN \"&{VAR_SNOWDB_MD}\".SAP.\"Dim_AltUnit\" AS UOM_SU\n  ON UOM_SU.MDM_ID = E.MDM_ID AND UOM_SU.\"AltUnitID\" = 'SU'\nLEFT JOIN \"&{VAR_SNOWDB_MD}\".SAP.\"Dim_AltUnit\" AS UOM_PC\n  ON UOM_PC.MDM_ID = E.MDM_ID AND UOM_PC.\"AltUnitID\" = 'PC'\nLEFT JOIN \"&{VAR_SNOWDB_MD}\".SAP.\"Dim_AltUnit\" AS UOM_EA\n  ON UOM_EA.MDM_ID = E.MDM_ID AND UOM_EA.\"AltUnitID\" = 'EA'\nWHERE\n  NOT E.\"SAPMaterialID\" IS NULL", "inbound_prep": "SELECT\n  *,\n  1 AS \"IsMod\"\nFROM \"Inbound_Prep_MOD\"\nUNION\nSELECT\n  *,\n  0 AS \"IsMod\"\nFROM \"Inbound_Prep_NONMOD\"\nWHERE\n  \"MaterialNumber\" <> ALL (\n    SELECT DISTINCT\n      \"MaterialNumber\"\n    FROM \"Inbound_Prep_MOD\"\n  )", "prevwknbr": "SELECT\n  \"DayDate\",\n  \"WeekID_ISO\",\n  DENSE_RANK() OVER (ORDER BY \"WeekID_ISO\" DESC) AS \"WeekRnk\"\nFROM \"&{VAR_SNOWDB_MD}\".CALENDAR.\"V_CalDay\"\nWHERE\n  \"DayDate\" BETWEEN TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 30 AND TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))", "cte_cummdemand_4_currentdates": "/* This CTE aggregates daily and promotional demand quantities along with forecast demand by customer, material, and rank, providing a summarized view of demand metrics across different delivery ranks. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\",\n  SUM(\"EveryDay_Demand_Qty\") AS \"EveryDay_Demand_Qty\",\n  SUM(\"Promo_Demand_Qty\") AS \"Promo_Demand_Qty\",\n  SUM(\"ForecastDemandQty\") AS \"ForecastDemandQty\"\nFROM \"Cte_CummDemand_3_CurrentDates\" AS a\nGROUP BY\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\"", "cte_cummdemand_3_currentdates": "/* This CTE assigns a dense rank to each entry for customer and material combinations based on the new delivery date, allowing for easy identification of unique delivery sequences. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"ForecastDemandQty\",\n  \"NextDeliveryDate\",\n  \"NextToNextDeliveryDate\",\n  \"NewDeliveryDate\", /* * */\n  DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"NewDeliveryDate\") AS \"rnk1\"\nFROM \"Cte_CummDemand_2_CurrentDate\"", "cte_tier1_stores": "SELECT DISTINCT\n  \"AccountNumber\" AS \"CustomerNumber\",\n  SL.\"DSD_CustomerNumber\",\n  SL.\"NationalChainName\",\n  \"PromoPlanName\"\nFROM \"&{VAR_SNOWDB_DATA_PRODUCT}\".DSD_EFFECTIVENESS.\"V_Dim_CustomerMaster\" AS CM\nINNER JOIN \"CTE_StoreList\" AS SL\n  ON CM.\"AccountNumber\" = SL.\"DSD_CustomerNumber\"\nWHERE\n  \"PromoPlanName\" LIKE '25 T1%'", "cte_cummdemand_2_currentdate": "/* This CTE adds a new delivery date for each customer and material combination by capturing the last available delivery date, replacing any nulls with a default date of '1900-01-01'. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"ForecastDemandQty\",\n  \"NextDeliveryDate\",\n  \"NextToNextDeliveryDate\", /* * */\n  COALESCE(\n    LAST_VALUE(\"DeliveryDate\") IGNORE NULLS OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY \"BusDate\" ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ),\n    '1900-01-01'\n  ) AS \"NewDeliveryDate\"\nFROM \"Cte_CummDemand_1_CurrentDate\"", "cte_cummdemand_final_agg": "SELECT\n  a.*,\n  CASE\n    WHEN \"Last_Intransit_CaseQty\" > 0\n    THEN \"Last_Ordered_CaseQty_Inv\" - \"Last_Invoiced_CaseQty_Inv\"\n    WHEN \"Last_Intransit_CaseQty\" = 0\n    THEN \"Last_Ordered_CaseQty\" - \"Last_Invoiced_CaseQty\"\n    ELSE 0\n  END AS \"LastOrderedCutsCaseQty\",\n  CASE WHEN \"rnk\" = 1 AND NOT b.\"MaterialNumber\" IS NULL THEN 1 ELSE NULL END AS \"ImpSuggestedOrderQty_1\",\n  CASE\n    WHEN \"rnk\" = 1\n    AND \"AvgDemand_60day\" < 1\n    AND COALESCE(\"Last_Invoiced_CaseQty_Inv\", 0) > /* ROUND(\"NextToNext_DlvryFcstDmndQty\") */ \"Cumm_Demand_Buffer\"\n    THEN 0\n    WHEN \"rnk\" = 1\n    AND \"AvgDemand_60day\" < 1\n    AND COALESCE(\"Last_Invoiced_CaseQty_Inv\", 0) <= /* ROUND(\"NextToNext_DlvryFcstDmndQty\") */ \"Cumm_Demand_Buffer\"\n    THEN ROUND(\"NextToNext_DlvryFcstDmndQtyPBI\")\n    WHEN \"rnk\" = 1 AND \"AvgDemand_60day\" >= 1\n    THEN CEIL(\"NextToNext_DlvryFcstDmndQtyPBI\")\n    WHEN \"rnk\" > 1\n    THEN ROUND(\"NextToNext_DlvryFcstDmndQtyPBI\")\n    ELSE NULL\n  END AS \"ImpSuggestedOrderQty_2\",\n  COALESCE(\"ImpSuggestedOrderQty_1\", \"ImpSuggestedOrderQty_2\" + \"LastOrderedCutsCaseQty\") AS \"ImpSuggestedOrderQty\"\nFROM \"Cte_CummDemand_final_agg_2\" AS a\nLEFT JOIN \"NonMod_Not90DayDelivered\" AS b\n  ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n  AND a.\"MaterialNumber\" = b.\"MaterialNumber\"", "nonmod_not90daydelivered": "SELECT\n  *\nFROM (\n  SELECT DISTINCT\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    MAX(\"OrderDate\") AS \"Max_OrderDate\"\n  FROM \"Inbound_Prep_NONMOD\"\n  GROUP BY ALL\n)\nWHERE\n  \"Max_OrderDate\" < TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 /* 60 */", "orderrecommqty": "SELECT\n  *,\n  IFF(\n    \"rnk_1\" IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk_1\")\n  ) AS \"DeliveryRnk\"\nFROM (\n  SELECT\n    *,\n    CASE\n      WHEN \"DeliveryDate\" <= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \"DeliveryDate\" IS NULL\n      AND NOT \"OrderDate\" IS NULL\n      THEN IFF(\n        \"DeliveryDate\" IS NULL,\n        NULL,\n        ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\" DESC)\n      )\n      ELSE NULL\n    END AS \"rnk_1\"\n  FROM (\n    SELECT DISTINCT\n      a.\"CustomerNumber\",\n      a.\"DSD_CustomerNumber\",\n      a.\"MaterialNumber\",\n      a.\"BusDate\",\n      a.\"OrderDate\",\n      a.\"DeliveryDate\",\n      a.\"SuggestedOrderQty\" AS \"RecommendedOrderQty\",\n      a.\"Ordered_CaseQty\" AS \"ActualOrderQty\",\n      (\n        a.\"Ordered_CaseQty\" - a.\"Invoiced_CaseQty\"\n      ) AS \"WHSE_Invoice_Cut\"\n    FROM \"&{VAR_SNOWDB_DATA_PRODUCT}\".RETAILER_INSIGHTS.\"Fact_CustItemOrderUDSHistory\" AS a\n    JOIN \"CTE_StoreList\" AS PO\n      ON LTRIM(a.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", 0)\n    /* added to exclude voided orders */\n    WHERE\n      NOT EXISTS(\n        SELECT\n          1\n        FROM \"&{VAR_SNOWDB_SALES}\".DELIVERY.\"V_Fact_DSD_Delivery\" AS dd\n        WHERE\n          LTRIM(a.\"CustomerNumber\", '0') = LTRIM(dd.\"CustomerNumber\", '0')\n          AND LTRIM(a.\"MaterialNumber\", '0') = LTRIM(dd.\"ItemNumber\", '0')\n          AND a.\"OrderDate\" = dd.\"OrderDate\"\n          AND a.\"DeliveryDate\" = dd.\"DeliveryDate\"\n          AND COALESCE(dd.\"OrderStatus\", 0) IN (-1, -2, 99)\n      )\n  )\n)", "cte_cummdemand_1_currentdate": "/* This CTE extracts cumulative demand data, including daily and promotional quantities, along with forecasted demand and the next two delivery dates for each customer and material combination. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  COALESCE(\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n  COALESCE(\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n  COALESCE(\"Forecast_Demand_Qty\", 0) AS \"ForecastDemandQty\",\n  LEAD(\"DeliveryDate\", 1) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\") AS \"NextDeliveryDate\",\n  LEAD(\"DeliveryDate\", 2) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\") AS \"NextToNextDeliveryDate\"\nFROM \"final_data\"\nWHERE\n  \"BusDate\" >= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))", "inbound_prep_nonmod": "SELECT DISTINCT\n  SP.\"CustomerNumber\",\n  SP.\"MaterialNumber\",\n  SP.\"BusDate\",\n  SP.\"OrderDate\",\n  SP.\"DeliveryDate\",\n  SP.\"InvoiceDate\",\n  SUM(COALESCE(\"Intransit_CaseQty\", 0)) AS \"Intransit_CaseQty\",\n  SUM(COALESCE(\"Ordered_CaseQty\", 0)) AS \"Ordered_CaseQty\",\n  SUM(COALESCE(\"Delivered_CaseQty\", 0)) AS \"Delivered_CaseQty\",\n  SUM(COALESCE(\"Invoiced_CaseQty\", 0)) AS \"Invoiced_CaseQty\"\nFROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\" AS SP\nINNER JOIN \"CTE_StoreList\" AS UDS\n  ON LTRIM(SP.\"CustomerNumber\", 0) = LTRIM(UDS.\"DSD_CustomerNumber\", 0)\nLEFT JOIN \"&{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS DP\n  ON LTRIM(SP.\"MaterialNumber\", 0) = LTRIM(DP.\"SAPMaterialID\", 0)\nLEFT JOIN \"Cte_PB_Bottlers\" AS PB\n  ON LTRIM(UDS.\"CustomerNumber\", 0) = PB.\"CustomerNumber\"\n  AND DP.\"TradeMarkID\" = PB.\"TradeMarkID\"\nWHERE\n  \"IsPB\" = 1\n  AND (SP.\"CustomerNumber\", SP.\"MaterialNumber\") IN (\n    SELECT DISTINCT\n      \"CustomerNumber\",\n      \"MaterialNumber\"\n    FROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\"\n    WHERE\n      \"OrderDate\" >= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90\n  )\nGROUP BY ALL", "cte_cummdemand_5": "/* This CTE calculates cumulative sums of daily, promotional, and forecast demand quantities by customer, material, and delivery rank, enabling analysis of total demand over time. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\",\n  SUM(\"EveryDay_Demand_Qty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"EveryDay_Demand_Qty\",\n  SUM(\"Promo_Demand_Qty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"Promo_Demand_Qty\",\n  SUM(\"ForecastDemandQty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"ForecastDemandQty\"\nFROM \"Cte_CummDemand_4\" AS a", "missedpogalerts": "SELECT DISTINCT\n  a.*,\n  b.\"DeliveryDate\" AS \"SchDeliveryDate\",\n  CASE\n    WHEN \"RecommendedOrderQty\" > 0 AND \"ActualOrderQty\" = 0\n    THEN '203'\n    ELSE '999'\n  END AS \"AlertID\",\n  CASE\n    WHEN \"RecommendedOrderQty\" > 0 AND \"ActualOrderQty\" = 0\n    THEN \"RecommendedOrderQty\"\n    ELSE NULL\n  END AS \"ImpSuggestedOrderQty_upd_MissingItem\"\nFROM (\n  SELECT\n    *,\n    DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"rnk_2\") AS \"rnk3\" /* row_number() over(partition by \"CustomerNumber\",\"MaterialNumber\" order by \"rnk\" ) \"rnk1\" */\n  FROM (\n    SELECT\n      *,\n      CASE\n        WHEN NOT \"OrderDate\" IS NULL\n        THEN ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"OrderDate\" DESC)\n      END AS \"rnk\",\n      CASE\n        WHEN NOT \"OrderDate\" IS NULL\n        THEN DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"OrderDate\" DESC)\n      END AS \"rnk_2\"\n    FROM \"OrderRecommQty\" AS a\n    WHERE\n      NOT EXISTS(\n        SELECT\n          1\n        FROM \"&{VAR_SNOWDB_SALES}\".DELIVERY.\"V_Fact_DSD_Delivery\" AS dd /* Ref #1 */\n        WHERE\n          LTRIM(a.\"CustomerNumber\", '0') = LTRIM(dd.\"CustomerNumber\", '0')\n          AND LTRIM(a.\"MaterialNumber\", '0') = LTRIM(dd.\"ItemNumber\", '0')\n          AND a.\"OrderDate\" = dd.\"OrderDate\"\n          AND a.\"DeliveryDate\" = dd.\"DeliveryDate\"\n          AND COALESCE(dd.\"OrderStatus\", 0) IN (-1, -2, 99)\n      )\n  )\n) AS a\nLEFT JOIN \"&{VAR_SNOWDB_WHSE_LOGISTICS}\".STORE_SERVICE.\"Fact_RM_DeliverySchedule\" AS b\n  ON LTRIM(a.\"CustomerNumber\", 0) = LTRIM(b.\"CustomerNumber\", 0)\nWHERE\n  \"rnk3\" = 1 AND \"SchDeliveryDate\" > CURRENT_DATE", "underorderalert": "SELECT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"MaterialNumber\",\n  b.\"WeekRnk\",\n  SUM(\"ActualOrderQty\") AS \"ActualOrderQty\",\n  SUM(\"RecommendedOrderQty\") AS \"RecommendedOrderQty\",\n  IFF(\n    100 = 0 AND NOT (\n      SUM(\"RecommendedOrderQty\") * 70\n    ) IS NULL,\n    0,\n    (\n      SUM(\"RecommendedOrderQty\") * 70\n    ) / 100\n  ) AS \"ThresholdReccomPerc\",\n  CASE\n    WHEN (\n      \"WeekRnk\" IN (2, 3, 4)\n      AND SUM(\"ActualOrderQty\") < IFF(\n        100 = 0 AND NOT (\n          SUM(\"RecommendedOrderQty\") * 70\n        ) IS NULL,\n        0,\n        (\n          SUM(\"RecommendedOrderQty\") * 70\n        ) / 100\n      )\n    )\n    THEN 1\n    ELSE 0\n  END AS \"Flag1\",\n  CASE\n    WHEN (\n      \"WeekRnk\" IN (1) AND SUM(\"RecommendedOrderQty\") > 0\n    )\n    THEN 1\n    ELSE 0\n  END AS \"Flag2\",\n  CASE WHEN \"Flag1\" = 1 AND \"Flag2\" = 1 THEN '201' ELSE '999' END AS \"AlertID\"\nFROM \"OrderRecommQty\" AS a\nLEFT JOIN \"PrevWkNbr\" AS b\n  ON a.\"BusDate\" = b.\"DayDate\"\n/* where \"CustomerNumber\"='0012593095' and \"MaterialNumber\"='20028240' */ /* where \"WeekRnk\" in (2,3,4) */\nGROUP BY ALL", "cma_trademark": "/* -only ghost trademark for CMA as confirmed by houston on 28th Jan */\nSELECT\n  CMA.*\nFROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderUDS_CMA\" AS CMA\nJOIN \"&{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS dp\n  ON LTRIM(CMA.\"MaterialNumber\", 0) = LTRIM(dp.\"SAPMaterialID\", 0)\nINNER JOIN (\n  SELECT DISTINCT\n    \"AccountID\"\n  FROM \"&{VAR_SNOWDB_SOLUTIONS}\".commercials.\"V_Dim_Account\"\n  WHERE\n    \"NationalChainName\" = 'ALL OTHER'\n    AND \"ChannelDesc\" = 'INDEPEND CONVENIENCE'\n    AND \"BranchID\" IN ('1080', '1009', '1103', '1225')\n) AS DA /* -Ref #1 */\n  ON LTRIM(CMA.\"CustomerNumber\", 0) = LTRIM(DA.\"AccountID\", 0) /* Ref #1 */\nWHERE\n  dp.\"TradeMarkID\" = 'G28'", "cutsalerts": "SELECT DISTINCT\n  a.\"CustomerNumber\",\n  a.\"MaterialNumber\",\n  a.\"DeliveryDate_Cnt\",\n  a.\"WH_DeliveryDate_Cnt\",\n  a.\"CutRate\", /* ,\"DeliveryRnk\",\"DeliveryDate\" */\n  \"WHSE_Invoice_Cut\",\n  CASE\n    WHEN (\n      \"CutRate\" >= 50\n    ) OR (\n      \"DeliveryRnk\" = 1 AND \"WHSE_Invoice_Cut\" > 0\n    )\n    THEN '202'\n    ELSE '999'\n  END AS \"AlertID\"\nFROM (\n  SELECT\n    a.\"CustomerNumber\",\n    a.\"MaterialNumber\",\n    COUNT(DISTINCT a.\"DeliveryDate\") AS \"DeliveryDate_Cnt\",\n    COUNT(DISTINCT CASE WHEN \"WHSE_Invoice_Cut\" > 0 THEN a.\"DeliveryDate\" END) AS \"WH_DeliveryDate_Cnt\",\n    IFF(\n      \"DeliveryDate_Cnt\" = 0 AND NOT \"WH_DeliveryDate_Cnt\" IS NULL,\n      0,\n      \"WH_DeliveryDate_Cnt\" / \"DeliveryDate_Cnt\"\n    ) * 100 AS \"CutRate\"\n  FROM \"OrderRecommQty\" AS a\n  WHERE\n    NOT EXISTS(\n      SELECT\n        1\n      FROM SALES_PROD.DELIVERY.\"V_Fact_DSD_Delivery\" AS dd\n      WHERE\n        LTRIM(a.\"CustomerNumber\", '0') = LTRIM(dd.\"CustomerNumber\", '0')\n        AND LTRIM(a.\"MaterialNumber\", '0') = LTRIM(dd.\"ItemNumber\", '0')\n        AND a.\"OrderDate\" = dd.\"OrderDate\"\n        AND a.\"DeliveryDate\" = dd.\"DeliveryDate\"\n        AND COALESCE(dd.\"OrderStatus\", 0) IN (-1, -2, 99)\n    )\n    AND a.\"OrderDate\" BETWEEN CURRENT_DATE - 30 AND CURRENT_DATE\n  GROUP BY ALL\n) AS a\nJOIN \"OrderRecommQty\" AS b\n  ON LTRIM(a.\"CustomerNumber\", 0) = LTRIM(b.\"CustomerNumber\", 0)\n  AND LTRIM(a.\"MaterialNumber\", 0) = LTRIM(b.\"MaterialNumber\", 0)\nWHERE\n  \"DeliveryRnk\" = 1"};

                document.getElementById("sql-viewer").innerText = sql;
            }
        });
