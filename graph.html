0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cte_weekid", "label": "cte_weekid", "opacity": 0.3, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_weekid\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_get_expected_prev_weekid\u003cbr\u003eUsed by  (1): cte_storelistdate\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;WeekID_ISO\u0026quot; AS \u0026quot;WeekID\u0026quot;,\n  \u0026quot;DayDate\u0026quot; AS \u0026quot;BusDate\u0026quot;,\n  \u0026quot;WeekStarting_ISO\u0026quot; AS \u0026quot;Week_Start\u0026quot;,\n  \u0026quot;WeekEnding_ISO\u0026quot; AS \u0026quot;Week_End\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_MD}\u0026quot;.CALENDAR.\u0026quot;V_CalDay\u0026quot;\nWHERE\n  \u0026quot;WeekID_ISO\u0026quot; \u0026gt;= (\n    SELECT\n      \u0026quot;WeekID_From\u0026quot;\n    FROM \u0026quot;CTE_Get_Expected_Prev_WeekID\u0026quot;\n  )\n  AND \u0026quot;WeekID_ISO\u0026quot; \u0026lt;= (\n    SELECT\n      MAX(\u0026quot;WeekID\u0026quot;)\n    FROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderNPSales_ML_Inbound\u0026quot;\n  )\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"WeekID_ISO\" AS \"WeekID\",\n  \"DayDate\" AS \"BusDate\",\n  \"WeekStarting_ISO\" AS \"Week_Start\",\n  \"WeekEnding_ISO\" AS \"Week_End\"\nFROM \"\u0026{VAR_SNOWDB_MD}\".CALENDAR.\"V_CalDay\"\nWHERE\n  \"WeekID_ISO\" \u003e= (\n    SELECT\n      \"WeekID_From\"\n    FROM \"CTE_Get_Expected_Prev_WeekID\"\n  )\n  AND \"WeekID_ISO\" \u003c= (\n    SELECT\n      MAX(\"WeekID\")\n    FROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderNPSales_ML_Inbound\"\n  )`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cte_custmatl_list_with_pog_capacity_onhandqty_all", "label": "cte_custmatl_list_with_pog_capacity_onhandqty_all", "opacity": 0.3, "shadow": true, "shape": "box", "size": 34, "title": "\n    \u003cb\u003ecte_custmatl_list_with_pog_capacity_onhandqty_all\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (3): cte_get_onhandqty, cte_matllist, storelist\u003cbr\u003eUsed by  (1): cte_custmatl_list_with_pog_capacity_onhandqty\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  SL.\u0026quot;CustomerNumber\u0026quot;,\n  ML.\u0026quot;MaterialNumber\u0026quot;,\n  SL.\u0026quot;DSD_CustomerNumber\u0026quot;,\n  CASE WHEN NOT MP.\u0026quot;MaterialNumber\u0026quot; IS NULL THEN 1 ELSE 0 END AS \u0026quot;IsPOG\u0026quot;,\n  CASE\n    WHEN NOT MP.\u0026quot;MaterialNumber\u0026quot; IS NULL\n    THEN COALESCE(MP.\u0026quot;Max_ShelfCapacityQty\u0026quot;, 0)\n    ELSE 0\n  END AS \u0026quot;MaxShelfQty\u0026quot;,\n  CASE\n    WHEN NOT OH.\u0026quot;MaterialNumber\u0026quot; IS NULL\n    THEN COALESCE(OH.\u0026quot;OnHandQty\u0026quot;, 0)\n    ELSE 0\n  END AS \u0026quot;OnHandQty\u0026quot;,\n  \u0026quot;Source_NPSales\u0026quot;,\n  \u0026quot;Material_Source\u0026quot;\nFROM \u0026quot;CTE_MatlList\u0026quot; AS ML\nLEFT JOIN \u0026quot;CTE_Get_OnHandQty\u0026quot; AS OH\n  ON LTRIM(OH.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(ML.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND LTRIM(OH.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(ML.\u0026quot;MaterialNumber\u0026quot;, 0)\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_RETAILER}\u0026quot;.INVENTORY.\u0026quot;V_Fact_CustModularPlan_Active\u0026quot; AS MP\n  ON LTRIM(OH.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(MP.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND LTRIM(OH.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(MP.\u0026quot;MaterialNumber\u0026quot;, 0)\nJOIN \u0026quot;StoreList\u0026quot; AS SL\n  ON LTRIM(SL.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(ML.\u0026quot;CustomerNumber\u0026quot;, 0)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  SL.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  SL.\"DSD_CustomerNumber\",\n  CASE WHEN NOT MP.\"MaterialNumber\" IS NULL THEN 1 ELSE 0 END AS \"IsPOG\",\n  CASE\n    WHEN NOT MP.\"MaterialNumber\" IS NULL\n    THEN COALESCE(MP.\"Max_ShelfCapacityQty\", 0)\n    ELSE 0\n  END AS \"MaxShelfQty\",\n  CASE\n    WHEN NOT OH.\"MaterialNumber\" IS NULL\n    THEN COALESCE(OH.\"OnHandQty\", 0)\n    ELSE 0\n  END AS \"OnHandQty\",\n  \"Source_NPSales\",\n  \"Material_Source\"\nFROM \"CTE_MatlList\" AS ML\nLEFT JOIN \"CTE_Get_OnHandQty\" AS OH\n  ON LTRIM(OH.\"CustomerNumber\", 0) = LTRIM(ML.\"CustomerNumber\", 0)\n  AND LTRIM(OH.\"MaterialNumber\", 0) = LTRIM(ML.\"MaterialNumber\", 0)\nLEFT JOIN \"\u0026{VAR_SNOWDB_RETAILER}\".INVENTORY.\"V_Fact_CustModularPlan_Active\" AS MP\n  ON LTRIM(OH.\"CustomerNumber\", 0) = LTRIM(MP.\"CustomerNumber\", 0)\n  AND LTRIM(OH.\"MaterialNumber\", 0) = LTRIM(MP.\"MaterialNumber\", 0)\nJOIN \"StoreList\" AS SL\n  ON LTRIM(SL.\"DSD_CustomerNumber\", 0) = LTRIM(ML.\"CustomerNumber\", 0)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "final_data_lf_for_pos_available", "label": "final_data_lf_for_pos_available", "opacity": 0.3, "shadow": true, "shape": "box", "size": 40, "title": "\n    \u003cb\u003efinal_data_lf_for_pos_available\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (5): orderpredicted, get_max_weekid_date_from_v_fact_retailerweekly, inbound_prep_rm_data, case_conversion, storelist\u003cbr\u003eUsed by  (1): final_data\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;,\n  \u0026quot;IsSmallFormat\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;IsMOD\u0026quot;,\n  \u0026quot;IsPromoActivated\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;OnHandQty\u0026quot;,\n  \u0026quot;Max_ShelfCapacityQty\u0026quot;,\n  \u0026quot;Incremental_Capacity\u0026quot;,\n  \u0026quot;WeekID\u0026quot;,\n  \u0026quot;Week_Start\u0026quot;,\n  \u0026quot;Week_End\u0026quot;,\n  \u0026quot;Weekly_SalesQty\u0026quot;,\n  \u0026quot;SalesQty\u0026quot;,\n  \u0026quot;Weekly_SalesAmt\u0026quot;,\n  \u0026quot;SalesAmt\u0026quot;,\n  \u0026quot;Intransit_CaseQty\u0026quot;,\n  \u0026quot;Ordered_CaseQty\u0026quot;,\n  \u0026quot;Delivered_CaseQty\u0026quot;,\n  \u0026quot;Invoiced_CaseQty\u0026quot;,\n  \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  \u0026quot;Promo_Demand_Qty\u0026quot;,\n  \u0026quot;Forecast_Demand_Qty\u0026quot;,\n  \u0026quot;Next14DaysForecastDemand\u0026quot;,\n  CASE\n    WHEN NOT \u0026quot;DeliveryDate\u0026quot; IS NULL\n    AND \u0026quot;OrderDate\u0026quot; IS NULL /* Ref #2 */\n    AND \u0026quot;DeliveryDate\u0026quot; \u0026gt; CURRENT_DATE\n    THEN \u0026quot;DeliveryDate\u0026quot;\n    ELSE NULL\n  END AS \u0026quot;DeliveryDateRnk\u0026quot;,\n  IFF(\n    \u0026quot;DeliveryDateRnk\u0026quot; IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;DeliveryDateRnk\u0026quot;)\n  ) AS \u0026quot;rnk\u0026quot;\nFROM (\n  SELECT DISTINCT\n    IB.\u0026quot;CustomerNumber\u0026quot;,\n    PO.\u0026quot;DSD_CustomerNumber\u0026quot;,\n    PO.\u0026quot;IsSmallFormat\u0026quot;,\n    IB.\u0026quot;MaterialNumber\u0026quot;,\n    IB.\u0026quot;BusDate\u0026quot;, /* ,COALESCE(IB.\u0026quot;OrderDate\u0026quot;, RMD1.\u0026quot;OrderDate\u0026quot;) AS \u0026quot;OrderDate\u0026quot; --Ref #2 */ /* ,COALESCE(IB.\u0026quot;DeliveryDate\u0026quot;, RMD1.\u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;DeliveryDate\u0026quot; */\n    IB.\u0026quot;OrderDate\u0026quot;,\n    IB.\u0026quot;DeliveryDate\u0026quot;,\n    \u0026quot;IsPOG\u0026quot; AS \u0026quot;IsMOD\u0026quot;,\n    \u0026quot;IsPromoActivated\u0026quot;,\n    COALESCE(COALESCE(DI.\u0026quot;OnHandQty\u0026quot;, 0) * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0) AS \u0026quot;OnHandQty\u0026quot;,\n    COALESCE(COALESCE(IB.\u0026quot;MaxShelfQty\u0026quot;, 0) * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0) AS \u0026quot;Max_ShelfCapacityQty\u0026quot;,\n    NULL AS \u0026quot;Incremental_Capacity\u0026quot;,\n    \u0026quot;WeekID\u0026quot;,\n    \u0026quot;Week_Start\u0026quot;,\n    \u0026quot;Week_End\u0026quot;,\n    \u0026quot;Weekly_SalesQty\u0026quot;,\n    \u0026quot;SingleDay_SalesQty\u0026quot; AS \u0026quot;SalesQty\u0026quot;,\n    \u0026quot;Weekly_SalesAmt\u0026quot;,\n    \u0026quot;SingleDay_SaleAmt\u0026quot; AS \u0026quot;SalesAmt\u0026quot;,\n    COALESCE(IB.\u0026quot;Intransit_CaseQty\u0026quot;, 0) AS \u0026quot;Intransit_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Ordered_CaseQty\u0026quot;, 0) AS \u0026quot;Ordered_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Delivered_CaseQty\u0026quot;, 0) AS \u0026quot;Delivered_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Invoiced_CaseQty\u0026quot;, 0) AS \u0026quot;Invoiced_CaseQty\u0026quot;,\n    COALESCE(OP.\u0026quot;EveryDay_Demand_Qty\u0026quot;, 0) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n    COALESCE(OP.\u0026quot;Promo_Demand_Qty\u0026quot;, 0) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n    COALESCE(OP.\u0026quot;Forecast_Demand_Qty\u0026quot;, 0) AS \u0026quot;Forecast_Demand_Qty\u0026quot;,\n    SUM(COALESCE(OP.\u0026quot;Forecast_Demand_Qty\u0026quot; * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0)) OVER (PARTITION BY IB.\u0026quot;CustomerNumber\u0026quot;, IB.\u0026quot;MaterialNumber\u0026quot; ORDER BY IB.\u0026quot;BusDate\u0026quot; DESC) AS \u0026quot;Next14DaysForecastDemand\u0026quot;\n  FROM \u0026quot;InBound_Prep_RM_Data\u0026quot; AS IB\n  JOIN \u0026quot;StoreList\u0026quot; AS PO\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(PO.\u0026quot;CustomerNumber\u0026quot;, 0)\n  /* LEFT JOIN ( */ /* \tSELECT DISTINCT \u0026quot;CustomerNumber\u0026quot; */ /* \t\t,\u0026quot;DeliveryDate\u0026quot; */ /* \t\t,\u0026quot;OrderDate\u0026quot; --Ref #2 */ /* \tFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderShpmnt_ML_Inbound\u0026quot; */ /* \t) RMD1 ON LTRIM(PO.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(RMD1.\u0026quot;CustomerNumber\u0026quot;, 0) */ /* \tAND IB.\u0026quot;BusDate\u0026quot; = RMD1.\u0026quot;DeliveryDate\u0026quot; */ /* \tAND RMD1.\u0026quot;OrderDate\u0026quot; IS NOT NULL */\n  LEFT JOIN \u0026quot;Case_Conversion\u0026quot; AS CC\n    ON LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(CC.\u0026quot;MaterialNumber\u0026quot;, 0)\n  LEFT JOIN \u0026quot;OrderPredicted\u0026quot; AS OP\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(OP.\u0026quot;CustomerNumber\u0026quot;, 0)\n    AND LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(OP.\u0026quot;MaterialNumber\u0026quot;, 0)\n    AND IB.\u0026quot;BusDate\u0026quot; = OP.\u0026quot;BusDate\u0026quot;\n  LEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_RETAILER}\u0026quot;.INVENTORY.\u0026quot;Fact_DailyInventory\u0026quot; AS DI\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(DI.\u0026quot;CustomerNumber\u0026quot;, 0)\n    AND LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(DI.\u0026quot;MaterialNumber\u0026quot;, 0)\n    AND IB.\u0026quot;BusDate\u0026quot; = DI.\u0026quot;BusDate\u0026quot;\n)\nWHERE\n  \u0026quot;BusDate\u0026quot; BETWEEN DATEADD(\n    WEEK,\n    -7,\n    DATE_TRUNC(\n      \u0026#x27;WEEK\u0026#x27;,\n      TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n    )\n  ) AND (\n    SELECT\n      \u0026quot;WeekID_Source_LastDate\u0026quot;\n    FROM \u0026quot;Get_Max_WeekId_Date_From_V_Fact_RetailerWeekly\u0026quot;\n  )\n  AND \u0026quot;IsSmallFormat\u0026quot; = 0\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"IsSmallFormat\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  \"SalesQty\",\n  \"Weekly_SalesAmt\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  CASE\n    WHEN NOT \"DeliveryDate\" IS NULL\n    AND \"OrderDate\" IS NULL /* Ref #2 */\n    AND \"DeliveryDate\" \u003e CURRENT_DATE\n    THEN \"DeliveryDate\"\n    ELSE NULL\n  END AS \"DeliveryDateRnk\",\n  IFF(\n    \"DeliveryDateRnk\" IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDateRnk\")\n  ) AS \"rnk\"\nFROM (\n  SELECT DISTINCT\n    IB.\"CustomerNumber\",\n    PO.\"DSD_CustomerNumber\",\n    PO.\"IsSmallFormat\",\n    IB.\"MaterialNumber\",\n    IB.\"BusDate\", /* ,COALESCE(IB.\"OrderDate\", RMD1.\"OrderDate\") AS \"OrderDate\" --Ref #2 */ /* ,COALESCE(IB.\"DeliveryDate\", RMD1.\"DeliveryDate\") AS \"DeliveryDate\" */\n    IB.\"OrderDate\",\n    IB.\"DeliveryDate\",\n    \"IsPOG\" AS \"IsMOD\",\n    \"IsPromoActivated\",\n    COALESCE(COALESCE(DI.\"OnHandQty\", 0) * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"OnHandQty\",\n    COALESCE(COALESCE(IB.\"MaxShelfQty\", 0) * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"Max_ShelfCapacityQty\",\n    NULL AS \"Incremental_Capacity\",\n    \"WeekID\",\n    \"Week_Start\",\n    \"Week_End\",\n    \"Weekly_SalesQty\",\n    \"SingleDay_SalesQty\" AS \"SalesQty\",\n    \"Weekly_SalesAmt\",\n    \"SingleDay_SaleAmt\" AS \"SalesAmt\",\n    COALESCE(IB.\"Intransit_CaseQty\", 0) AS \"Intransit_CaseQty\",\n    COALESCE(IB.\"Ordered_CaseQty\", 0) AS \"Ordered_CaseQty\",\n    COALESCE(IB.\"Delivered_CaseQty\", 0) AS \"Delivered_CaseQty\",\n    COALESCE(IB.\"Invoiced_CaseQty\", 0) AS \"Invoiced_CaseQty\",\n    COALESCE(OP.\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n    COALESCE(OP.\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n    COALESCE(OP.\"Forecast_Demand_Qty\", 0) AS \"Forecast_Demand_Qty\",\n    SUM(COALESCE(OP.\"Forecast_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0)) OVER (PARTITION BY IB.\"CustomerNumber\", IB.\"MaterialNumber\" ORDER BY IB.\"BusDate\" DESC) AS \"Next14DaysForecastDemand\"\n  FROM \"InBound_Prep_RM_Data\" AS IB\n  JOIN \"StoreList\" AS PO\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", 0)\n  /* LEFT JOIN ( */ /* \tSELECT DISTINCT \"CustomerNumber\" */ /* \t\t,\"DeliveryDate\" */ /* \t\t,\"OrderDate\" --Ref #2 */ /* \tFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\" */ /* \t) RMD1 ON LTRIM(PO.\"DSD_CustomerNumber\", 0) = LTRIM(RMD1.\"CustomerNumber\", 0) */ /* \tAND IB.\"BusDate\" = RMD1.\"DeliveryDate\" */ /* \tAND RMD1.\"OrderDate\" IS NOT NULL */\n  LEFT JOIN \"Case_Conversion\" AS CC\n    ON LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(CC.\"MaterialNumber\", 0)\n  LEFT JOIN \"OrderPredicted\" AS OP\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(OP.\"CustomerNumber\", 0)\n    AND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(OP.\"MaterialNumber\", 0)\n    AND IB.\"BusDate\" = OP.\"BusDate\"\n  LEFT JOIN \"\u0026{VAR_SNOWDB_RETAILER}\".INVENTORY.\"Fact_DailyInventory\" AS DI\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(DI.\"CustomerNumber\", 0)\n    AND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(DI.\"MaterialNumber\", 0)\n    AND IB.\"BusDate\" = DI.\"BusDate\"\n)\nWHERE\n  \"BusDate\" BETWEEN DATEADD(\n    WEEK,\n    -7,\n    DATE_TRUNC(\n      \u0027WEEK\u0027,\n      TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n    )\n  ) AND (\n    SELECT\n      \"WeekID_Source_LastDate\"\n    FROM \"Get_Max_WeekId_Date_From_V_Fact_RetailerWeekly\"\n  )\n  AND \"IsSmallFormat\" = 0`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "missing_material_data_from_cust_mod_plan_active_data", "label": "missing_material_data_from_cust_mod_plan_active_data", "opacity": 0.3, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003emissing_material_data_from_cust_mod_plan_active_data\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_matllist_from_inbound, cust_mod_plan_active_data\u003cbr\u003eUsed by  (1): cte_missing_matllist\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  SH.\u0026quot;CustomerNumber\u0026quot;,\n  LTRIM(SH.\u0026quot;MaterialNumber\u0026quot;, 0) AS \u0026quot;MaterialNumber\u0026quot;,\n  SH.\u0026quot;DSD_CustomerNumber\u0026quot;,\n  IB.\u0026quot;MaterialNumber\u0026quot; AS \u0026quot;Circana_Material_Number\u0026quot;\nFROM \u0026quot;Cust_Mod_Plan_Active_Data\u0026quot; AS SH\nLEFT JOIN \u0026quot;CTE_MatlList_From_InBound\u0026quot; AS IB\n  ON LTRIM(SH.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND LTRIM(SH.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  SH.\"CustomerNumber\",\n  LTRIM(SH.\"MaterialNumber\", 0) AS \"MaterialNumber\",\n  SH.\"DSD_CustomerNumber\",\n  IB.\"MaterialNumber\" AS \"Circana_Material_Number\"\nFROM \"Cust_Mod_Plan_Active_Data\" AS SH\nLEFT JOIN \"CTE_MatlList_From_InBound\" AS IB\n  ON LTRIM(SH.\"CustomerNumber\", 0) = LTRIM(IB.\"CustomerNumber\", 0)\n  AND LTRIM(SH.\"MaterialNumber\", 0) = LTRIM(IB.\"MaterialNumber\", 0)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cte_matllist_from_inbound", "label": "cte_matllist_from_inbound", "opacity": 0.3, "shadow": true, "shape": "box", "size": 37, "title": "\n    \u003cb\u003ecte_matllist_from_inbound\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_get_expected_prev_weekid, storelist\u003cbr\u003eUsed by  (3): missing_material_data_from_cust_mod_plan_active_data, cte_matllist, missing_material_data_from_last10days\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  IB.\u0026quot;CustomerNumber\u0026quot;,\n  IB.\u0026quot;DSD_CustomerNumber\u0026quot;,\n  IB.\u0026quot;MaterialNumber\u0026quot;,\n  \u0026#x27;1\u0026#x27; AS \u0026quot;Source_NPSales\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderNPSales_ML_Inbound\u0026quot; AS IB\nINNER JOIN \u0026quot;StoreList\u0026quot; AS SL\n  ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(SL.\u0026quot;DSD_CustomerNumber\u0026quot;, 0)\nJOIN \u0026quot;\u0026amp;{VAR_SNOWDB_COMMERCIAL}\u0026quot;.TECHNICAL.\u0026quot;Xref_DSD_AccountBranchMaterial\u0026quot; AS AM\n  ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(AM.\u0026quot;AccountID\u0026quot;, 0)\n  AND LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(AM.\u0026quot;MaterialID\u0026quot;, 0)\nWHERE\n  IB.\u0026quot;WeekID\u0026quot; \u0026gt; (\n    SELECT\n      \u0026quot;WeekID_From\u0026quot;\n    FROM \u0026quot;CTE_Get_Expected_Prev_WeekID\u0026quot;\n  )\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  IB.\"CustomerNumber\",\n  IB.\"DSD_CustomerNumber\",\n  IB.\"MaterialNumber\",\n  \u00271\u0027 AS \"Source_NPSales\"\nFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderNPSales_ML_Inbound\" AS IB\nINNER JOIN \"StoreList\" AS SL\n  ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(SL.\"DSD_CustomerNumber\", 0)\nJOIN \"\u0026{VAR_SNOWDB_COMMERCIAL}\".TECHNICAL.\"Xref_DSD_AccountBranchMaterial\" AS AM\n  ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(AM.\"AccountID\", 0)\n  AND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(AM.\"MaterialID\", 0)\nWHERE\n  IB.\"WeekID\" \u003e (\n    SELECT\n      \"WeekID_From\"\n    FROM \"CTE_Get_Expected_Prev_WeekID\"\n  )`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cte_get_onhandqty", "label": "cte_get_onhandqty", "opacity": 0.3, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003ecte_get_onhandqty\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_matllist, storelist\u003cbr\u003eUsed by  (1): cte_custmatl_list_with_pog_capacity_onhandqty_all\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  COALESCE(\u0026quot;OnHandQty\u0026quot;, 0) AS \u0026quot;OnHandQty\u0026quot;,\n  \u0026quot;BusDate\u0026quot;\nFROM (\n  SELECT DISTINCT\n    SL.\u0026quot;CustomerNumber\u0026quot;,\n    IB.\u0026quot;MaterialNumber\u0026quot;,\n    DI.\u0026quot;OnHandQty\u0026quot;,\n    DI.\u0026quot;BusDate\u0026quot;,\n    ROW_NUMBER() OVER (PARTITION BY SL.\u0026quot;CustomerNumber\u0026quot;, IB.\u0026quot;MaterialNumber\u0026quot; ORDER BY DI.\u0026quot;BusDate\u0026quot; DESC) AS \u0026quot;rn\u0026quot;\n  /* FROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderNPSales_ML_Inbound\u0026quot; IB */\n  FROM \u0026quot;CTE_MatlList\u0026quot; AS IB\n  JOIN \u0026quot;StoreList\u0026quot; AS SL\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(SL.\u0026quot;DSD_CustomerNumber\u0026quot;, 0)\n  LEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_RETAILER}\u0026quot;.INVENTORY.\u0026quot;Fact_DailyInventory\u0026quot; AS DI\n    ON LTRIM(SL.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(DI.\u0026quot;CustomerNumber\u0026quot;, 0)\n    AND LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(DI.\u0026quot;MaterialNumber\u0026quot;, 0)\n  WHERE\n    \u0026quot;IsSmallFormat\u0026quot; = 0 AND DI.\u0026quot;BusDate\u0026quot; \u0026gt; DATEADD(MONTH, -6, CURRENT_DATE)\n)\nWHERE\n  \u0026quot;rn\u0026quot; = 1\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  COALESCE(\"OnHandQty\", 0) AS \"OnHandQty\",\n  \"BusDate\"\nFROM (\n  SELECT DISTINCT\n    SL.\"CustomerNumber\",\n    IB.\"MaterialNumber\",\n    DI.\"OnHandQty\",\n    DI.\"BusDate\",\n    ROW_NUMBER() OVER (PARTITION BY SL.\"CustomerNumber\", IB.\"MaterialNumber\" ORDER BY DI.\"BusDate\" DESC) AS \"rn\"\n  /* FROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderNPSales_ML_Inbound\" IB */\n  FROM \"CTE_MatlList\" AS IB\n  JOIN \"StoreList\" AS SL\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(SL.\"DSD_CustomerNumber\", 0)\n  LEFT JOIN \"\u0026{VAR_SNOWDB_RETAILER}\".INVENTORY.\"Fact_DailyInventory\" AS DI\n    ON LTRIM(SL.\"DSD_CustomerNumber\", 0) = LTRIM(DI.\"CustomerNumber\", 0)\n    AND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(DI.\"MaterialNumber\", 0)\n  WHERE\n    \"IsSmallFormat\" = 0 AND DI.\"BusDate\" \u003e DATEADD(MONTH, -6, CURRENT_DATE)\n)\nWHERE\n  \"rn\" = 1`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cte_matllist", "label": "cte_matllist", "opacity": 0.3, "shadow": true, "shape": "box", "size": 34, "title": "\n    \u003cb\u003ecte_matllist\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_matllist_from_inbound, cte_missing_matllist\u003cbr\u003eUsed by  (2): cte_custmatl_list_with_pog_capacity_onhandqty_all, cte_get_onhandqty\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;,\n  LTRIM(\u0026quot;MaterialNumber\u0026quot;, 0) AS \u0026quot;MaterialNumber\u0026quot;,\n  1 AS \u0026quot;Source_NPSales\u0026quot;,\n  \u0026#x27;Inbound\u0026#x27; AS \u0026quot;Material_Source\u0026quot;\nFROM \u0026quot;CTE_MatlList_From_InBound\u0026quot;\nUNION\nSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;,\n  LTRIM(\u0026quot;MaterialNumber\u0026quot;, 0) AS \u0026quot;MaterialNumber\u0026quot;,\n  0 AS \u0026quot;Source_NPSales\u0026quot;,\n  \u0026#x27;Last_10Days_Ordered\u0026#x27; AS \u0026quot;Material_Source\u0026quot;\nFROM \u0026quot;CTE_Missing_MatlList\u0026quot;\nWHERE\n  (LTRIM(\u0026quot;CustomerNumber\u0026quot;, 0), LTRIM(\u0026quot;MaterialNumber\u0026quot;, 0)) \u0026lt;\u0026gt; ALL (\n    SELECT DISTINCT\n      LTRIM(\u0026quot;CustomerNumber\u0026quot;, 0),\n      LTRIM(\u0026quot;MaterialNumber\u0026quot;, 0)\n    FROM \u0026quot;CTE_MatlList_From_InBound\u0026quot;\n  )\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  LTRIM(\"MaterialNumber\", 0) AS \"MaterialNumber\",\n  1 AS \"Source_NPSales\",\n  \u0027Inbound\u0027 AS \"Material_Source\"\nFROM \"CTE_MatlList_From_InBound\"\nUNION\nSELECT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  LTRIM(\"MaterialNumber\", 0) AS \"MaterialNumber\",\n  0 AS \"Source_NPSales\",\n  \u0027Last_10Days_Ordered\u0027 AS \"Material_Source\"\nFROM \"CTE_Missing_MatlList\"\nWHERE\n  (LTRIM(\"CustomerNumber\", 0), LTRIM(\"MaterialNumber\", 0)) \u003c\u003e ALL (\n    SELECT DISTINCT\n      LTRIM(\"CustomerNumber\", 0),\n      LTRIM(\"MaterialNumber\", 0)\n    FROM \"CTE_MatlList_From_InBound\"\n  )`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "final_data_to_load_in_history_table_lf_for_pos_available_week", "label": "final_data_to_load_in_history_table_lf_for_pos_available_week", "opacity": 0.3, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003efinal_data_to_load_in_history_table_lf_for_pos_available_week\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_recomscore, saleqty_splitted_daily_lf_with_case_converted\u003cbr\u003eUsed by  (1): final_data_lf\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  FQ.\u0026quot;CustomerNumber\u0026quot;,\n  FQ.\u0026quot;DSD_CustomerNumber\u0026quot;,\n  FQ.\u0026quot;MaterialNumber\u0026quot;,\n  FQ.\u0026quot;BusDate\u0026quot;,\n  FQ.\u0026quot;OrderDate\u0026quot;,\n  FQ.\u0026quot;DeliveryDate\u0026quot;,\n  FQ.\u0026quot;IsMOD\u0026quot;,\n  FQ.\u0026quot;OnHandQty\u0026quot;,\n  FQ.\u0026quot;Max_ShelfCapacityQty\u0026quot;,\n  FQ.\u0026quot;Incremental_Capacity\u0026quot;, /* ,FQ.\u0026quot;SalesQty\u0026quot; */\n  COALESCE(FQ.\u0026quot;SalesQty_Splitted_ConvFactorToBase\u0026quot;, 0) AS \u0026quot;SalesQty\u0026quot;,\n  FQ.\u0026quot;SalesAmt\u0026quot;,\n  FQ.\u0026quot;Intransit_CaseQty\u0026quot;,\n  FQ.\u0026quot;Ordered_CaseQty\u0026quot;,\n  FQ.\u0026quot;Delivered_CaseQty\u0026quot;,\n  FQ.\u0026quot;Invoiced_CaseQty\u0026quot;,\n  \u0026quot;EveryDay_Demand_Qty_ConvFactorToBase\u0026quot; AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  \u0026quot;Promo_Demand_Qty_ConvFactorToBase\u0026quot; AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n  NULL AS \u0026quot;AlertID\u0026quot;,\n  0 AS \u0026quot;Instock_Score\u0026quot;,\n  0 AS \u0026quot;Instock_Score_Wmt\u0026quot;,\n  0 AS \u0026quot;Lost_units\u0026quot;,\n  COALESCE(RS.\u0026quot;OOS_Adjustment\u0026quot;, 0) AS \u0026quot;OOS_Adjustment\u0026quot;,\n  RS.\u0026quot;SuggestedOrderQty\u0026quot;\nFROM \u0026quot;SaleQty_Splitted_Daily_LF_With_Case_Converted\u0026quot; AS FQ\nLEFT JOIN \u0026quot;Cte_RecomScore\u0026quot; AS RS\n  ON LTRIM(FQ.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;) = LTRIM(RS.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;) /* Ref #1 */\n  AND FQ.\u0026quot;OrderDate\u0026quot; = RS.\u0026quot;SnapShotDate\u0026quot;\n  AND FQ.\u0026quot;DeliveryDate\u0026quot; = RS.\u0026quot;DeliveryDate\u0026quot;\n  AND LTRIM(FQ.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(RS.\u0026quot;MaterialNumber\u0026quot;, 0)\nWHERE\n  NOT FQ.\u0026quot;MaterialNumber\u0026quot; LIKE \u0026#x27;5%\u0026#x27;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  FQ.\"CustomerNumber\",\n  FQ.\"DSD_CustomerNumber\",\n  FQ.\"MaterialNumber\",\n  FQ.\"BusDate\",\n  FQ.\"OrderDate\",\n  FQ.\"DeliveryDate\",\n  FQ.\"IsMOD\",\n  FQ.\"OnHandQty\",\n  FQ.\"Max_ShelfCapacityQty\",\n  FQ.\"Incremental_Capacity\", /* ,FQ.\"SalesQty\" */\n  COALESCE(FQ.\"SalesQty_Splitted_ConvFactorToBase\", 0) AS \"SalesQty\",\n  FQ.\"SalesAmt\",\n  FQ.\"Intransit_CaseQty\",\n  FQ.\"Ordered_CaseQty\",\n  FQ.\"Delivered_CaseQty\",\n  FQ.\"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty_ConvFactorToBase\" AS \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty_ConvFactorToBase\" AS \"Promo_Demand_Qty\",\n  NULL AS \"AlertID\",\n  0 AS \"Instock_Score\",\n  0 AS \"Instock_Score_Wmt\",\n  0 AS \"Lost_units\",\n  COALESCE(RS.\"OOS_Adjustment\", 0) AS \"OOS_Adjustment\",\n  RS.\"SuggestedOrderQty\"\nFROM \"SaleQty_Splitted_Daily_LF_With_Case_Converted\" AS FQ\nLEFT JOIN \"Cte_RecomScore\" AS RS\n  ON LTRIM(FQ.\"CustomerNumber\", \u00270\u0027) = LTRIM(RS.\"CustomerNumber\", \u00270\u0027) /* Ref #1 */\n  AND FQ.\"OrderDate\" = RS.\"SnapShotDate\"\n  AND FQ.\"DeliveryDate\" = RS.\"DeliveryDate\"\n  AND LTRIM(FQ.\"MaterialNumber\", 0) = LTRIM(RS.\"MaterialNumber\", 0)\nWHERE\n  NOT FQ.\"MaterialNumber\" LIKE \u00275%\u0027`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "final_data_to_load_in_history_ umber\", \u00270\u0027) = LTRIM(RS.\"CustomerNumber\", \u00270\u0027) /* Ref #1 */\n  AND FD.\"OrderDate\" = RS.\"SnapShotDate\"\n  AND FD.\"DeliveryDate\" = RS.\"DeliveryDate\"\n  AND LTRIM(FD.\"MaterialNumber\", 0) = LTRIM(RS.\"MaterialNumber\", 0)\nWHERE\n  NOT FD.\"MaterialNumber\" LIKE \u00275%\u0027`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cte_missing_matllist", "label": "cte_missing_matllist", "opacity": 0.3, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003ecte_missing_matllist\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): missing_material_data_from_last10days, missing_material_data_from_cust_mod_plan_active_data\u003cbr\u003eUsed by  (1): cte_matllist\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;Source_NPSales\u0026quot;\nFROM (\n  SELECT DISTINCT\n    \u0026quot;CustomerNumber\u0026quot;,\n    \u0026quot;DSD_CustomerNumber\u0026quot;,\n    \u0026quot;MaterialNumber\u0026quot;,\n    \u0026#x27;0\u0026#x27; AS \u0026quot;Source_NPSales\u00         var node_sql_map = {"get_max_weekid_date_from_v_fact_retailerweekly": "SELECT DISTINCT\n  (\n    \"WeekEnding_ISO\"\n  ) AS \"WeekID_Source_LastDate\"\nFROM \"&{VAR_SNOWDB_MD}\".CALENDAR.\"V_CalDay\"\nWHERE\n  \"WeekID_ISO\" = (\n    SELECT\n      MAX(\"WeekID\")\n    FROM \"&{VAR_SNOWDB_DATA_PRODUCT}\".RETAILER_INSIGHTS.\"V_Fact_RetailerWeekly\"\n    WHERE\n      \"Source\" = 'IRI'\n  )", "inbound_prep_custmatl_missing": "SELECT DISTINCT\n  \"NationalChainName\" AS \"RetailerName\",\n  SD.\"CustomerNumber\",\n  SD.\"DSD_CustomerNumber\",\n  \"CustomerName\",\n  SD.\"MaterialNumber\",\n  SD.\"BusDate\",\n  NULL AS \"WeekID\",\n  NULL AS \"Week_Start\",\n  NULL AS \"Week_End\",\n  0 AS \"Weekly_SalesQty\",\n  0 AS \"SingleDay_SalesQty\",\n  0 AS \"Weekly_SalesAmt\",\n  0 AS \"SingleDay_SaleAmt\",\n  0 AS \"IsPromoActivated\",\n  COALESCE(ML.\"IsPOG\", 0) AS \"IsPOG\",\n  COALESCE(ML.\"MaxShelfQty\", 0) AS \"MaxShelfQty\",\n  \"Source_NPSales\"\nFROM \"CTE_StoreListDate\" AS SD\nJOIN \"&{VAR_SNOWDB_MD}\".TECHNICAL.\"V_PerfOrderNPSales_StoreList\" AS SL\n  ON LTRIM(SL.\"DSD_CustomerNumber\", 0) = LTRIM(SD.\"CustomerNumber\", 0)\nJOIN \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty\" AS ML\n  ON LTRIM(SD.\"DSD_CustomerNumber\", 0) = LTRIM(ML.\"CustomerNumber\", 0)\n  AND LTRIM(SD.\"MaterialNumber\", 0) = LTRIM(ML.\"MaterialNumber\", 0)\nLEFT JOIN \"&{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS DP\n  ON LTRIM(SD.\"MaterialNumber\", 0) = LTRIM(DP.\"SAPMaterialID\", 0)\nLEFT JOIN \"Cte_PB_Bottlers\" AS PB\n  ON LTRIM(SD.\"CustomerNumber\", 0) = PB.\"CustomerNumber\"\n  AND DP.\"TradeMarkID\" = PB.\"TradeMarkID\"\nWHERE\n  \"IsPB\" = 1 AND \"Source_NPSales\" = 0", "cte_pb_bottlers": "/* SELECT DISTINCT LTRIM(AT.\"AccountID\", '0') \"DSD_CustomerNumber\"\n\t\t,AT.\"TradeMarkID\"\n\t\t,CASE \n\t\t\tWHEN DB.\"BCSystemID\" = '30013' --- DSD Bottlers(PB)  \n\t\t\t\tTHEN 1\n\t\t\tELSE 0\n\t\t\tEND \"IsPB\"\n\tFROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_ActiveTerritoryByAccount\" AT\n\tLEFT JOIN \"&{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Bottler\" DB ON DB.\"BottlerID\" = AT.\"ServicingBottlerID\"\n\tWHERE \"ProductTypeID\" = 1 */\nSELECT DISTINCT\n  LTRIM(\"AccountID\", '0') AS \"CustomerNumber\",\n  \"TrademarkID\" AS \"TradeMarkID\",\n  1 AS \"IsPB\"\nFROM \"&{VAR_SNOWDB_SOLUTIONS}\".DSD.\"V_DIM_CUSTTRADEMARKSVC\"", "cte_storelistdate": "SELECT DISTINCT\n  WK.\"WeekID\",\n  WK.\"BusDate\",\n  ML.\"CustomerNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"MaterialNumber\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty\" AS ML, \"CTE_WeekID\" AS WK", "cte_custmatl_list_with_pog_capacity_onhandqty": "SELECT DISTINCT\n  ML.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"IsPOG\",\n  ML.\"MaxShelfQty\",\n  ML.\"OnHandQty\",\n  ML.\"Source_NPSales\",\n  ML.\"Material_Source\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS ML\nWHERE\n  ML.\"Material_Source\" = 'Inbound' AND ML.\"IsPOG\" = 1\nUNION\nSELECT DISTINCT\n  ML.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"IsPOG\",\n  ML.\"MaxShelfQty\",\n  ML.\"OnHandQty\",\n  ML.\"Source_NPSales\",\n  ML.\"Material_Source\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS ML\nWHERE\n  ML.\"Material_Source\" = 'Inbound'\n  AND ML.\"IsPOG\" = 0\n  AND ML.\"OnHandQty\" >= 0\n  AND (\n    (LTRIM(ML.\"CustomerNumber\", 0), LTRIM(ML.\"MaterialNumber\", 0)) IN (\n      SELECT DISTINCT\n        LTRIM(\"CustomerNumber\", 0),\n        LTRIM(\"MaterialNumber\", 0)\n      FROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS FQ\n      WHERE\n        FQ.\"Material_Source\" = 'Last_10Days_Ordered'\n    )\n  ) /* earlier its >0 */\n/* -This needs to be confirm with Cameryn\t\t\t\t \t\t\t\t\t\t\t   */\nUNION\nSELECT DISTINCT\n  ML.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"IsPOG\",\n  ML.\"MaxShelfQty\",\n  ML.\"OnHandQty\",\n  ML.\"Source_NPSales\",\n  ML.\"Material_Source\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS ML\nWHERE\n  ML.\"Material_Source\" = 'Inbound'\n  AND ML.\"IsPOG\" = 0\n  AND ML.\"OnHandQty\" > 0\n  AND (\n    (LTRIM(ML.\"CustomerNumber\", 0), LTRIM(ML.\"MaterialNumber\", 0)) <> ALL (\n      SELECT DISTINCT\n        LTRIM(\"CustomerNumber\", 0),\n        LTRIM(\"MaterialNumber\", 0)\n      FROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS FQ\n      WHERE\n        FQ.\"Material_Source\" = 'Last_10Days_Ordered'\n    )\n  )\nUNION\nSELECT DISTINCT\n  ML.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"IsPOG\",\n  ML.\"MaxShelfQty\",\n  ML.\"OnHandQty\",\n  ML.\"Source_NPSales\",\n  ML.\"Material_Source\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS ML\nWHERE\n  ML.\"Material_Source\" IN ('Last_10Days_Ordered') AND \"IsPOG\" = 1\nUNION\nSELECT DISTINCT\n  ML.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"IsPOG\",\n  ML.\"MaxShelfQty\",\n  ML.\"OnHandQty\",\n  ML.\"Source_NPSales\",\n  ML.\"Material_Source\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS ML\nWHERE\n  ML.\"Material_Source\" IN ('Last_10Days_Ordered')\n  AND ML.\"IsPOG\" = 0\n  AND ML.\"OnHandQty\" >= 0 /* earlier its >0 */", "saleqty_splitted_daily_lf_with_case_converted": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\", /* ,\"IsSmallFormat\" */\n  LF.\"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  COALESCE(\"Weekly_SalesQty\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"Weekly_SalesQty_ConvFactorToBase\",\n  COALESCE(\"SalesQty_Splitted\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"SalesQty_Splitted_ConvFactorToBase\",\n  COALESCE(\"EveryDay_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"EveryDay_Demand_Qty_ConvFactorToBase\",\n  COALESCE(\"Promo_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"Promo_Demand_Qty_ConvFactorToBase\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"Next14DaysForecastDemand\"\nFROM \"SaleQty_Splitted_Daily_LF\" AS LF\nLEFT JOIN \"Case_Conversion\" AS CC\n  ON LTRIM(LF.\"MaterialNumber\", 0) = LTRIM(CC.\"MaterialNumber\", 0)", "saleqty_splitted_daily_lf": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\", /* ,\"IsSmallFormat\" */\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  LF.\"Day_Of_Week\",\n  LF.\"Week_Of_Year\",\n  \"Weekly_SalesQty\",\n  ROUND(\n    \"Weekly_SalesQty\" * (\n      \"SplitRatioSelected\" / SUM(\"SplitRatioSelected\") OVER (PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"WeekID\")\n    ),\n    5\n  ) AS \"SalesQty_Splitted\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"Next14DaysForecastDemand\"\nFROM \"SaleQty_Get_Split_Ratio_LF\" AS LF\nWHERE\n  \"rn\" = 1", "case_conversion": "SELECT DISTINCT\n  E.\"SAPMaterialID\" AS \"MaterialNumber\",\n  COALESCE(UOM_SU.\"ConvFactorToBase\", UOM_PC.\"ConvFactorToBase\", UOM_EA.\"ConvFactorToBase\", 1) AS \"ConvFactorToBase\"\nFROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS E\nLEFT JOIN \"&{VAR_SNOWDB_MD}\".SAP.\"Dim_AltUnit\" AS UOM_SU\n  ON UOM_SU.MDM_ID = E.MDM_ID AND UOM_SU.\"AltUnitID\" = 'SU'\nLEFT JOIN \"&{VAR_SNOWDB_MD}\".SAP.\"Dim_AltUnit\" AS UOM_PC\n  ON UOM_PC.MDM_ID = E.MDM_ID AND UOM_PC.\"AltUnitID\" = 'PC'\nLEFT JOIN \"&{VAR_SNOWDB_MD}\".SAP.\"Dim_AltUnit\" AS UOM_EA\n  ON UOM_EA.MDM_ID = E.MDM_ID AND UOM_EA.\"AltUnitID\" = 'EA'\nWHERE\n  NOT E.\"SAPMaterialID\" IS NULL", "final_data_lf_for_pos_notavailable_week_caseconverted": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  FD.\"MaterialNumber\",\n  \"BusDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  COALESCE(\"EveryDay_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"EveryDay_Demand_Qty_ConvFactorToBase\",\n  COALESCE(\"Promo_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"Promo_Demand_Qty_ConvFactorToBase\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  \"DeliveryDateRnk\",\n  \"rnk\"\nFROM \"final_data\" AS FD\nLEFT JOIN \"Case_Conversion\" AS CC\n  ON LTRIM(FD.\"MaterialNumber\", 0) = LTRIM(CC.\"MaterialNumber\", 0)\nWHERE\n  \"IsSmallFormat\" = 0\n  AND \"BusDate\" > (\n    SELECT\n      \"WeekID_Source_LastDate\"\n    FROM \"Get_Max_WeekId_Date_From_V_Fact_RetailerWeekly\"\n  )", "final_data": "SELECT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"IsSmallFormat\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  \"SalesQty\",\n  \"Weekly_SalesAmt\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  \"DeliveryDateRnk\",\n  \"rnk\"\nFROM \"final_data_lf_for_pos_available\"\nUNION\nSELECT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"IsSmallFormat\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  \"SalesQty\",\n  \"Weekly_SalesAmt\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  \"DeliveryDateRnk\",\n  \"rnk\"\nFROM \"final_data_lf_for_pos_not_available\"", "cust_mod_plan_active_data": "SELECT DISTINCT\n  MP.\"CustomerNumber\" AS \"CustomerNumber\",\n  \"MaterialNumber\" AS \"MaterialNumber\",\n  \"DSD_CustomerNumber\" AS \"DSD_CustomerNumber\"\nFROM \"&{VAR_SNOWDB_RETAILER}\".INVENTORY.\"V_Fact_CustModularPlan_Active\" AS MP\nJOIN \"StoreList\" AS SL\n  ON LTRIM(SL.\"DSD_CustomerNumber\", 0) = LTRIM(MP.\"CustomerNumber\", 0)\nJOIN \"&{VAR_SNOWDB_COMMERCIAL}\".TECHNICAL.\"Xref_DSD_AccountBranchMaterial\" AS AM\n  ON LTRIM(SL.\"DSD_CustomerNumber\", 0) = LTRIM(AM.\"AccountID\", 0)\n  AND LTRIM(MP.\"MaterialNumber\", 0) = LTRIM(AM.\"MaterialID\", '0')", "storelist": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"IsSmallFormat\"\nFROM \"&{VAR_SNOWDB_MD}\".TECHNICAL.\"V_PerfOrderNPSales_StoreList\" AS SL\nWHERE\n  \"IsSmallFormat\" = 0\n  AND /* AND  \"NationalChainID\" IN ('0001014823') */ NOT \"CustomerName\" LIKE '%GETGO%'", "final_data_lf_after_instock": "SELECT\n  FD.\"CustomerNumber\",\n  FD.\"DSD_CustomerNumber\",\n  FD.\"MaterialNumber\",\n  FD.\"BusDate\",\n  FD.\"OrderDate\",\n  FD.\"DeliveryDate\",\n  FD.\"IsMOD\",\n  FD.\"OnHandQty\",\n  FD.\"Max_ShelfCapacityQty\",\n  FD.\"Incremental_Capacity\",\n  FD.\"SalesQty\",\n  FD.\"SalesAmt\",\n  FD.\"Intransit_CaseQty\",\n  FD.\"Ordered_CaseQty\",\n  FD.\"Delivered_CaseQty\",\n  FD.\"Invoiced_CaseQty\",\n  FD.\"EveryDay_Demand_Qty\",\n  FD.\"Promo_Demand_Qty\",\n  NULL AS \"AlertID\",\n  inc.\"Instock_Score\",\n  incr.\"InstockScore_Retailer\" AS \"Instock_Score_Wmt\",\n  inc.\"Lost_units\",\n  \"OOS_Adjustment\",\n  \"SuggestedOrderQty\",\n  'Fact_CustItemOrderNPSalesHistory_LF' AS \"RowTaskID\",\n  CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ) AS \"CreatedOn\",\n  CURRENT_USER() AS \"CreatedBy\"\nFROM \"Final_Data_LF\" AS FD\nLEFT JOIN \"Instock_Calc\" AS inc\n  ON LTRIM(FD.\"CustomerNumber\", 0) = LTRIM(inc.\"CustomerNumber\", 0)\n  AND LTRIM(FD.\"MaterialNumber\", 0) = LTRIM(inc.\"MaterialNumber\", 0)\n  AND FD.\"BusDate\" = inc.\"BusDate\"\nLEFT JOIN \"Instock_Retailer\" AS incr\n  ON LTRIM(FD.\"CustomerNumber\", 0) = LTRIM(incr.\"CustomerNumber\", 0)\n  AND LTRIM(FD.\"MaterialNumber\", 0) = LTRIM(incr.\"MaterialNumber\", 0)\n  AND FD.\"BusDate\" = incr.\"BusDate\"\nWHERE\n  \"NonModed_SOQ_Zero_Filtered\" = 0", "final_data_lf": "SELECT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"IsMOD\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"SalesQty\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"AlertID\",\n  \"Instock_Score\",\n  \"Instock_Score_Wmt\",\n  \"Lost_units\",\n  \"OOS_Adjustment\",\n  \"SuggestedOrderQty\",\n  CASE WHEN \"IsMOD\" = 0 AND \"SuggestedOrderQty\" = 0 THEN 1 ELSE 0 END AS \"NonModed_SOQ_Zero_Filtered\"\nFROM \"Final_Data_To_Load_In_History_Table_LF_For_POS_Available_Week\"\nUNION\nSELECT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"IsMOD\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"SalesQty\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"AlertID\",\n  \"Instock_Score\",\n  \"Instock_Score_Wmt\",\n  \"Lost_units\",\n  \"OOS_Adjustment\",\n  \"SuggestedOrderQty\",\n  CASE WHEN \"IsMOD\" = 0 AND \"SuggestedOrderQty\" = 0 THEN 1 ELSE 0 END AS \"NonModed_SOQ_Zero_Filtered\"\nFROM \"Final_Data_To_Load_In_History_Table_LF_For_POS_Not_Available_Week\"", "instock_calc": "SELECT\n  \"BusDate\",\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"StartingInventory\",\n  \"EndingInventory\",\n  \"ConsumerDemand\",\n  \"Projected_Inv_Depletion\",\n  \"Lost_units\",\n  (\n    (\n      1 + (\n        IFF(\n          \"ConsumerDemand\" = 0 AND NOT \"Lost_units\" IS NULL,\n          0,\n          \"Lost_units\" / \"ConsumerDemand\"\n        )\n      )\n    ) * 100\n  ) AS \"Instock_Score_1\",\n  CASE\n    WHEN \"StartingInventory\" = 0 AND \"ConsumerDemand\" = 0\n    THEN 0\n    ELSE \"Instock_Score_1\"\n  END AS \"Instock_Score\"\nFROM (\n  SELECT\n    \"BusDate\",\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    \"StartingInventory\",\n    \"EndingInventory\",\n    \"ConsumerDemand\",\n    \"Projected_Inv_Depletion\",\n    CASE WHEN \"Projected_Inv_Depletion\" > 0 THEN 0 ELSE \"Projected_Inv_Depletion\" END AS \"Lost_units\"\n  FROM (\n    SELECT\n      \"BusDate\",\n      \"CustomerNumber\",\n      \"MaterialNumber\",\n      \"StartingInventory\",\n      \"EndingInventory\",\n      \"ConsumerDemand\",\n      (\n        \"StartingInventory\" - \"ConsumerDemand\"\n      ) AS \"Projected_Inv_Depletion\"\n    FROM (\n      SELECT\n        \"BusDate\",\n        \"CustomerNumber\",\n        \"MaterialNumber\",\n        LAG(SUM(\"OnHandQty\")) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"BusDate\") AS \"StartingInventory\",\n        SUM(\"OnHandQty\") AS \"EndingInventory\",\n        SUM(\"EveryDay_Demand_Qty\" + \"Promo_Demand_Qty\") AS \"ConsumerDemand\"\n      FROM \"Final_Data_LF\"\n      GROUP BY\n        \"BusDate\",\n        \"CustomerNumber\",\n        \"MaterialNumber\"\n    )\n  )\n)", "instock_retailer": "SELECT\n  \"BusDate\",\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"IsMOD\",\n  \"StartingInventory\",\n  \"EndingInventory\",\n  \"ConsumerDemand\",\n  CASE\n    WHEN \"IsMOD\" = 1 AND \"StartingInventory\" > 0\n    THEN 100\n    WHEN \"IsMOD\" = 1 AND \"StartingInventory\" = 0\n    THEN 0\n    ELSE NULL\n  END AS \"InstockScore_Retailer\"\nFROM (\n  SELECT\n    \"BusDate\",\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    \"IsMOD\",\n    LAG(SUM(\"OnHandQty\")) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"BusDate\") AS \"StartingInventory\",\n    SUM(\"OnHandQty\") AS \"EndingInventory\",\n    SUM(\"EveryDay_Demand_Qty\" + \"Promo_Demand_Qty\") AS \"ConsumerDemand\"\n  FROM \"Final_Data_LF\"\n  GROUP BY\n    \"BusDate\",\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    \"IsMOD\"\n)", "orderpredicted": "SELECT DISTINCT\n  \"BusDate\",\n  MO.\"CustomerNumber\",\n  \"MaterialNumber\",\n  COALESCE(\"EverydayDemandQty\", 0) AS \"EveryDay_Demand_Qty\",\n  COALESCE(\"PromoLiftQty\", 0) AS \"Promo_Demand_Qty\",\n  COALESCE(\"ForecastedSalesQty\", 0) AS \"Forecast_Demand_Qty\"\nFROM \"&{VAR_SNOWDB_RETAILER}\".FORECAST.\"Fact_RetailerNPSales_OrderPredicted_ML_Outbound\" AS MO\nJOIN \"StoreList\" AS PO\n  ON LTRIM(MO.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", 0)", "saleqty_get_split_ratio_lf": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\", /* ,\"IsSmallFormat\" */\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  LF.\"Day_Of_Week\",\n  LF.\"Week_Of_Year\",\n  \"Weekly_SalesQty\",\n  ROUND(\n    COALESCE(\n      DR_FullMatch.\"DailyRatio\",\n      DR_FallBack1.\"DailyRatio\",\n      DR_FallBack2.\"DailyRatio\",\n      DR_FallBack3.\"AVG_DailyRatio\"\n    ),\n    5\n  ) AS \"SplitRatioSelected\",\n  ROUND(\n    \"Weekly_SalesQty\" * (\n      COALESCE(\n        DR_FullMatch.\"DailyRatio\",\n        DR_FallBack1.\"DailyRatio\",\n        DR_FallBack2.\"DailyRatio\",\n        DR_FallBack3.\"AVG_DailyRatio\"\n      )\n    ),\n    5\n  ) AS \"Weekly_SalesQty_Converted_To_Daily\",\n  CASE\n    WHEN DR_FullMatch.\"DailyRatio\" > 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"BusDate\"\n      ORDER BY DR_FullMatch.\"DailyRatio\"\n    )\n    WHEN DR_FallBack1.\"DailyRatio\" > 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"BusDate\"\n      ORDER BY DR_FallBack1.\"DailyRatio\"\n    )\n    WHEN DR_FallBack2.\"DailyRatio\" > 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"BusDate\"\n      ORDER BY DR_FallBack2.\"DailyRatio\"\n    )\n    ELSE ROW_NUMBER() OVER (\n      PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"BusDate\"\n      ORDER BY DR_FallBack3.\"AVG_DailyRatio\"\n    )\n  END AS \"rn\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"Next14DaysForecastDemand\"\nFROM \"Final_Data_LF_POS_Available_Week\" AS LF\nINNER JOIN \"&{VAR_SNOWDB_MD}\".CALENDAR.\"V_CalDay\" AS CL\n  ON CL.\"DayDate\" = LF.\"BusDate\"\nLEFT JOIN \"Splitted_Daily_Ratio\" AS DR_FullMatch\n  ON CL.\"HolidayName\" = DR_FullMatch.\"Holiday_Name\"\n  AND LF.\"Day_Of_Week\" = DR_FullMatch.\"Day_Of_Week\"\n  AND LF.\"Week_Of_Year\" = DR_FullMatch.\"WeekOfYear\"\n  AND LF.\"IsPromoActivated\" = DR_FullMatch.\"IsPromoActive\"\nLEFT JOIN \"Splitted_Daily_Ratio\" AS DR_FallBack1\n  ON LF.\"Day_Of_Week\" = DR_FallBack1.\"Day_Of_Week\"\n  AND LF.\"Week_Of_Year\" = DR_FallBack1.\"WeekOfYear\"\n  AND LF.\"IsPromoActivated\" = DR_FallBack1.\"IsPromoActive\"\nLEFT JOIN \"Splitted_Daily_Ratio\" AS DR_FallBack2\n  ON LF.\"Day_Of_Week\" = DR_FallBack2.\"Day_Of_Week\"\n  AND LF.\"Week_Of_Year\" = DR_FallBack2.\"WeekOfYear\"\nLEFT JOIN \"Splitted_Daily_Ratio_Avg_On_Day_Of_Week\" AS DR_FallBack3\n  ON LF.\"Day_Of_Week\" = DR_FallBack3.\"Day_Of_Week\"", "splitted_daily_ratio": "SELECT DISTINCT\n  \"Day_Of_Week\",\n  \"IsPromoActive\",\n  \"Holiday_Name\",\n  \"WeekOfYear\",\n  \"DailyRatio\"\nFROM \"&{VAR_SNOWDB_RETAILER}\".FORECAST.\"Config_NPSales_SaleQty_SplitRatio\"", "final_data_lf_pos_available_week": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  FD.\"MaterialNumber\",\n  \"BusDate\",\n  CASE WHEN DAYOFWEEK(\"BusDate\") = 0 THEN 6 ELSE (\n    DAYOFWEEK(\"BusDate\") - 1\n  ) END AS \"Day_Of_Week\",\n  DATE_PART(WEEK, \"BusDate\") AS \"Week_Of_Year\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  \"DeliveryDateRnk\",\n  \"rnk\"\nFROM \"final_data\" AS FD\nWHERE\n  \"IsSmallFormat\" = 0\n  AND \"BusDate\" <= (\n    SELECT\n      \"WeekID_Source_LastDate\"\n    FROM \"Get_Max_WeekId_Date_From_V_Fact_RetailerWeekly\"\n  )", "splitted_daily_ratio_avg_on_day_of_week": "SELECT\n  \"Day_Of_Week\",\n  AVG(\"DailyRatio\") AS \"AVG_DailyRatio\"\nFROM \"&{VAR_SNOWDB_RETAILER}\".FORECAST.\"Config_NPSales_SaleQty_SplitRatio\"\nGROUP BY\n  \"Day_Of_Week\"", "cte_get_expected_prev_weekid": "SELECT DISTINCT\n  (\n    \"WeekID_ISO\"\n  ) AS \"WeekID_From\"\nFROM \"&{VAR_SNOWDB_MD}\".CALENDAR.\"V_CalDay\"\nWHERE\n  \"WeekStarting_ISO\" = DATEADD(WEEK, -14, TO_DATE(SELECT\n    \"Max_Date\"\n  FROM \"CTE_MAX_DT\"))", "cte_max_dt": "SELECT DISTINCT\n  (\n    \"WeekStarting_ISO\"\n  ) AS \"Max_Date\"\nFROM \"&{VAR_SNOWDB_MD}\".CALENDAR.\"V_CalDay\"\nWHERE\n  \"WeekID_ISO\" = (\n    SELECT\n      MAX(\"WeekID\")\n    FROM \"&{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderNPSales_ML_Inbound\"\n  )", "shipment_ordered_data_last_10_days": "SELECT DISTINCT\n  SL.\"CustomerNumber\" AS \"CustomerNumber\",\n  OO.\"ItemNumber\" AS \"MaterialNumber\",\n  \"DSD_CustomerNumber\"\nFROM \"&{VAR_SNOWDB_SALES}\".\"ORDER\".\"V_Fact_DSD_OriginalOrder\" AS OO\nJOIN \"StoreList\" AS SL\n  ON LTRIM(SL.\"DSD_CustomerNumber\", 0) = LTRIM(OO.\"CustomerNumber\", 0)\nJOIN \"&{VAR_SNOWDB_COMMERCIAL}\".TECHNICAL.\"Xref_DSD_AccountBranchMaterial\" AS AM\n  ON LTRIM(OO.\"CustomerNumber\", 0) = LTRIM(AM.\"AccountID\", 0)\n  AND LTRIM(OO.\"ItemNumber\", 0) = LTRIM(AM.\"MaterialID\", 0)\nWHERE\n  OO.\"Type\" = 'O'\n  AND NOT OO.\"OrderStatus\" IN (-1, -2, 99)\n  AND (OO.\"CustomerNumber\", OO.\"ItemNumber\") IN (\n    SELECT DISTINCT\n      \"CustomerNumber\",\n      \"ItemNumber\"\n    FROM \"&{VAR_SNOWDB_SALES}\".\"ORDER\".\"V_Fact_DSD_OriginalOrder\"\n    WHERE\n      \"OrderDate\" >= TO_DATE(CAST(CONVERT_TIMEZONE('UTC', CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 5 /* Ref #1 */\n  )", "final_data_lf_for_pos_not_available": "SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"IsSmallFormat\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  \"SalesQty\",\n  \"Weekly_SalesAmt\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  CASE\n    WHEN NOT \"DeliveryDate\" IS NULL\n    AND \"OrderDate\" IS NULL /* Ref #2 */\n    AND \"DeliveryDate\" > CURRENT_DATE\n    THEN \"DeliveryDate\"\n    ELSE NULL\n  END AS \"DeliveryDateRnk\",\n  IFF(\n    \"DeliveryDateRnk\" IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDateRnk\")\n  ) AS \"rnk\"\nFROM (\n  SELECT DISTINCT\n    IB.\"CustomerNumber\",\n    PO.\"DSD_CustomerNumber\",\n    PO.\"IsSmallFormat\",\n    IB.\"MaterialNumber\",\n    IB.\"BusDate\", /* ,COALESCE(IB.\"OrderDate\", RMD1.\"OrderDate\") AS \"OrderDate\" --Ref #2 */ /* ,COALESCE(IB.\"DeliveryDate\", RMD1.\"DeliveryDate\") AS \"DeliveryDate\" */\n    IB.\"OrderDate\",\n    IB.\"DeliveryDate\",\n    \"IsPOG\" AS \"IsMOD\",\n    \"IsPromoActivated\", /* ,NULL AS \"OnHandQty\" */\n    CASE\n      WHEN \"IsSmallFormat\" = 0\n      THEN COALESCE(COALESCE(DI.\"OnHandQty\", 0) * COALESCE(\"ConvFactorToBase\", 1), 0)\n      ELSE 0\n    END AS \"OnHandQty\", /* ,\"MaxShelfQty\" AS \"Max_ShelfCapacityQty\" */\n    CASE\n      WHEN \"IsSmallFormat\" = 0\n      THEN COALESCE(COALESCE(IB.\"MaxShelfQty\", 0) * COALESCE(\"ConvFactorToBase\", 1), 0)\n      ELSE 0\n    END AS \"Max_ShelfCapacityQty\",\n    NULL AS \"Incremental_Capacity\",\n    IB.\"WeekID\",\n    \"Week_Start\",\n    \"Week_End\",\n    \"Weekly_SalesQty\",\n    \"SingleDay_SalesQty\" AS \"SalesQty\",\n    \"Weekly_SalesAmt\",\n    \"SingleDay_SaleAmt\" AS \"SalesAmt\",\n    COALESCE(IB.\"Intransit_CaseQty\", 0) AS \"Intransit_CaseQty\",\n    COALESCE(IB.\"Ordered_CaseQty\", 0) AS \"Ordered_CaseQty\",\n    COALESCE(IB.\"Delivered_CaseQty\", 0) AS \"Delivered_CaseQty\",\n    COALESCE(IB.\"Invoiced_CaseQty\", 0) AS \"Invoiced_CaseQty\",\n    COALESCE(OP.\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n    COALESCE(OP.\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n    COALESCE(OP.\"Forecast_Demand_Qty\", 0) AS \"Forecast_Demand_Qty\",\n    SUM(COALESCE(OP.\"Forecast_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0)) lesQty\",\n  \"Weekly_SalesAmt\",\n  \"SingleDay_SaleAmt\",\n  \"IsPromoActivated\",\n  DD.\"IsPOG\",\n  DD.\"MaxShelfQty\",\n  OO.\"OrderNumber\",\n  OO.\"OrderDate\",\n  OO.\"CaseQty\" AS \"Ordered_CaseQty\",\n  CASE WHEN I.\"OrderStatus\" = 7 THEN I.\"Caseqty\" ELSE 0 END AS \"Delivered_CaseQty\",\n  I.\"Caseqty\" AS \"Invoiced_CaseQty\",\n  CASE WHEN D.\"OrderStatus\" IN (1, 2, 3, 4) THEN D.\"CaseQty\" ELSE 0 END AS \"Intransit_CaseQty\",\n  D.\"CaseQty\" AS \"ActualDeliveredCaseQty\",\n  \"Source_NPSales\"\nFROM \"Inbound_Prep_DeliveryDates\" AS DD\nLEFT JOIN \"StoreList\" AS SL\n  ON DD.\"CustomerNumber\" = SL.\"DSD_CustomerNumber\"\nLEFT JOIN \"&{VAR_SNOWDB_SALES}\".\"ORDER\".\"V_Fact_DSD_OriginalOrder\" AS OO\n  ON DD.\"DeliveryDate\" = OO.\"DeliveryDate\"\n  AND LTRIM(DD.\"MaterialNumber\", 0) = LTRIM(OO.\"ItemNumber\", 0)\n  AND LTRIM(DD.\"CustomerNumber\", 0) = LTRIM(OO.\"CustomerNumber\", 0)\n  AND NOT OO.\"OrderStatus\" IN (-1, -2, 99)\n  AND OO.\"Type\" = 'O'\nLEFT JOIN \"&{VAR_SNOWDB_SALES}\".DELIVERY.\"V_Fact_DSD_Delivery\" AS D\n  ON OO.\"OrderNumber\" = D.\"OrderNumber\"\n  AND LTRIM(OO.\"CustomerNumber\", 0) = LTRIM(D.\"CustomerNumber\", 0)\n  AND LTRIM(OO.\"ItemNumber\", 0) = LTRIM(D.\"ItemNumber\", 0)\n  AND OO.\"RouteNumber\" = D.\"RouteNumber\"\n  AND OO.\"Type\" = D.\"Type\"\n  AND OO.\"OrderDate\" = D.\"OrderDate\"\n  AND NOT D.\"OrderStatus\" IN (-1, -2, 99)\nLEFT JOIN \"&{VAR_SNOWDB_SALES}\".BILLING.\"V_Fact_DSD_Invoice\" AS I\n  ON OO.\"OrderNumber\" = I.\"OrderNumber\"\n  AND LTRIM(OO.\"CustomerNumber\", 0) = LTRIM(I.\"CustomerNumber\", 0)\n  AND LTRIM(OO.\"ItemNumber\", 0) = LTRIM(I.\"ItemNumber\", 0)\n  AND /* AND OO.\"DeliveryDate\" = I.\"DeliveryDate\" */ OO.\"Type\" = I.\"Detail_InvoiceType\"\n  AND NOT I.\"OrderStatus\" IN (-1, -2, 99)", "inbound_prep_deliverydates": "SELECT\n  \"RetailerName\",\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"CustomerName\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"ScheduledDeliveryDate\"
