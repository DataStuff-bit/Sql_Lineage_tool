    <script>
        var node_sql_map = {"enriched_orders": "SELECT\n  o.order_id,\n  o.customer_id,\n  o.store_id,\n  o.order_date,\n  o.status,\n  o.total_amount,\n  o.discount_amount,\n  o.total_amount - o.discount_amount AS net_amount, /* \u26a0\ufe0f DUP: same as raw_orders.net_amount */\n  s.store_name,\n  s.city,\n  s.region AS store_region\nFROM raw_orders AS o\nJOIN raw_stores AS s\n  ON o.store_id = s.store_id", "raw_orders": "SELECT\n  order_id,\n  customer_id,\n  store_id,\n  order_date,\n  status,\n  total_amount,\n  discount_amount,\n  total_amount - discount_amount AS net_amount /* \u26a0\ufe0f DUP: also in enriched_orders */\nFROM orders\nWHERE\n  order_date >= '2023-01-01'", "raw_stores": "SELECT\n  store_id,\n  store_name,\n  city,\n  state,\n  region,\n  store_type,\n  open_date\nFROM stores\nWHERE\n  is_active = 1", "enriched_order_items": "SELECT\n  oi.item_id,\n  oi.order_id,\n  oi.product_id,\n  oi.quantity,\n  oi.unit_price,\n  oi.quantity * oi.unit_price AS line_total, /* \u26a0\ufe0f DUP: same as raw_order_items.line_total */\n  p.product_name,\n  p.category,\n  p.brand,\n  p.cost_price,\n  (\n    oi.unit_price - p.cost_price\n  ) * oi.quantity AS item_profit\nFROM raw_order_items AS oi\nJOIN raw_products AS p\n  ON oi.product_id = p.product_id", "raw_order_items": "SELECT\n  item_id,\n  order_id,\n  product_id,\n  quantity,\n  unit_price,\n  quantity * unit_price AS line_total /* \u26a0\ufe0f DUP: also in order_item_enriched */\nFROM order_items", "raw_products": "SELECT\n  product_id,\n  product_name,\n  category,\n  sub_category,\n  brand,\n  unit_price,\n  cost_price,\n  unit_price - cost_price AS margin /* \u26a0\ufe0f DUP: also in product_margin */\nFROM products\nWHERE\n  is_listed = 1", "customer_profile": "SELECT\n  c.customer_id,\n  c.first_name,\n  c.last_name,\n  c.first_name || ' ' || c.last_name AS full_name, /* \u26a0\ufe0f DUP: same as raw_customers.full_name */\n  c.email,\n  c.region,\n  c.signup_date,\n  DATEDIFF('day', c.signup_date, CURRENT_DATE) AS customer_age_days\nFROM raw_customers AS c", "raw_customers": "SELECT\n  customer_id,\n  first_name,\n  last_name,\n  first_name || ' ' || last_name AS full_name, /* \u26a0\ufe0f DUP: also in customer_profile */\n  email,\n  phone,\n  region,\n  signup_date\nFROM customers\nWHERE\n  is_active = 1", "product_margin": "SELECT\n  product_id,\n  product_name,\n  category,\n  brand,\n  unit_price,\n  cost_price,\n  unit_price - cost_price AS margin, /* \u26a0\ufe0f DUP: same as raw_products.margin */\n  ROUND((\n    unit_price - cost_price\n  ) / NULLIF(unit_price, 0) * 100, 2) AS margin_pct\nFROM raw_products", "order_item_enriched": "SELECT\n  ei.item_id,\n  ei.order_id,\n  ei.product_id,\n  ei.quantity,\n  ei.unit_price,\n  ei.line_total, /* \u26a0\ufe0f DUP: flows from enriched_order_items */\n  ei.item_profit,\n  pm.margin_pct,\n  pm.brand\nFROM enriched_order_items AS ei\nJOIN product_margin AS pm\n  ON ei.product_id = pm.product_id", "return_enriched": "SELECT\n  r.return_id,\n  r.order_id,\n  r.product_id,\n  r.return_date,\n  r.reason,\n  r.refund_amount,\n  p.product_name,\n  p.category\nFROM raw_returns AS r\nJOIN raw_products AS p\n  ON r.product_id = p.product_id", "raw_returns": "SELECT\n  return_id,\n  order_id,\n  product_id,\n  return_date,\n  reason,\n  refund_amount\nFROM returns\nWHERE\n  return_date >= '2023-01-01'", "promo_orders": "SELECT\n  o.order_id,\n  o.customer_id,\n  o.discount_amount,\n  pr.promo_id,\n  pr.promo_name,\n  pr.promo_type,\n  pr.discount_pct\nFROM raw_orders AS o\nJOIN raw_promotions AS pr\n  ON o.order_date BETWEEN pr.start_date AND pr.end_date", "raw_promotions": "SELECT\n  promo_id,\n  promo_name,\n  promo_type,\n  discount_pct,\n  start_date,\n  end_date\nFROM promotions\nWHERE\n  is_active = 1", "inventory_status": "SELECT\n  i.product_id,\n  i.store_id,\n  i.stock_qty,\n  i.reorder_level,\n  CASE WHEN i.stock_qty <= i.reorder_level THEN 'Low' ELSE 'OK' END AS stock_status,\n  p.product_name,\n  p.category\nFROM raw_inventory AS i\nJOIN raw_products AS p\n  ON i.product_id = p.product_id", "raw_inventory": "SELECT\n  product_id,\n  store_id,\n  stock_qty,\n  reorder_level,\n  last_restocked\nFROM inventory", "store_employee_count": "SELECT\n  store_id,\n  COUNT(employee_id) AS total_employees,\n  AVG(salary) AS avg_salary,\n  SUM(salary) AS total_salary_cost\nFROM raw_employees\nGROUP BY\n  store_id", "raw_employees": "SELECT\n  employee_id,\n  store_id,\n  name AS employee_name,\n  role,\n  hire_date,\n  salary\nFROM employees\nWHERE\n  is_active = 1", "orders_by_customer": "SELECT\n  customer_id,\n  COUNT(order_id) AS total_orders,\n  SUM(net_amount) AS total_spent,\n  AVG(net_amount) AS avg_order_value,\n  MIN(order_date) AS first_order_date,\n  MAX(order_date) AS last_order_date\nFROM enriched_orders\nGROUP BY\n  customer_id", "orders_by_store": "SELECT\n  store_id,\n  store_name,\n  COUNT(order_id) AS total_orders,\n  SUM(net_amount) AS total_revenue,\n  AVG(net_amount) AS avg_order_value, /* \u26a0\ufe0f DUP: same name as orders_by_customer.avg_order_value */\n  COUNT(DISTINCT customer_id) AS unique_customers\nFROM enriched_orders\nGROUP BY\n  store_id,\n  store_name", "revenue_by_category": "SELECT\n  category,\n  SUM(line_total) AS total_revenue,\n  SUM(item_profit) AS total_profit,\n  COUNT(DISTINCT order_id) AS total_orders,\n  AVG(margin_pct) AS avg_margin_pct\nFROM order_item_enriched\nGROUP BY\n  category", "revenue_by_brand": "SELECT\n  brand,\n  SUM(line_total) AS total_revenue, /* \u26a0\ufe0f DUP: same name as revenue_by_category.total_revenue */\n  SUM(item_profit) AS total_profit,\n  COUNT(DISTINCT order_id) AS total_orders\nFROM order_item_enriched\nGROUP BY\n  brand", "returns_by_product": "SELECT\n  product_id,\n  product_name,\n  category,\n  COUNT(return_id) AS total_returns,\n  SUM(refund_amount) AS total_refunded\nFROM return_enriched\nGROUP BY\n  product_id,\n  product_name,\n  category", "returns_by_reason": "SELECT\n  reason,\n  COUNT(return_id) AS total_returns,\n  SUM(refund_amount) AS total_refunded /* \u26a0\ufe0f DUP: same name as returns_by_product.total_refunded */\nFROM return_enriched\nGROUP BY\n  reason", "monthly_revenue": "SELECT\n  DATE_TRUNC('MONTH', order_date) AS month,\n  SUM(net_amount) AS total_revenue,\n  COUNT(order_id) AS total_orders,\n  COUNT(DISTINCT customer_id) AS unique_customers\nFROM enriched_orders\nGROUP BY\n  DATE_TRUNC('MONTH', order_date)", "weekly_revenue": "SELECT\n  DATE_TRUNC('WEEK', order_date) AS week,\n  SUM(net_amount) AS total_revenue, /* \u26a0\ufe0f DUP: same name as monthly_revenue.total_revenue */\n  COUNT(order_id) AS total_orders\nFROM enriched_orders\nGROUP BY\n  DATE_TRUNC('WEEK', order_date)", "product_review_summary": "SELECT\n  product_id,\n  COUNT(review_id) AS total_reviews,\n  AVG(rating) AS avg_rating,\n  SUM(CASE WHEN rating >= 4 THEN 1 ELSE 0 END) AS positive_reviews\nFROM raw_reviews\nGROUP BY\n  product_id", "raw_reviews": "SELECT\n  review_id,\n  product_id,\n  customer_id,\n  rating,\n  review_date,\n  review_text\nFROM product_reviews\nWHERE\n  NOT rating IS NULL", "promo_performance": "SELECT\n  promo_id,\n  promo_name,\n  promo_type,\n  COUNT(order_id) AS total_orders,\n  SUM(discount_amount) AS total_discount_given,\n  AVG(discount_pct) AS avg_discount_pct\nFROM promo_orders\nGROUP BY\n  promo_id,\n  promo_name,\n  promo_type", "customer_lifetime_value": "SELECT\n  cp.customer_id,\n  cp.full_name,\n  cp.region,\n  obc.total_orders,\n  obc.total_spent,\n  obc.avg_order_value,\n  obc.first_order_date,\n  obc.last_order_date,\n  DATEDIFF('day', obc.first_order_date, obc.last_order_date) AS active_days\nFROM customer_profile AS cp\nJOIN orders_by_customer AS obc\n  ON cp.customer_id = obc.customer_id", "customer_segments": "SELECT\n  customer_id,\n  full_name,\n  total_spent,\n  total_orders,\n  avg_order_value,\n  CASE\n    WHEN total_spent > 10000\n    THEN 'Platinum'\n    WHEN total_spent > 5000\n    THEN 'Gold'\n    WHEN total_spent > 1000\n    THEN 'Silver'\n    ELSE 'Bronze'\n  END AS segment\nFROM customer_lifetime_value", "rfm_scores": "SELECT\n  customer_id,\n  last_order_date,\n  total_orders AS frequency,\n  total_spent AS monetary,\n  DATEDIFF('day', last_order_date, CURRENT_DATE) AS recency_days\nFROM customer_lifetime_value", "store_performance": "SELECT\n  obs.store_id,\n  obs.store_name,\n  obs.total_revenue,\n  obs.total_orders,\n  obs.avg_order_value,\n  obs.unique_customers,\n  sec.total_employees,\n  sec.total_salary_cost,\n  ROUND(obs.total_revenue / NULLIF(sec.total_employees, 0), 2) AS revenue_per_employee\nFROM orders_by_store AS obs\nJOIN store_employee_count AS sec\n  ON obs.store_id = sec.store_id", "product_performance": "SELECT\n  oie.product_id,\n  oie.product_name,\n  SUM(oie.line_total) AS total_revenue,\n  SUM(oie.item_profit) AS total_profit,\n  SUM(oie.quantity) AS total_units_sold,\n  AVG(oie.margin_pct) AS avg_margin_pct,\n  prs.avg_rating,\n  prs.total_reviews\nFROM order_item_enriched AS oie\nLEFT JOIN product_review_summary AS prs\n  ON oie.product_id = prs.product_id\nGROUP BY\n  oie.product_id,\n  oie.product_name,\n  prs.avg_rating,\n  prs.total_reviews", "return_rate_by_product": "SELECT\n  pp.product_id,\n  pp.product_name,\n  pp.total_units_sold,\n  COALESCE(rbp.total_returns, 0) AS total_returns,\n  ROUND(COALESCE(rbp.total_returns, 0) / NULLIF(pp.total_units_sold, 0) * 100, 2) AS return_rate_pct\nFROM product_performance AS pp\nLEFT JOIN returns_by_product AS rbp\n  ON pp.product_id = rbp.product_id", "low_stock_alert": "SELECT\n  product_id,\n  store_id,\n  product_name,\n  category,\n  stock_qty,\n  reorder_level,\n  stock_status\nFROM inventory_status\nWHERE\n  stock_status = 'Low'", "top_customers": "SELECT\n  customer_id,\n  full_name,\n  segment,\n  total_spent,\n  total_orders,\n  RANK() OVER (ORDER BY total_spent DESC) AS spend_rank,\n  RANK() OVER (ORDER BY total_orders DESC) AS order_rank\nFROM customer_segments", "top_products": "SELECT\n  product_id,\n  product_name,\n  total_revenue,\n  total_profit,\n  avg_margin_pct,\n  avg_rating,\n  RANK() OVER (ORDER BY total_revenue DESC) AS revenue_rank,\n  RANK() OVER (ORDER BY total_profit DESC) AS profit_rank\nFROM product_performance", "top_stores": "SELECT\n  store_id,\n  store_name,\n  total_revenue,\n  total_orders,\n  revenue_per_employee,\n  RANK() OVER (ORDER BY total_revenue DESC) AS revenue_rank\nFROM store_performance", "category_rank": "SELECT\n  category,\n  total_revenue,\n  total_profit,\n  avg_margin_pct,\n  RANK() OVER (ORDER BY total_revenue DESC) AS revenue_rank,\n  RANK() OVER (ORDER BY avg_margin_pct DESC) AS margin_rank\nFROM revenue_by_category", "monthly_growth": "SELECT\n  month,\n  total_revenue,\n  total_orders,\n  LAG(total_revenue) OVER (ORDER BY month) AS prev_month_revenue,\n  ROUND(\n    (\n      total_revenue - LAG(total_revenue) OVER (ORDER BY month)\n    ) / NULLIF(LAG(total_revenue) OVER (ORDER BY month), 0) * 100,\n    2\n  ) AS mom_growth_pct\nFROM monthly_revenue", "high_return_products": "SELECT\n  product_id,\n  product_name,\n  total_units_sold,\n  total_returns,\n  return_rate_pct\nFROM return_rate_by_product\nWHERE\n  return_rate_pct > 10", "at_risk_customers": "SELECT\n  customer_id,\n  last_order_date,\n  recency_days,\n  frequency,\n  monetary\nFROM rfm_scores\nWHERE\n  recency_days > 90", "customer_360": "SELECT\n  tc.customer_id,\n  tc.full_name,\n  tc.segment,\n  tc.total_spent,\n  tc.total_orders,\n  tc.spend_rank,\n  tc.order_rank,\n  rfm.recency_days,\n  rfm.frequency,\n  rfm.monetary, /* \u26a0\ufe0f DUP: monetary = total_spent (same value, different name) */\n  CASE WHEN NOT arc.customer_id IS NULL THEN 'At Risk' ELSE 'Active' END AS health_status\nFROM top_customers AS tc\nJOIN rfm_scores AS rfm\n  ON tc.customer_id = rfm.customer_id\nLEFT JOIN at_risk_customers AS arc\n  ON tc.customer_id = arc.customer_id", "product_360": "SELECT\n  tp.product_id,\n  tp.product_name,\n  tp.total_revenue,\n  tp.total_profit,\n  tp.avg_margin_pct,\n  tp.avg_rating,\n  tp.revenue_rank,\n  tp.profit_rank,\n  rrp.return_rate_pct,\n  CASE WHEN NOT hrp.product_id IS NULL THEN 'High Return Risk' ELSE 'Normal' END AS return_risk,\n  inv.stock_status\nFROM top_products AS tp\nLEFT JOIN return_rate_by_product AS rrp\n  ON tp.product_id = rrp.product_id\nLEFT JOIN high_return_products AS hrp\n  ON tp.product_id = hrp.product_id\nLEFT JOIN low_stock_alert AS inv\n  ON tp.product_id = inv.product_id", "store_360": "SELECT\n  ts.store_id,\n  ts.store_name,\n  ts.total_revenue,\n  ts.total_orders,\n  ts.revenue_per_employee,\n  ts.revenue_rank,\n  sp.unique_customers,\n  sp.total_employees\nFROM top_stores AS ts\nJOIN store_performance AS sp\n  ON ts.store_id = sp.store_id", "executive_summary": "SELECT\n  SUM(total_revenue) AS grand_total_revenue,\n  SUM(total_orders) AS grand_total_orders,\n  AVG(avg_margin_pct) AS blended_margin_pct,\n  COUNT(*) AS total_products_sold\nFROM product_360", "final_dashboard": "SELECT\n  c.customer_id, /* Customer */\n  c.full_name,\n  c.segment,\n  c.total_spent,\n  c.health_status,\n  c.recency_days, /* Product */\n  p.product_id,\n  p.product_name,\n  p.total_revenue, /* \u26a0\ufe0f DUP: total_revenue appears from both product and store joins */\n  p.return_risk,\n  p.stock_status, /* Store */\n  s.store_id,\n  s.store_name,\n  s.total_revenue AS store_revenue, /* aliased to avoid conflict */ /* Summary */\n  e.grand_total_revenue,\n  e.blended_margin_pct\nFROM customer_360 AS c\nCROSS JOIN executive_summary AS e\nLEFT JOIN product_360 AS p\n  ON 1 = 1 /* illustrative join */\nLEFT JOIN store_360 AS s\n  ON 1 = 1 /* illustrative join */"};

                var node = params.nodes[0];
                var sql = node_sql_map[node] || "No SQL available";

                document.getElementById("sql-viewer").innerText = sql;
            }
        });
