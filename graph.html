k\u0026quot;\n  /*     ,iff(\u0026quot;rnk\u0026quot; IS NULL, NULL, RANK() OVER ( */ /* PARTITION BY a.\u0026quot;CustomerNumber\u0026quot; */ /* ,a.\u0026quot;MaterialNumber\u0026quot; ORDER BY CASE WHEN \u0026quot;rnk\u0026quot; IS NULL THEN 0 ELSE \u0026quot;rnk\u0026quot; END  desc */ /* )) AS \u0026quot;maxrnk\u0026quot;        */\n  FROM \u0026quot;Cte_CummDemand_3\u0026quot; AS a\n  LEFT JOIN \u0026quot;Cte_CummDemand_5_CurrentDates\u0026quot; AS b\n    ON a.\u0026quot;CustomerNumber\u0026quot; = b.\u0026quot;CustomerNumber\u0026quot;\n    AND a.\u0026quot;MaterialNumber\u0026quot; = b.\u0026quot;MaterialNumber\u0026quot;\n    AND a.\u0026quot;rnk_2\u0026quot; = b.\u0026quot;rnk1\u0026quot;\n  JOIN \u0026quot;Cte_CummDemand_4\u0026quot; AS c\n    ON a.\u0026quot;CustomerNumber\u0026quot; = c.\u0026quot;CustomerNumber\u0026quot;\n    AND a.\u0026quot;MaterialNumber\u0026quot; = c.\u0026quot;MaterialNumber\u0026quot;\n    AND a.\u0026quot;rnk1\u0026quot; = c.\u0026quot;rnk1\u0026quot;\n)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  *\n  EXCLUDE (\"NextToNext_DlvryEvdyDmndQtyPBI\", \"NextToNext_DlvryPrmoDmndQtyPBI\", \"NextToNext_DlvryFcstDmndQtyPBI\"),\n  IFF(\n    \"rnk\" IS NULL,\n    NULL,\n    RANK() OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY CASE WHEN \"rnk\" IS NULL THEN 0 ELSE \"rnk\" END DESC\n    )\n  ) AS \"maxrnk\",\n  CASE WHEN \"maxrnk\" \u003e 1 THEN \"NextToNext_DlvryEvdyDmndQtyPBI\" ELSE 0 END AS \"NextToNext_DlvryEvdyDmndQtyPBI\",\n  CASE WHEN \"maxrnk\" \u003e 1 THEN \"NextToNext_DlvryPrmoDmndQtyPBI\" ELSE 0 END AS \"NextToNext_DlvryPrmoDmndQtyPBI\",\n  CASE WHEN \"maxrnk\" \u003e 1 THEN \"NextToNext_DlvryFcstDmndQtyPBI\" ELSE 0 END AS \"NextToNext_DlvryFcstDmndQtyPBI\"\nFROM (\n  SELECT\n    a.\"CustomerNumber\",\n    a.\"MaterialNumber\",\n    a.\"BusDate\",\n    a.\"OrderDate\",\n    a.\"DeliveryDate\",\n    a.\"InvoiceDate\",\n    a.\"EveryDay_Demand_Qty\",\n    a.\"Promo_Demand_Qty\",\n    a.\"ForecastDemandQty\",\n    a.\"NextDeliveryDate\",\n    a.\"NextToNextDeliveryDate\",\n    COALESCE((\n      b.\"EveryDay_Demand_Qty\"\n    ), 0) AS \"NextToNext_DlvryEvdyDmndQty\",\n    COALESCE((\n      b.\"Promo_Demand_Qty\"\n    ), 0) AS \"NextToNext_DlvryPrmoDmndQty\",\n    COALESCE((\n      b.\"ForecastDemandQty\"\n    ), 0) AS \"NextToNext_DlvryFcstDmndQty\",\n    COALESCE((\n      c.\"EveryDay_Demand_Qty\"\n    ), 0) AS \"NextToNext_DlvryEvdyDmndQtyPBI\",\n    COALESCE((\n      c.\"Promo_Demand_Qty\"\n    ), 0) AS \"NextToNext_DlvryPrmoDmndQtyPBI\",\n    COALESCE((\n      c.\"ForecastDemandQty\"\n    ), 0) AS \"NextToNext_DlvryFcstDmndQtyPBI\",\n    CASE\n      WHEN NOT a.\"DeliveryDate\" IS NULL\n      AND a.\"OrderDate\" IS NULL\n      AND a.\"DeliveryDate\" \u003e TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      THEN a.\"DeliveryDate\"\n      ELSE NULL\n    END AS \"DeliveryDateRnk\",\n    IFF(\n      \"DeliveryDateRnk\" IS NULL,\n      NULL,\n      ROW_NUMBER() OVER (PARTITION BY a.\"CustomerNumber\", a.\"MaterialNumber\" ORDER BY \"DeliveryDateRnk\")\n    ) AS \"rnk\"\n  /*     ,iff(\"rnk\" IS NULL, NULL, RANK() OVER ( */ /* PARTITION BY a.\"CustomerNumber\" */ /* ,a.\"MaterialNumber\" ORDER BY CASE WHEN \"rnk\" IS NULL THEN 0 ELSE \"rnk\" END  desc */ /* )) AS \"maxrnk\"        */\n  FROM \"Cte_CummDemand_3\" AS a\n  LEFT JOIN \"Cte_CummDemand_5_CurrentDates\" AS b\n    ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n    AND a.\"rnk_2\" = b.\"rnk1\"\n  JOIN \"Cte_CummDemand_4\" AS c\n    ON a.\"CustomerNumber\" = c.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = c.\"MaterialNumber\"\n    AND a.\"rnk1\" = c.\"rnk1\"\n)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_5_currentdates", "label": "cte_cummdemand_5_currentdates", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_cummdemand_5_currentdates\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_cummdemand_4_currentdates\u003cbr\u003eUsed by  (1): cte_cummdemand_final\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003e/* This CTE calculates cumulative sums of daily, promotional, and forecast demand quantities by customer, material, and delivery rank, enabling analysis of total demand over time. */\nSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;rnk1\u0026quot;,\n  SUM(\u0026quot;EveryDay_Demand_Qty\u0026quot;) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;rnk1\u0026quot;) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  SUM(\u0026quot;Promo_Demand_Qty\u0026quot;) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;rnk1\u0026quot;) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n  SUM(\u0026quot;ForecastDemandQty\u0026quot;) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;rnk1\u0026quot;) AS \u0026quot;ForecastDemandQty\u0026quot;\nFROM \u0026quot;Cte_CummDemand_4_CurrentDates\u0026quot; AS a\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* This CTE calculates cumulative sums of daily, promotional, and forecast demand quantities by customer, material, and delivery rank, enabling analysis of total demand over time. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\",\n  SUM(\"EveryDay_Demand_Qty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"EveryDay_Demand_Qty\",\n  SUM(\"Promo_Demand_Qty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"Promo_Demand_Qty\",\n  SUM(\"ForecastDemandQty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"ForecastDemandQty\"\nFROM \"Cte_CummDemand_4_CurrentDates\" AS a`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_3", "label": "cte_cummdemand_3", "opacity": 1.0, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003ecte_cummdemand_3\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_cummdemand_2\u003cbr\u003eUsed by  (2): cte_cummdemand_final, cte_cummdemand_4\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003e/* This CTE assigns a dense rank to each entry for customer and material combinations based on the new delivery date, allowing for easy identification of unique delivery sequences. */\nSELECT\n  *,\n  DENSE_RANK() OVER (\n    PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;\n    ORDER BY CASE\n      WHEN \u0026quot;BusDate\u0026quot; \u0026gt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      THEN \u0026quot;rnk1\u0026quot;\n    END\n  ) AS \u0026quot;rnk_2\u0026quot;\nFROM (\n  SELECT\n    \u0026quot;CustomerNumber\u0026quot;,\n    \u0026quot;MaterialNumber\u0026quot;,\n    \u0026quot;BusDate\u0026quot;,\n    \u0026quot;OrderDate\u0026quot;,\n    \u0026quot;DeliveryDate\u0026quot;,\n    \u0026quot;InvoiceDate\u0026quot;,\n    \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n    \u0026quot;Promo_Demand_Qty\u0026quot;,\n    \u0026quot;ForecastDemandQty\u0026quot;,\n    \u0026quot;NextDeliveryDate\u0026quot;,\n    \u0026quot;NextToNextDeliveryDate\u0026quot;,\n    \u0026quot;NewDeliveryDate\u0026quot;, /* * */\n    DENSE_RANK() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;NewDeliveryDate\u0026quot;) AS \u0026quot;rnk1\u0026quot;\n  FROM \u0026quot;Cte_CummDemand_2\u0026quot;\n)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* This CTE assigns a dense rank to each entry for customer and material combinations based on the new delivery date, allowing for easy identification of unique delivery sequences. */\nSELECT\n  *,\n  DENSE_RANK() OVER (\n    PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n    ORDER BY CASE\n      WHEN \"BusDate\" \u003e= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      THEN \"rnk1\"\n    END\n  ) AS \"rnk_2\"\nFROM (\n  SELECT\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    \"BusDate\",\n    \"OrderDate\",\n    \"DeliveryDate\",\n    \"InvoiceDate\",\n    \"EveryDay_Demand_Qty\",\n    \"Promo_Demand_Qty\",\n    \"ForecastDemandQty\",\n    \"NextDeliveryDate\",\n    \"NextToNextDeliveryDate\",\n    \"NewDeliveryDate\", /* * */\n    DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"NewDeliveryDate\") AS \"rnk1\"\n  FROM \"Cte_CummDemand_2\"\n)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_4", "label": "cte_cummdemand_4", "opacity": 1.0, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003ecte_cummdemand_4\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_cummdemand_3\u003cbr\u003eUsed by  (2): cte_cummdemand_final, cte_cummdemand_5\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003e/* This CTE aggregates daily and promotional demand quantities along with forecast demand by customer, material, and rank, providing a summarized view of demand metrics across different delivery ranks. */\nSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;rnk1\u0026quot;,\n  SUM(\u0026quot;EveryDay_Demand_Qty\u0026quot;) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  SUM(\u0026quot;Promo_Demand_Qty\u0026quot;) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n  SUM(\u0026quot;ForecastDemandQty\u0026quot;) AS \u0026quot;ForecastDemandQty\u0026quot;\nFROM \u0026quot;Cte_CummDemand_3\u0026quot; AS a\nGROUP BY\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;rnk1\u0026quot;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* This CTE aggregates daily and promotional demand quantities along with forecast demand by customer, material, and rank, providing a summarized view of demand metrics across different delivery ranks. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\",\n  SUM(\"EveryDay_Demand_Qty\") AS \"EveryDay_Demand_Qty\",\n  SUM(\"Promo_Demand_Qty\") AS \"Promo_Demand_Qty\",\n  SUM(\"ForecastDemandQty\") AS \"ForecastDemandQty\"\nFROM \"Cte_CummDemand_3\" AS a\nGROUP BY\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_2", "label": "cte_cummdemand_2", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_cummdemand_2\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_cummdemand_1\u003cbr\u003eUsed by  (1): cte_cummdemand_3\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003e/* This CTE adds a new delivery date for each customer and material combination by capturing the last available delivery date, replacing any nulls with a default date of \u0026#x27;1900-01-01\u0026#x27;. */\nSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;InvoiceDate\u0026quot;,\n  \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  \u0026quot;Promo_Demand_Qty\u0026quot;,\n  \u0026quot;ForecastDemandQty\u0026quot;,\n  \u0026quot;NextDeliveryDate\u0026quot;,\n  \u0026quot;NextToNextDeliveryDate\u0026quot;, /* * */\n  COALESCE(\n    LAST_VALUE(\u0026quot;DeliveryDate\u0026quot;) IGNORE NULLS OVER (\n      PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;\n      ORDER BY \u0026quot;BusDate\u0026quot; ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ),\n    \u0026#x27;1900-01-01\u0026#x27;\n  ) AS \u0026quot;NewDeliveryDate\u0026quot;\nFROM \u0026quot;Cte_CummDemand_1\u0026quot;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* This CTE adds a new delivery date for each customer and material combination by capturing the last available delivery date, replacing any nulls with a default date of \u00271900-01-01\u0027. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"ForecastDemandQty\",\n  \"NextDeliveryDate\",\n  \"NextToNextDeliveryDate\", /* * */\n  COALESCE(\n    LAST_VALUE(\"DeliveryDate\") IGNORE NULLS OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY \"BusDate\" ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ),\n    \u00271900-01-01\u0027\n  ) AS \"NewDeliveryDate\"\nFROM \"Cte_CummDemand_1\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_1", "label": "cte_cummdemand_1", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_cummdemand_1\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): final_data\u003cbr\u003eUsed by  (1): cte_cummdemand_2\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003e/* This CTE extracts cumulative demand data, including daily and promotional quantities, along with forecasted demand and the next two delivery dates for each customer and material combination. */\nSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;InvoiceDate\u0026quot;,\n  COALESCE(\u0026quot;EveryDay_Demand_Qty\u0026quot;, 0) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  COALESCE(\u0026quot;Promo_Demand_Qty\u0026quot;, 0) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n  COALESCE(\u0026quot;Forecast_Demand_Qty\u0026quot;, 0) AS \u0026quot;ForecastDemandQty\u0026quot;,\n  LEAD(\u0026quot;DeliveryDate\u0026quot;, 1) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;NextDeliveryDate\u0026quot;,\n  LEAD(\u0026quot;DeliveryDate\u0026quot;, 2) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;NextToNextDeliveryDate\u0026quot;\nFROM \u0026quot;final_data\u0026quot;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* This CTE extracts cumulative demand data, including daily and promotional quantities, along with forecasted demand and the next two delivery dates for each customer and material combination. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  COALESCE(\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n  COALESCE(\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n  COALESCE(\"Forecast_Demand_Qty\", 0) AS \"ForecastDemandQty\",\n  LEAD(\"DeliveryDate\", 1) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\") AS \"NextDeliveryDate\",\n  LEAD(\"DeliveryDate\", 2) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\") AS \"NextToNextDeliveryDate\"\nFROM \"final_data\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "orderpredicted", "label": "orderpredicted", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003eorderpredicted\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_storelist\u003cbr\u003eUsed by  (1): final_data\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;BusDate\u0026quot;,\n  MO.\u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  COALESCE(\u0026quot;EverydayDemandQty\u0026quot;, 0) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  COALESCE(\u0026quot;PromoLiftQty\u0026quot;, 0) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n  COALESCE(\u0026quot;ForecastedSalesQty\u0026quot;, 0) AS \u0026quot;Forecast_Demand_Qty\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_RETAILER}\u0026quot;.FORECAST.\u0026quot;Fact_RetailerShpmnt_OrderPredicted_ML_Outbound\u0026quot; AS MO\nJOIN \u0026quot;CTE_StoreList\u0026quot; AS PO\n  ON LTRIM(MO.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(PO.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"BusDate\",\n  MO.\"CustomerNumber\",\n  \"MaterialNumber\",\n  COALESCE(\"EverydayDemandQty\", 0) AS \"EveryDay_Demand_Qty\",\n  COALESCE(\"PromoLiftQty\", 0) AS \"Promo_Demand_Qty\",\n  COALESCE(\"ForecastedSalesQty\", 0) AS \"Forecast_Demand_Qty\"\nFROM \"\u0026{VAR_SNOWDB_RETAILER}\".FORECAST.\"Fact_RetailerShpmnt_OrderPredicted_ML_Outbound\" AS MO\nJOIN \"CTE_StoreList\" AS PO\n  ON LTRIM(MO.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", \u00270\u0027)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_storelist", "label": "cte_storelist", "opacity": 1.0, "shadow": true, "shape": "box", "size": 40, "title": "\n    \u003cb\u003ecte_storelist\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (0): \u2014\u003cbr\u003eUsed by  (6): orderpredicted, inbound_prep_mod, final_data, cte_tier1_stores, orderrecommqty, inbound_prep_nonmod\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;,\n  \u0026quot;NationalChainName\u0026quot;,\n  \u0026quot;CustomerName\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_MD}\u0026quot;.TECHNICAL.\u0026quot;V_PerfOrderShpmnt_StoreList\u0026quot;\nWHERE\n  NOT \u0026quot;DSD_CustomerNumber\u0026quot; IS NULL\n  AND \u0026quot;NationalChainID\u0026quot; IN (\n    \u0026#x27;0001001518\u0026#x27;,\n    \u0026#x27;0001001836\u0026#x27;,\n    \u0026#x27;0001000741\u0026#x27;,\n    \u0026#x27;0001000410\u0026#x27;,\n    \u0026#x27;0001015614\u0026#x27;,\n    \u0026#x27;0001016104\u0026#x27;,\n    \u0026#x27;0001016106\u0026#x27;,\n    \u0026#x27;0001014910\u0026#x27;,\n    \u0026#x27;0001001628\u0026#x27;,\n    \u0026#x27;0001015610\u0026#x27;,\n    \u0026#x27;0001013185\u0026#x27;,\n    \u0026#x27;0001017095\u0026#x27;\n  )\n  AND \u0026quot;PBIBranch\u0026quot; = 1 /* commented on 23rd jan to move all stores in UDS */\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"NationalChainName\",\n  \"CustomerName\"\nFROM \"\u0026{VAR_SNOWDB_MD}\".TECHNICAL.\"V_PerfOrderShpmnt_StoreList\"\nWHERE\n  NOT \"DSD_CustomerNumber\" IS NULL\n  AND \"NationalChainID\" IN (\n    \u00270001001518\u0027,\n    \u00270001001836\u0027,\n    \u00270001000741\u0027,\n    \u00270001000410\u0027,\n    \u00270001015614\u0027,\n    \u00270001016104\u0027,\n    \u00270001016106\u0027,\n    \u00270001014910\u0027,\n    \u00270001001628\u0027,\n    \u00270001015610\u0027,\n    \u00270001013185\u0027,\n    \u00270001017095\u0027\n  )\n  AND \"PBIBranch\" = 1 /* commented on 23rd jan to move all stores in UDS */`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_agg_last60dayorderqty", "label": "cte_agg_last60dayorderqty", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_agg_last60dayorderqty\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_cummdemand_final_agg_1\u003cbr\u003eUsed by  (1): cte_cummdemand_final_agg_2\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  SUM(CASE WHEN \u0026quot;ForecastDemandQty\u0026quot; \u0026gt; 0 THEN 1 ELSE 0 END) AS \u0026quot;non_zero_forecast_days\u0026quot;,\n  COUNT(DISTINCT \u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;Delivery_Cnt_Last60\u0026quot;,\n  CASE\n    WHEN \u0026quot;non_zero_forecast_days\u0026quot; \u0026lt; 80\n    THEN SUM(\u0026quot;Ordered_CaseQty\u0026quot;)\n    ELSE SUM(\u0026quot;ForecastDemandQty\u0026quot;)\n  END AS \u0026quot;ForecastDemandQty_Agg_Last60\u0026quot;,\n  SUM(\u0026quot;Ordered_CaseQty\u0026quot;) AS \u0026quot;Ordered_CaseQty_Agg_Last60\u0026quot;,\n  SUM(\u0026quot;Invoiced_CaseQty\u0026quot;) AS \u0026quot;Invoiced_CaseQty_Agg_Last60\u0026quot;\n/* sum(\u0026quot;ForecastDemandQty\u0026quot;) as \u0026quot;ForecastDemandQty_Agg_Last60\u0026quot;, */\nFROM \u0026quot;Cte_CummDemand_final_agg_1\u0026quot;\nWHERE\n  \u0026quot;BusDate\u0026quot; BETWEEN TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 AND TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) /* 60 */\nGROUP BY ALL\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  SUM(CASE WHEN \"ForecastDemandQty\" \u003e 0 THEN 1 ELSE 0 END) AS \"non_zero_forecast_days\",\n  COUNT(DISTINCT \"DeliveryDate\") AS \"Delivery_Cnt_Last60\",\n  CASE\n    WHEN \"non_zero_forecast_days\" \u003c 80\n    THEN SUM(\"Ordered_CaseQty\")\n    ELSE SUM(\"ForecastDemandQty\")\n  END AS \"ForecastDemandQty_Agg_Last60\",\n  SUM(\"Ordered_CaseQty\") AS \"Ordered_CaseQty_Agg_Last60\",\n  SUM(\"Invoiced_CaseQty\") AS \"Invoiced_CaseQty_Agg_Last60\"\n/* sum(\"ForecastDemandQty\") as \"ForecastDemandQty_Agg_Last60\", */\nFROM \"Cte_CummDemand_final_agg_1\"\nWHERE\n  \"BusDate\" BETWEEN TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 AND TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) /* 60 */\nGROUP BY ALL`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_final_agg_1", "label": "cte_cummdemand_final_agg_1", "opacity": 1.0, "shadow": true, "shape": "box", "size": 40, "title": "\n    \u003cb\u003ecte_cummdemand_final_agg_1\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_cummdemand_final, inbound_prep\u003cbr\u003eUsed by  (4): cte_agg_last60dayorderqty, cte_cummdemand_final_agg_2, cte_agg_lastorderqty, cte_agg_lastinvoiceqty\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  *,\n  IFF(\n    \u0026quot;rnk1\u0026quot; IS NULL,\n    NULL,\n    DENSE_RANK() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot; ORDER BY \u0026quot;rnk1\u0026quot;)\n  ) AS \u0026quot;OrderRnk\u0026quot;,\n  CASE WHEN \u0026quot;OrderRnk\u0026quot; = 1 THEN \u0026quot;OrderDate\u0026quot; ELSE NULL END AS \u0026quot;LastOrderDate\u0026quot;,\n  CASE WHEN NOT \u0026quot;OrderRnk\u0026quot; IS NULL THEN \u0026quot;OrderRnk\u0026quot; END AS \u0026quot;LastOrderRnk\u0026quot;,\n  IFF(\n    \u0026quot;rnk2\u0026quot; IS NULL,\n    NULL,\n    DENSE_RANK() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot; ORDER BY \u0026quot;rnk2\u0026quot;)\n  ) AS \u0026quot;InvoiceRnk\u0026quot;,\n  CASE WHEN \u0026quot;InvoiceRnk\u0026quot; = 1 THEN \u0026quot;InvoiceDate\u0026quot; ELSE NULL END AS \u0026quot;LastInvoiceDate\u0026quot;,\n  CASE WHEN NOT \u0026quot;InvoiceRnk\u0026quot; IS NULL THEN \u0026quot;InvoiceRnk\u0026quot; END AS \u0026quot;LastInvoiceRnk\u0026quot;\nFROM (\n  SELECT\n    *,\n    CASE\n      WHEN \u0026quot;OrderDate\u0026quot; \u0026lt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \u0026quot;OrderDate\u0026quot; IS NULL\n      THEN IFF(\n        \u0026quot;OrderDate\u0026quot; IS NULL,\n        NULL,\n        DENSE_RANK() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot; ORDER BY \u0026quot;OrderDate\u0026quot; DESC)\n      )\n      ELSE NULL\n    END AS \u0026quot;rnk1\u0026quot;,\n    CASE\n      WHEN \u0026quot;InvoiceDate\u0026quot; \u0026lt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \u0026quot;InvoiceDate\u0026quot; IS NULL\n      THEN IFF(\n        \u0026quot;InvoiceDate\u0026quot; IS NULL,\n        NULL,\n        DENSE_RANK() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot; ORDER BY \u0026quot;InvoiceDate\u0026quot; DESC)\n      )\n      ELSE NULL\n    END AS \u0026quot;rnk2\u0026quot;\n  FROM (\n    SELECT DISTINCT\n      a.*,\n      b.\u0026quot;Ordered_CaseQty\u0026quot;,\n      b.\u0026quot;Intransit_CaseQty\u0026quot;,\n      b.\u0026quot;Invoiced_CaseQty\u0026quot;,\n      CASE\n        WHEN a.\u0026quot;BusDate\u0026quot; \u0026lt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n        AND NOT a.\u0026quot;DeliveryDate\u0026quot; IS NULL\n        THEN a.\u0026quot;NextToNext_DlvryFcstDmndQtyPBI\u0026quot;\n        ELSE NULL\n      END AS \u0026quot;NextToNext_DlvryFcstDmndQtyPBI_sum\u0026quot;\n    FROM \u0026quot;Cte_CummDemand_final\u0026quot; AS a\n    LEFT JOIN \u0026quot;Inbound_Prep\u0026quot; AS b\n      ON a.\u0026quot;CustomerNumber\u0026quot; = b.\u0026quot;CustomerNumber\u0026quot;\n      AND a.\u0026quot;MaterialNumber\u0026quot; = b.\u0026quot;MaterialNumber\u0026quot;\n      AND a.\u0026quot;BusDate\u0026quot; = b.\u0026quot;BusDate\u0026quot;\n  )\n)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  *,\n  IFF(\n    \"rnk1\" IS NULL,\n    NULL,\n    DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"rnk1\")\n  ) AS \"OrderRnk\",\n  CASE WHEN \"OrderRnk\" = 1 THEN \"OrderDate\" ELSE NULL END AS \"LastOrderDate\",\n  CASE WHEN NOT \"OrderRnk\" IS NULL THEN \"OrderRnk\" END AS \"LastOrderRnk\",\n  IFF(\n    \"rnk2\" IS NULL,\n    NULL,\n    DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"rnk2\")\n  ) AS \"InvoiceRnk\",\n  CASE WHEN \"InvoiceRnk\" = 1 THEN \"InvoiceDate\" ELSE NULL END AS \"LastInvoiceDate\",\n  CASE WHEN NOT \"InvoiceRnk\" IS NULL THEN \"InvoiceRnk\" END AS \"LastInvoiceRnk\"\nFROM (\n  SELECT\n    *,\n    CASE\n      WHEN \"OrderDate\" \u003c= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \"OrderDate\" IS NULL\n      THEN IFF(\n        \"OrderDate\" IS NULL,\n        NULL,\n        DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"OrderDate\" DESC)\n      )\n      ELSE NULL\n    END AS \"rnk1\",\n    CASE\n      WHEN \"InvoiceDate\" \u003c= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \"InvoiceDate\" IS NULL\n      THEN IFF(\n        \"InvoiceDate\" IS NULL,\n        NULL,\n        DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"InvoiceDate\" DESC)\n      )\n      ELSE NULL\n    END AS \"rnk2\"\n  FROM (\n    SELECT DISTINCT\n      a.*,\n      b.\"Ordered_CaseQty\",\n      b.\"Intransit_CaseQty\",\n      b.\"Invoiced_CaseQty\",\n      CASE\n        WHEN a.\"BusDate\" \u003c= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n        AND NOT a.\"DeliveryDate\" IS NULL\n        THEN a.\"NextToNext_DlvryFcstDmndQtyPBI\"\n        ELSE NULL\n      END AS \"NextToNext_DlvryFcstDmndQtyPBI_sum\"\n    FROM \"Cte_CummDemand_final\" AS a\n    LEFT JOIN \"Inbound_Prep\" AS b\n      ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n      AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n      AND a.\"BusDate\" = b.\"BusDate\"\n  )\n)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "inbound_prep_mod", "label": "inbound_prep_mod", "opacity": 1.0, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003einbound_prep_mod\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_pb_bottlers, cte_storelist\u003cbr\u003eUsed by  (1): inbound_prep\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  SP.\u0026quot;CustomerNumber\u0026quot;,\n  SP.\u0026quot;MaterialNumber\u0026quot;,\n  SP.\u0026quot;BusDate\u0026quot;,\n  SP.\u0026quot;OrderDate\u0026quot;,\n  SP.\u0026quot;DeliveryDate\u0026quot;,\n  SP.\u0026quot;InvoiceDate\u0026quot;,\n  SUM(COALESCE(\u0026quot;Intransit_CaseQty\u0026quot;, 0)) AS \u0026quot;Intransit_CaseQty\u0026quot;,\n  SUM(COALESCE(\u0026quot;Ordered_CaseQty\u0026quot;, 0)) AS \u0026quot;Ordered_CaseQty\u0026quot;,\n  SUM(COALESCE(\u0026quot;Delivered_CaseQty\u0026quot;, 0)) AS \u0026quot;Delivered_CaseQty\u0026quot;,\n  SUM(COALESCE(\u0026quot;Invoiced_CaseQty\u0026quot;, 0)) AS \u0026quot;Invoiced_CaseQty\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderShpmnt_ML_Inbound\u0026quot; AS SP\nINNER JOIN \u0026quot;CTE_StoreList\u0026quot; AS UDSS\n  ON LTRIM(SP.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(UDSS.\u0026quot;DSD_CustomerNumber\u0026quot;, 0)\nINNER JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderUDS_CMA\u0026quot; AS UDS\n  ON LTRIM(SP.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(UDS.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND LTRIM(SP.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(UDS.\u0026quot;MaterialNumber\u0026quot;, 0)\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMMERCIALS.\u0026quot;V_Dim_Prod\u0026quot; AS DP\n  ON LTRIM(SP.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(DP.\u0026quot;SAPMaterialID\u0026quot;, 0)\nLEFT JOIN \u0026quot;Cte_PB_Bottlers\u0026quot; AS PB\n  ON LTRIM(SP.\u0026quot;CustomerNumber\u0026quot;, 0) = PB.\u0026quot;CustomerNumber\u0026quot;\n  AND DP.\u0026quot;TradeMarkID\u0026quot; = PB.\u0026quot;TradeMarkID\u0026quot;\nINNER JOIN (\n  SELECT DISTINCT\n    \u0026quot;AccountID\u0026quot;\n  FROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.commercials.\u0026quot;V_Dim_Account\u0026quot;\n  WHERE\n    \u0026quot;NationalChainName\u0026quot; = \u0026#x27;ALL OTHER\u0026#x27;\n    AND \u0026quot;ChannelDesc\u0026quot; = \u0026#x27;INDEPEND CONVENIENCE\u0026#x27;\n    AND \u0026quot;BranchID\u0026quot; IN (\u0026#x27;1080\u0026#x27;, \u0026#x27;1009\u0026#x27;, \u0026#x27;1103\u0026#x27;, \u0026#x27;1225\u0026#x27;)\n) AS DA /* -Ref #1 */\n  ON LTRIM(SP.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(DA.\u0026quot;AccountID\u0026quot;, 0)\nWHERE\n  \u0026quot;IsPB\u0026quot; = 1 AND dp.\u0026quot;TradeMarkID\u0026quot; = \u0026#x27;G28\u0026#x27;\nGROUP BY ALL\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  SP.\"CustomerNumber\",\n  SP.\"MaterialNumber\",\n  SP.\"BusDate\",\n  SP.\"OrderDate\",\n  SP.\"DeliveryDate\",\n  SP.\"InvoiceDate\",\n  SUM(COALESCE(\"Intransit_CaseQty\", 0)) AS \"Intransit_CaseQty\",\n  SUM(COALESCE(\"Ordered_CaseQty\", 0)) AS \"Ordered_CaseQty\",\n  SUM(COALESCE(\"Delivered_CaseQty\", 0)) AS \"Delivered_CaseQty\",\n  SUM(COALESCE(\"Invoiced_CaseQty\", 0)) AS \"Invoiced_CaseQty\"\nFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\" AS SP\nINNER JOIN \"CTE_StoreList\" AS UDSS\n  ON LTRIM(SP.\"CustomerNumber\", 0) = LTRIM(UDSS.\"DSD_CustomerNumber\", 0)\nINNER JOIN \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderUDS_CMA\" AS UDS\n  ON LTRIM(SP.\"CustomerNumber\", 0) = LTRIM(UDS.\"CustomerNumber\", 0)\n  AND LTRIM(SP.\"MaterialNumber\", 0) = LTRIM(UDS.\"MaterialNumber\", 0)\nLEFT JOIN \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS DP\n  ON LTRIM(SP.\"MaterialNumber\", 0) = LTRIM(DP.\"SAPMaterialID\", 0)\nLEFT JOIN \"Cte_PB_Bottlers\" AS PB\n  ON LTRIM(SP.\"CustomerNumber\", 0) = PB.\"CustomerNumber\"\n  AND DP.\"TradeMarkID\" = PB.\"TradeMarkID\"\nINNER JOIN (\n  SELECT DISTINCT\n    \"AccountID\"\n  FROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".commercials.\"V_Dim_Account\"\n  WHERE\n    \"NationalChainName\" = \u0027ALL OTHER\u0027\n    AND \"ChannelDesc\" = \u0027INDEPEND CONVENIENCE\u0027\n    AND \"BranchID\" IN (\u00271080\u0027, \u00271009\u0027, \u00271103\u0027, \u00271225\u0027)\n) AS DA /* -Ref #1 */\n  ON LTRIM(SP.\"CustomerNumber\", 0) = LTRIM(DA.\"AccountID\", 0)\nWHERE\n  \"IsPB\" = 1 AND dp.\"TradeMarkID\" = \u0027G28\u0027\nGROUP BY ALL`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_pb_bottlers", "label": "cte_pb_bottlers", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_pb_bottlers\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (0): \u2014\u003cbr\u003eUsed by  (2): inbound_prep_mod, inbound_prep_nonmod\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  LTRIM(\u0026quot;AccountID\u0026quot;, \u0026#x27;0\u0026#x27;) AS \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;TrademarkID\u0026quot; AS \u0026quot;TradeMarkID\u0026quot;,\n  1 AS \u0026quot;IsPB\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.DSD.\u0026quot;V_DIM_CUSTTRADEMARKSVC\u0026quot;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  LTRIM(\"AccountID\", \u00270\u0027) AS \"CustomerNumber\",\n  \"TrademarkID\" AS \"TradeMarkID\",\n  1 AS \"IsPB\"\nFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".DSD.\"V_DIM_CUSTTRADEMARKSVC\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_final_agg_2", "label": "cte_cummdemand_final_agg_2", "opacity": 1.0, "shadow": true, "shape": "box", "size": 37, "title": "\n    \u003cb\u003ecte_cummdemand_final_agg_2\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (4): cte_agg_lastorderqty, cte_cummdemand_final_agg_1, cte_agg_last60dayorderqty, cte_agg_lastinvoiceqty\u003cbr\u003eUsed by  (1): cte_cummdemand_final_agg\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  *,\n  IFF(\n    \u0026quot;Delivery_Cnt_Last60Day\u0026quot; = 0 AND NOT \u0026quot;ForecastDemandQty_Agg_Last60Day\u0026quot; IS NULL,\n    0,\n    \u0026quot;ForecastDemandQty_Agg_Last60Day\u0026quot; / \u0026quot;Delivery_Cnt_Last60Day\u0026quot;\n  ) AS \u0026quot;AvgDemand_60day\u0026quot;,\n  (\n    \u0026quot;ForecastDemandQty_Agg_LastOrder\u0026quot; + \u0026quot;NextToNext_DlvryFcstDmndQtyPBI\u0026quot;\n  ) AS \u0026quot;Cumm_Demand\u0026quot;,\n  (\n    \u0026quot;ForecastDemandQty_Agg_LastOrder\u0026quot; + \u0026quot;NextToNext_DlvryFcstDmndQtyPBI\u0026quot;\n  ) * 1.1 AS \u0026quot;Cumm_Demand_Buffer\u0026quot;\nFROM (\n  SELECT DISTINCT\n    a.*,\n    CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN c.\u0026quot;Last_Ordered_CaseQty\u0026quot; ELSE NULL END AS \u0026quot;Last_Ordered_CaseQty\u0026quot;,\n    CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN c.\u0026quot;Last_Intransit_CaseQty\u0026quot; ELSE NULL END AS \u0026quot;Last_Intransit_CaseQty\u0026quot;,\n    COALESCE(CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN c.\u0026quot;Last_Invoiced_CaseQty\u0026quot; ELSE NULL END, 0) AS \u0026quot;Last_Invoiced_CaseQty\u0026quot;,\n    CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN d.\u0026quot;Last_Ordered_CaseQty_Inv\u0026quot; ELSE NULL END AS \u0026quot;Last_Ordered_CaseQty_Inv\u0026quot;,\n    CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN d.\u0026quot;Last_Intransit_CaseQty_Inv\u0026quot; ELSE NULL END AS \u0026quot;Last_Intransit_CaseQty_Inv\u0026quot;,\n    COALESCE(CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN d.\u0026quot;Last_Invoiced_CaseQty_Inv\u0026quot; ELSE NULL END, 0) AS \u0026quot;Last_Invoiced_CaseQty_Inv\u0026quot;,\n    CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN b.\u0026quot;Delivery_Cnt_Last60\u0026quot; ELSE NULL END AS \u0026quot;Delivery_Cnt_Last60Day\u0026quot;, /*  \t\t,CASE */ /* WHEN \u0026quot;rnk\u0026quot; = 1 */ /* \tTHEN b.\u0026quot;Ordered_CaseQty_Agg_Last60\u0026quot; */ /* ELSE NULL */ /* END AS \u0026quot;Ordered_CaseQty_Agg_Last60Day\u0026quot; */\n    CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN b.\u0026quot;ForecastDemandQty_Agg_Last60\u0026quot; ELSE NULL END AS \u0026quot;ForecastDemandQty_Agg_Last60Day\u0026quot;,\n    CASE WHEN \u0026quot;rnk\u0026quot; = 1 THEN c.\u0026quot;ForecastDemandQty_Agg_LastOrder1\u0026quot; ELSE NULL END AS \u0026quot;ForecastDemandQty_Agg_LastOrder\u0026quot;\n  FROM \u0026quot;Cte_CummDemand_final_agg_1\u0026quot; AS a\n  LEFT JOIN \u0026quot;Cte_Agg_Last60DayOrderQty\u0026quot; AS b\n    ON a.\u0026quot;CustomerNumber\u0026quot; = b.\u0026quot;CustomerNumber\u0026quot;\n    AND a.\u0026quot;MaterialNumber\u0026quot; = b.\u0026quot;MaterialNumber\u0026quot;\n  LEFT JOIN \u0026quot;Cte_Agg_LastOrderQty\u0026quot; AS c\n    ON a.\u0026quot;CustomerNumber\u0026quot; = c.\u0026quot;CustomerNumber\u0026quot;\n    AND a.\u0026quot;MaterialNumber\u0026quot; = c.\u0026quot;MaterialNumber\u0026quot;\n  LEFT JOIN \u0026quot;Cte_Agg_LastInvoiceQty\u0026quot; AS d\n    ON a.\u0026quot;CustomerNumber\u0026quot; = d.\u0026quot;CustomerNumber\u0026quot;\n    AND a.\u0026quot;MaterialNumber\u0026quot; = d.\u0026quot;MaterialNumber\u0026quot;\n)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  *,\n  IFF(\n    \"Delivery_Cnt_Last60Day\" = 0 AND NOT \"ForecastDemandQty_Agg_Last60Day\" IS NULL,\n    0,\n    \"ForecastDemandQty_Agg_Last60Day\" / \"Delivery_Cnt_Last60Day\"\n  ) AS \"AvgDemand_60day\",\n  (\n    \"ForecastDemandQty_Agg_LastOrder\" + \"NextToNext_DlvryFcstDmndQtyPBI\"\n  ) AS \"Cumm_Demand\",\n  (\n    \"ForecastDemandQty_Agg_LastOrder\" + \"NextToNext_DlvryFcstDmndQtyPBI\"\n  ) * 1.1 AS \"Cumm_Demand_Buffer\"\nFROM (\n  SELECT DISTINCT\n    a.*,\n    CASE WHEN \"rnk\" = 1 THEN c.\"Last_Ordered_CaseQty\" ELSE NULL END AS \"Last_Ordered_CaseQty\",\n    CASE WHEN \"rnk\" = 1 THEN c.\"Last_Intransit_CaseQty\" ELSE NULL END AS \"Last_Intransit_CaseQty\",\n    COALESCE(CASE WHEN \"rnk\" = 1 THEN c.\"Last_Invoiced_CaseQty\" ELSE NULL END, 0) AS \"Last_Invoiced_CaseQty\",\n    CASE WHEN \"rnk\" = 1 THEN d.\"Last_Ordered_CaseQty_Inv\" ELSE NULL END AS \"Last_Ordered_CaseQty_Inv\",\n    CASE WHEN \"rnk\" = 1 THEN d.\"Last_Intransit_CaseQty_Inv\" ELSE NULL END AS \"Last_Intransit_CaseQty_Inv\",\n    COALESCE(CASE WHEN \"rnk\" = 1 THEN d.\"Last_Invoiced_CaseQty_Inv\" ELSE NULL END, 0) AS \"Last_Invoiced_CaseQty_Inv\",\n    CASE WHEN \"rnk\" = 1 THEN b.\"Delivery_Cnt_Last60\" ELSE NULL END AS \"Delivery_Cnt_Last60Day\", /*  \t\t,CASE */ /* WHEN \"rnk\" = 1 */ /* \tTHEN b.\"Ordered_CaseQty_Agg_Last60\" */ /* ELSE NULL */ /* END AS \"Ordered_CaseQty_Agg_Last60Day\" */\n    CASE WHEN \"rnk\" = 1 THEN b.\"ForecastDemandQty_Agg_Last60\" ELSE NULL END AS \"ForecastDemandQty_Agg_Last60Day\",\n    CASE WHEN \"rnk\" = 1 THEN c.\"ForecastDemandQty_Agg_LastOrder1\" ELSE NULL END AS \"ForecastDemandQty_Agg_LastOrder\"\n  FROM \"Cte_CummDemand_final_agg_1\" AS a\n  LEFT JOIN \"Cte_Agg_Last60DayOrderQty\" AS b\n    ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n  LEFT JOIN \"Cte_Agg_LastOrderQty\" AS c\n    ON a.\"CustomerNumber\" = c.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = c.\"MaterialNumber\"\n  LEFT JOIN \"Cte_Agg_LastInvoiceQty\" AS d\n    ON a.\"CustomerNumber\" = d.\"CustomerNumber\"\n    AND a.\"MaterialNumber\" = d.\"MaterialNumber\"\n)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_agg_lastorderqty", "label": "cte_agg_lastorderqty", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_agg_lastorderqty\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_cummdemand_final_agg_1\u003cbr\u003eUsed by  (1): cte_cummdemand_final_agg_2\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  SUM(CASE WHEN \u0026quot;LastOrderRnk\u0026quot; = 1 THEN \u0026quot;Ordered_CaseQty\u0026quot; END) AS \u0026quot;Last_Ordered_CaseQty\u0026quot;,\n  SUM(CASE WHEN \u0026quot;LastOrderRnk\u0026quot; = 1 THEN \u0026quot;Intransit_CaseQty\u0026quot; END) AS \u0026quot;Last_Intransit_CaseQty\u0026quot;,\n  SUM(CASE WHEN \u0026quot;LastOrderRnk\u0026quot; = 1 THEN \u0026quot;Invoiced_CaseQty\u0026quot; END) AS \u0026quot;Last_Invoiced_CaseQty\u0026quot;,\n  SUM(\u0026quot;ForecastDemandQty\u0026quot;) AS \u0026quot;ForecastDemandQty_Agg_LastOrder1\u0026quot;\nFROM (\n  SELECT\n    *,\n    LAST_VALUE(\u0026quot;LastOrderRnkBrk\u0026quot;) IGNORE NULLS OVER (\n      PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;\n      ORDER BY \u0026quot;BusDate\u0026quot; ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ) AS \u0026quot;LastOrderRnkRpt\u0026quot;\n  FROM (\n    SELECT DISTINCT\n      a.*\n      EXCLUDE (\u0026quot;LastOrderRnk\u0026quot;, \u0026quot;Ordered_CaseQty\u0026quot;, \u0026quot;Invoiced_CaseQty\u0026quot;, \u0026quot;Intransit_CaseQty\u0026quot;),\n      b.\u0026quot;Ordered_CaseQty\u0026quot;,\n      b.\u0026quot;Intransit_CaseQty\u0026quot;,\n      b.\u0026quot;Invoiced_CaseQty\u0026quot;,\n      b.\u0026quot;LastOrderRnk\u0026quot;,\n      CASE\n        WHEN a.\u0026quot;BusDate\u0026quot; = TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) + 1\n        THEN 2\n      END AS \u0026quot;LastOrderRnkBrk1\u0026quot;,\n      COALESCE(b.\u0026quot;LastOrderRnk\u0026quot;, \u0026quot;LastOrderRnkBrk1\u0026quot;) AS \u0026quot;LastOrderRnkBrk\u0026quot;\n    FROM \u0026quot;Cte_CummDemand_final_agg_1\u0026quot; AS a\n    LEFT JOIN \u0026quot;Cte_CummDemand_final_agg_1\u0026quot; AS b\n      ON a.\u0026quot;CustomerNumber\u0026quot; = b.\u0026quot;CustomerNumber\u0026quot;\n      AND a.\u0026quot;MaterialNumber\u0026quot; = b.\u0026quot;MaterialNumber\u0026quot;\n      AND a.\u0026quot;BusDate\u0026quot; = b.\u0026quot;LastOrderDate\u0026quot;\n  )\n)\nWHERE\n  \u0026quot;LastOrderRnkRpt\u0026quot; = 1\nGROUP BY ALL\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  SUM(CASE WHEN \"LastOrderRnk\" = 1 THEN \"Ordered_CaseQty\" END) AS \"Last_Ordered_CaseQty\",\n  SUM(CASE WHEN \"LastOrderRnk\" = 1 THEN \"Intransit_CaseQty\" END) AS \"Last_Intransit_CaseQty\",\n  SUM(CASE WHEN \"LastOrderRnk\" = 1 THEN \"Invoiced_CaseQty\" END) AS \"Last_Invoiced_CaseQty\",\n  SUM(\"ForecastDemandQty\") AS \"ForecastDemandQty_Agg_LastOrder1\"\nFROM (\n  SELECT\n    *,\n    LAST_VALUE(\"LastOrderRnkBrk\") IGNORE NULLS OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY \"BusDate\" ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ) AS \"LastOrderRnkRpt\"\n  FROM (\n    SELECT DISTINCT\n      a.*\n      EXCLUDE (\"LastOrderRnk\", \"Ordered_CaseQty\", \"Invoiced_CaseQty\", \"Intransit_CaseQty\"),\n      b.\"Ordered_CaseQty\",\n      b.\"Intransit_CaseQty\",\n      b.\"Invoiced_CaseQty\",\n      b.\"LastOrderRnk\",\n      CASE\n        WHEN a.\"BusDate\" = TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) + 1\n        THEN 2\n      END AS \"LastOrderRnkBrk1\",\n      COALESCE(b.\"LastOrderRnk\", \"LastOrderRnkBrk1\") AS \"LastOrderRnkBrk\"\n    FROM \"Cte_CummDemand_final_agg_1\" AS a\n    LEFT JOIN \"Cte_CummDemand_final_agg_1\" AS b\n      ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n      AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n      AND a.\"BusDate\" = b.\"LastOrderDate\"\n  )\n)\nWHERE\n  \"LastOrderRnkRpt\" = 1\nGROUP BY ALL`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_agg_lastinvoiceqty", "label": "cte_agg_lastinvoiceqty", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_agg_lastinvoiceqty\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_cummdemand_final_agg_1\u003cbr\u003eUsed by  (1): cte_cummdemand_final_agg_2\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  SUM(CASE WHEN \u0026quot;LastInvoiceRnk\u0026quot; = 1 THEN \u0026quot;Ordered_CaseQty\u0026quot; END) AS \u0026quot;Last_Ordered_CaseQty_Inv\u0026quot;,\n  SUM(CASE WHEN \u0026quot;LastInvoiceRnk\u0026quot; = 1 THEN \u0026quot;Intransit_CaseQty\u0026quot; END) AS \u0026quot;Last_Intransit_CaseQty_Inv\u0026quot;,\n  SUM(CASE WHEN \u0026quot;LastInvoiceRnk\u0026quot; = 1 THEN \u0026quot;Invoiced_CaseQty\u0026quot; END) AS \u0026quot;Last_Invoiced_CaseQty_Inv\u0026quot;,\n  SUM(\u0026quot;ForecastDemandQty\u0026quot;) AS \u0026quot;ForecastDemandQty_Agg_LastInvoice1\u0026quot;\nFROM (\n  SELECT\n    *,\n    LAST_VALUE(\u0026quot;LastInvoiceRnkBrk\u0026quot;) IGNORE NULLS OVER (\n      PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;\n      ORDER BY \u0026quot;BusDate\u0026quot; ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ) AS \u0026quot;LastInvoiceRnkRpt\u0026quot;\n  FROM (\n    SELECT DISTINCT\n      a.*\n      EXCLUDE (\u0026quot;LastInvoiceRnk\u0026quot;, \u0026quot;Ordered_CaseQty\u0026quot;, \u0026quot;Invoiced_CaseQty\u0026quot;, \u0026quot;Intransit_CaseQty\u0026quot;),\n      b.\u0026quot;Ordered_CaseQty\u0026quot;,\n      b.\u0026quot;Intransit_CaseQty\u0026quot;,\n      b.\u0026quot;Invoiced_CaseQty\u0026quot;,\n      b.\u0026quot;LastInvoiceRnk\u0026quot;,\n      CASE\n        WHEN a.\u0026quot;BusDate\u0026quot; = TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) + 1\n        THEN 2\n      END AS \u0026quot;LastInvoiceRnkBrk1\u0026quot;,\n      COALESCE(b.\u0026quot;LastInvoiceRnk\u0026quot;, \u0026quot;LastInvoiceRnkBrk1\u0026quot;) AS \u0026quot;LastInvoiceRnkBrk\u0026quot;\n    FROM \u0026quot;Cte_CummDemand_final_agg_1\u0026quot; AS a\n    LEFT JOIN \u0026quot;Cte_CummDemand_final_agg_1\u0026quot; AS b\n      ON a.\u0026quot;CustomerNumber\u0026quot; = b.\u0026quot;CustomerNumber\u0026quot;\n      AND a.\u0026quot;MaterialNumber\u0026quot; = b.\u0026quot;MaterialNumber\u0026quot;\n      AND a.\u0026quot;BusDate\u0026quot; = b.\u0026quot;LastInvoiceDate\u0026quot;\n  )\n)\nWHERE\n  \u0026quot;LastInvoiceRnkRpt\u0026quot; = 1\nGROUP BY ALL\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  SUM(CASE WHEN \"LastInvoiceRnk\" = 1 THEN \"Ordered_CaseQty\" END) AS \"Last_Ordered_CaseQty_Inv\",\n  SUM(CASE WHEN \"LastInvoiceRnk\" = 1 THEN \"Intransit_CaseQty\" END) AS \"Last_Intransit_CaseQty_Inv\",\n  SUM(CASE WHEN \"LastInvoiceRnk\" = 1 THEN \"Invoiced_CaseQty\" END) AS \"Last_Invoiced_CaseQty_Inv\",\n  SUM(\"ForecastDemandQty\") AS \"ForecastDemandQty_Agg_LastInvoice1\"\nFROM (\n  SELECT\n    *,\n    LAST_VALUE(\"LastInvoiceRnkBrk\") IGNORE NULLS OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY \"BusDate\" ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ) AS \"LastInvoiceRnkRpt\"\n  FROM (\n    SELECT DISTINCT\n      a.*\n      EXCLUDE (\"LastInvoiceRnk\", \"Ordered_CaseQty\", \"Invoiced_CaseQty\", \"Intransit_CaseQty\"),\n      b.\"Ordered_CaseQty\",\n      b.\"Intransit_CaseQty\",\n      b.\"Invoiced_CaseQty\",\n      b.\"LastInvoiceRnk\",\n      CASE\n        WHEN a.\"BusDate\" = TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) + 1\n        THEN 2\n      END AS \"LastInvoiceRnkBrk1\",\n      COALESCE(b.\"LastInvoiceRnk\", \"LastInvoiceRnkBrk1\") AS \"LastInvoiceRnkBrk\"\n    FROM \"Cte_CummDemand_final_agg_1\" AS a\n    LEFT JOIN \"Cte_CummDemand_final_agg_1\" AS b\n      ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n      AND a.\"MaterialNumber\" = b.\"MaterialNumber\"\n      AND a.\"BusDate\" = b.\"LastInvoiceDate\"\n  )\n)\nWHERE\n  \"LastInvoiceRnkRpt\" = 1\nGROUP BY ALL`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "final_data", "label": "final_data", "opacity": 1.0, "shadow": true, "shape": "box", "size": 40, "title": "\n    \u003cb\u003efinal_data\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (4): case_conversion, inbound_prep, orderpredicted, cte_storelist\u003cbr\u003eUsed by  (2): cte_cummdemand_1, cte_cummdemand_1_currentdate\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;IsMod\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;InvoiceDate\u0026quot;,\n  \u0026quot;OnHandQty\u0026quot;,\n  \u0026quot;Max_ShelfCapacityQty\u0026quot;,\n  \u0026quot;Incremental_Capacity\u0026quot;,\n  \u0026quot;SalesQty\u0026quot;,\n  \u0026quot;SalesAmt\u0026quot;,\n  \u0026quot;Intransit_CaseQty\u0026quot;,\n  \u0026quot;Ordered_CaseQty\u0026quot;,\n  \u0026quot;Delivered_CaseQty\u0026quot;,\n  \u0026quot;Invoiced_CaseQty\u0026quot;,\n  \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  \u0026quot;Promo_Demand_Qty\u0026quot;,\n  \u0026quot;Forecast_Demand_Qty\u0026quot;,\n  \u0026quot;Next14DaysForecastDemand\u0026quot;,\n  CASE\n    WHEN NOT \u0026quot;DeliveryDate\u0026quot; IS NULL\n    AND \u0026quot;OrderDate\u0026quot; IS NULL /* Ref #2 */\n    AND \u0026quot;DeliveryDate\u0026quot; \u0026gt; TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n    THEN \u0026quot;DeliveryDate\u0026quot;\n    ELSE NULL\n  END AS \u0026quot;DeliveryDateRnk\u0026quot;,\n  IFF(\n    \u0026quot;DeliveryDateRnk\u0026quot; IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;DeliveryDateRnk\u0026quot;)\n  ) AS \u0026quot;rnk\u0026quot;\nFROM (\n  SELECT DISTINCT\n    IB.\u0026quot;CustomerNumber\u0026quot;,\n    PO.\u0026quot;DSD_CustomerNumber\u0026quot;,\n    IB.\u0026quot;MaterialNumber\u0026quot;,\n    IB.\u0026quot;BusDate\u0026quot;, /* ,COALESCE(IB.\u0026quot;OrderDate\u0026quot;, RMD1.\u0026quot;OrderDate\u0026quot;) AS \u0026quot;OrderDate\u0026quot; --Ref #2 */ /* ,COALESCE(IB.\u0026quot;DeliveryDate\u0026quot;, RMD1.\u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;DeliveryDate\u0026quot; */\n    IB.\u0026quot;OrderDate\u0026quot;,\n    IB.\u0026quot;DeliveryDate\u0026quot;,\n    IB.\u0026quot;InvoiceDate\u0026quot;,\n    IB.\u0026quot;IsMod\u0026quot;,\n    NULL AS \u0026quot;OnHandQty\u0026quot;,\n    NULL AS \u0026quot;Max_ShelfCapacityQty\u0026quot;,\n    NULL AS \u0026quot;Incremental_Capacity\u0026quot;,\n    NULL AS \u0026quot;SalesQty\u0026quot;,\n    NULL AS \u0026quot;SalesAmt\u0026quot;,\n    COALESCE(IB.\u0026quot;Intransit_CaseQty\u0026quot;, 0) AS \u0026quot;Intransit_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Ordered_CaseQty\u0026quot;, 0) AS \u0026quot;Ordered_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Delivered_CaseQty\u0026quot;, 0) AS \u0026quot;Delivered_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Invoiced_CaseQty\u0026quot;, 0) AS \u0026quot;Invoiced_CaseQty\u0026quot;,\n    COALESCE(OP.\u0026quot;EveryDay_Demand_Qty\u0026quot;, 0) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n    COALESCE(OP.\u0026quot;Promo_Demand_Qty\u0026quot;, 0) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n    COALESCE(OP.\u0026quot;Forecast_Demand_Qty\u0026quot;, 0) AS \u0026quot;Forecast_Demand_Qty\u0026quot;,\n    SUM(COALESCE(OP.\u0026quot;Forecast_Demand_Qty\u0026quot; * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0)) OVER (PARTITION BY IB.\u0026quot;CustomerNumber\u0026quot;, IB.\u0026quot;MaterialNumber\u0026quot; ORDER BY IB.\u0026quot;BusDate\u0026quot; DESC) AS \u0026quot;Next14DaysForecastDemand\u0026quot;\n  FROM \u0026quot;Inbound_Prep\u0026quot; AS IB\n  JOIN \u0026quot;CTE_StoreList\u0026quot; AS PO\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(PO.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;)\n  /* LEFT JOIN ( */ /*\tSELECT DISTINCT \u0026quot;CustomerNumber\u0026quot; */ /*\t\t,\u0026quot;DeliveryDate\u0026quot; */ /*\t\t,\u0026quot;OrderDate\u0026quot; --Ref #2 */ /*\tFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderShpmnt_ML_Inbound\u0026quot; */ /*\t) RMD1 ON LTRIM(PO.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(RMD1.\u0026quot;CustomerNumber\u0026quot;, 0) */ /*\tAND IB.\u0026quot;BusDate\u0026quot; = RMD1.\u0026quot;DeliveryDate\u0026quot; */ /*\tAND RMD1.\u0026quot;OrderDate\u0026quot; IS NOT NULL */\n  LEFT JOIN \u0026quot;Case_Conversion\u0026quot; AS CC\n    ON LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(CC.\u0026quot;MaterialNumber\u0026quot;, 0)\n  /* LEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_RETAILER}\u0026quot;.INVENTORY.\u0026quot;V_Fact_CustModularPlan_Active\u0026quot; MP ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(MP.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;) */ /* \tAND LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(MP.\u0026quot;MaterialNumber\u0026quot;, \u0026#x27;0\u0026#x27;) */\n  LEFT JOIN \u0026quot;OrderPredicted\u0026quot; AS OP\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(OP.\u0026quot;CustomerNumber\u0026quot;, 0)\n    AND LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(OP.\u0026quot;MaterialNumber\u0026quot;, 0)\n    AND IB.\u0026quot;BusDate\u0026quot; = OP.\u0026quot;BusDate\u0026quot;\n)\nWHERE\n  \u0026quot;BusDate\u0026quot; \u0026gt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 /* 60 */\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"IsMod\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"SalesQty\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  CASE\n    WHEN NOT \"DeliveryDate\" IS NULL\n    AND \"OrderDate\" IS NULL /* Ref #2 */\n    AND \"DeliveryDate\" \u003e TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n    THEN \"DeliveryDate\"\n    ELSE NULL\n  END AS \"DeliveryDateRnk\",\n  IFF(\n    \"DeliveryDateRnk\" IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDateRnk\")\n  ) AS \"rnk\"\nFROM (\n  SELECT DISTINCT\n    IB.\"CustomerNumber\",\n    PO.\"DSD_CustomerNumber\",\n    IB.\"MaterialNumber\",\n    IB.\"BusDate\", /* ,COALESCE(IB.\"OrderDate\", RMD1.\"OrderDate\") AS \"OrderDate\" --Ref #2 */ /* ,COALESCE(IB.\"DeliveryDate\", RMD1.\"DeliveryDate\") AS \"DeliveryDate\" */\n    IB.\"OrderDate\",\n    IB.\"DeliveryDate\",\n    IB.\"InvoiceDate\",\n    IB.\"IsMod\",\n    NULL AS \"OnHandQty\",\n    NULL AS \"Max_ShelfCapacityQty\",\n    NULL AS \"Incremental_Capacity\",\n    NULL AS \"SalesQty\",\n    NULL AS \"SalesAmt\",\n    COALESCE(IB.\"Intransit_CaseQty\", 0) AS \"Intransit_CaseQty\",\n    COALESCE(IB.\"Ordered_CaseQty\", 0) AS \"Ordered_CaseQty\",\n    COALESCE(IB.\"Delivered_CaseQty\", 0) AS \"Delivered_CaseQty\",\n    COALESCE(IB.\"Invoiced_CaseQty\", 0) AS \"Invoiced_CaseQty\",\n    COALESCE(OP.\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n    COALESCE(OP.\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n    COALESCE(OP.\"Forecast_Demand_Qty\", 0) AS \"Forecast_Demand_Qty\",\n    SUM(COALESCE(OP.\"Forecast_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0)) OVER (PARTITION BY IB.\"CustomerNumber\", IB.\"MaterialNumber\" ORDER BY IB.\"BusDate\" DESC) AS \"Next14DaysForecastDemand\"\n  FROM \"Inbound_Prep\" AS IB\n  JOIN \"CTE_StoreList\" AS PO\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", \u00270\u0027)\n  /* LEFT JOIN ( */ /*\tSELECT DISTINCT \"CustomerNumber\" */ /*\t\t,\"DeliveryDate\" */ /*\t\t,\"OrderDate\" --Ref #2 */ /*\tFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\" */ /*\t) RMD1 ON LTRIM(PO.\"DSD_CustomerNumber\", 0) = LTRIM(RMD1.\"CustomerNumber\", 0) */ /*\tAND IB.\"BusDate\" = RMD1.\"DeliveryDate\" */ /*\tAND RMD1.\"OrderDate\" IS NOT NULL */\n  LEFT JOIN \"Case_Conversion\" AS CC\n    ON LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(CC.\"MaterialNumber\", 0)\n  /* LEFT JOIN \"\u0026{VAR_SNOWDB_RETAILER}\".INVENTORY.\"V_Fact_CustModularPlan_Active\" MP ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(MP.\"CustomerNumber\", \u00270\u0027) */ /* \tAND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(MP.\"MaterialNumber\", \u00270\u0027) */\n  LEFT JOIN \"OrderPredicted\" AS OP\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(OP.\"CustomerNumber\", 0)\n    AND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(OP.\"MaterialNumber\", 0)\n    AND IB.\"BusDate\" = OP.\"BusDate\"\n)\nWHERE\n  \"BusDate\" \u003e= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 /* 60 */`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "case_conversion", "label": "case_conversion", "opacity": 1.0, "shadow": true, "shape": "box", "size": 25, "title": "\n    \u003cb\u003ecase_conversion\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (0): \u2014\u003cbr\u003eUsed by  (1): final_data\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  E.\u0026quot;SAPMaterialID\u0026quot; AS \u0026quot;MaterialNumber\u0026quot;,\n  COALESCE(UOM_SU.\u0026quot;ConvFactorToBase\u0026quot;, UOM_PC.\u0026quot;ConvFactorToBase\u0026quot;, UOM_EA.\u0026quot;ConvFactorToBase\u0026quot;, 1) AS \u0026quot;ConvFactorToBase\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMMERCIALS.\u0026quot;V_Dim_Prod\u0026quot; AS E\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_MD}\u0026quot;.SAP.\u0026quot;Dim_AltUnit\u0026quot; AS UOM_SU\n  ON UOM_SU.MDM_ID = E.MDM_ID AND UOM_SU.\u0026quot;AltUnitID\u0026quot; = \u0026#x27;SU\u0026#x27;\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_MD}\u0026quot;.SAP.\u0026quot;Dim_AltUnit\u0026quot; AS UOM_PC\n  ON UOM_PC.MDM_ID = E.MDM_ID AND UOM_PC.\u0026quot;AltUnitID\u0026quot; = \u0026#x27;PC\u0026#x27;\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_MD}\u0026quot;.SAP.\u0026quot;Dim_AltUnit\u0026quot; AS UOM_EA\n  ON UOM_EA.MDM_ID = E.MDM_ID AND UOM_EA.\u0026quot;AltUnitID\u0026quot; = \u0026#x27;EA\u0026#x27;\nWHERE\n  NOT E.\u0026quot;SAPMaterialID\u0026quot; IS NULL\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  E.\"SAPMaterialID\" AS \"MaterialNumber\",\n  COA   *,\n  0 AS \u0026quot;IsMod\u0026quot;\nFROM \u0026quot;Inbound_Prep_NONMOD\u0026quot;\nWHERE\n  \u0026quot;MaterialNumber\u0026quot; \u0026lt;\u0026gt; ALL (\n    SELECT DISTINCT\n      \u0026quot;MaterialNumber\u0026quot;\n    FROM \u0026quot;Inbound_Prep_MOD\u0026quot;\n  )\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  *,\n  1 AS \"IsMod\"\nFROM \"Inbound_Prep_MOD\"\nUNION\nSELECT\n  *,\n  0 AS \"IsMod\"\nFROM \"Inbound_Prep_NONMOD\"\nWHERE\n  \"MaterialNumber\" \u003c\u003e ALL (\n    SELECT DISTINCT\n      \"MaterialNumber\"\n    FROM \"Inbound_Prep_MOD\"\n  )`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "prevwknbr", "label": "prevwknbr", "opacity": 0.3, "shadow": true, "shape": "box", "size": 25, "title": "\n    \u003cb\u003eprevwknbr\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (0): \u2014\u003cbr\u003eUsed by  (1): underorderalert\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  \u0026quot;DayDate\u0026quot;,\n  \u0026quot;WeekID_ISO\u0026quot;,\n  DENSE_RANK() OVER (ORDER BY \u0026quot;WeekID_ISO\u0026quot; DESC) AS \u0026quot;WeekRnk\u0026quot;\nFROM \u0026quot;\u0026amp;{VA "OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"ForecastDemandQty\",\n  \"NextDeliveryDate\",\n  \"NextToNextDeliveryDate\",\n  \"NewDeliveryDate\", /* * */\n  DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"NewDeliveryDate\") AS \"rnk1\"\nFROM \"Cte_CummDemand_2_CurrentDate\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cte_tier1_stores", "label": "cte_tier1_stores", "opacity": 0.3, "shadow": true, "shape": "box", "size": 25, "title": "\n    \u003cb\u003ecte_tier1_stores\u003c/b\u003e\u003cbr\u003e\u003ci\u003eTerminal CTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_storelist\u003cbr\u003eUsed by  (0): \u2014\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;AccountNumber\u0026quot; AS \u0026quot;CustomerNumber\u0026quot;,\n  SL.\u0026quot;DSD_CustomerNumber\u0026quot;,\n  SL.\u0026quot;NationalChainName\u0026quot;,\n  \u0026quot;PromoPlanName\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_DATA_PRODUCT}\u0026quot;.DSD_EFFECTIVENESS.\u0026quot;V_Dim_CustomerMaster\u0026quot; AS CM\nINNER JOIN \u0026quot;CTE_StoreList\u0026quot; AS SL\n  ON
