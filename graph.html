                  nodes = new vis.DataSet([{"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "get_max_weekid_date_from_v_fact_retailerweekly", "label": "get_max_weekid_date_from_v_fact_retailerweekly", "opacity": 0.3, "shadow": true, "shape": "box", "size": 34, "title": "\n    \u003cb\u003eget_max_weekid_date_from_v_fact_retailerweekly\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (0): \u2014\u003cbr\u003eUsed by  (4): final_data_lf_for_pos_notavailable_week_caseconverted, final_data_lf_for_pos_not_available, final_data_lf_for_pos_available, final_data_lf_pos_available_week\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  (\n    \u0026quot;WeekEnding_ISO\u0026quot;\n  ) AS \u0026quot;WeekID_Source_LastDate\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_MD}\u0026quot;.CALENDAR.\u0026quot;V_CalDay\u0026quot;\nWHERE\n  \u0026quot;WeekID_ISO\u0026quot; = (\n    SELECT\n      MAX(\u0026quot;WeekID\u0026quot;)\n    FROM \u0026quot;\u0026amp;{VAR_SNOWDB_DATA_PRODUCT}\u0026quot;.RETAILER_INSIGHTS.\u0026quot;V_Fact_RetailerWeekly\u0026quot;\n    WHERE\n      \u0026quot;Source\u0026quot; = \u0026#x27;IRI\u0026#x27;\n  )\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  (\n    \"WeekEnding_ISO\"\n  ) AS \"WeekID_Source_LastDate\"\nFROM \"\u0026{VAR_SNOWDB_MD}\".CALENDAR.\"V_CalDay\"\nWHERE\n  \"WeekID_ISO\" = (\n    SELECT\n      MAX(\"WeekID\")\n    FROM \"\u0026{VAR_SNOWDB_DATA_PRODUCT}\".RETAILER_INSIGHTS.\"V_Fact_RetailerWeekly\"\n    WHERE\n      \"Source\" = \u0027IRI\u0027\n  )`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "inbound_prep_custmatl_missing", "label": "inbound_prep_custmatl_missing", "opacity": 0.3, "shadow": true, "shape": "box", "size": 34, "title": "\n    \u003cb\u003einbound_prep_custmatl_missing\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (3): cte_pb_bottlers, cte_storelistdate, cte_custmatl_list_with_pog_capacity_onhandqty\u003cbr\u003eUsed by  (1): inbound_prep\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;NationalChainName\u0026quot; AS \u0026quot;RetailerName\u0026quot;,\n  SD.\u0026quot;CustomerNumber\u0026quot;,\n  SD.\u0026quot;DSD_CustomerNumber\u0026quot;,\n  \u0026quot;CustomerName\u0026quot;,\n  SD.\u0026quot;MaterialNumber\u0026quot;,\n  SD.\u0026quot;BusDate\u0026quot;,\n  NULL AS \u0026quot;WeekID\u0026quot;,\n  NULL AS \u0026quot;Week_Start\u0026quot;,\n  NULL AS \u0026quot;Week_End\u0026quot;,\n  0 AS \u0026quot;Weekly_SalesQty\u0026quot;,\n  0 AS \u0026quot;SingleDay_SalesQty\u0026quot;,\n  0 AS \u0026quot;Weekly_SalesAmt\u0026quot;,\n  0 AS \u0026quot;SingleDay_SaleAmt\u0026quot;,\n  0 AS \u0026quot;IsPromoActivated\u0026quot;,\n  COALESCE(ML.\u0026quot;IsPOG\u0026quot;, 0) AS \u0026quot;IsPOG\u0026quot;,\n  COALESCE(ML.\u0026quot;MaxShelfQty\u0026quot;, 0) AS \u0026quot;MaxShelfQty\u0026quot;,\n  \u0026quot;Source_NPSales\u0026quot;\nFROM \u0026quot;CTE_StoreListDate\u0026quot; AS SD\nJOIN \u0026quot;\u0026amp;{VAR_SNOWDB_MD}\u0026quot;.TECHNICAL.\u0026quot;V_PerfOrderNPSales_StoreList\u0026quot; AS SL\n  ON LTRIM(SL.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(SD.\u0026quot;CustomerNumber\u0026quot;, 0)\nJOIN \u0026quot;CTE_CustMatl_List_With_POG_Capacity_OnHandQty\u0026quot; AS ML\n  ON LTRIM(SD.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(ML.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND LTRIM(SD.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(ML.\u0026quot;MaterialNumber\u0026quot;, 0)\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMMERCIALS.\u0026quot;V_Dim_Prod\u0026quot; AS DP\n  ON LTRIM(SD.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(DP.\u0026quot;SAPMaterialID\u0026quot;, 0)\nLEFT JOIN \u0026quot;Cte_PB_Bottlers\u0026quot; AS PB\n  ON LTRIM(SD.\u0026quot;CustomerNumber\u0026quot;, 0) = PB.\u0026quot;CustomerNumber\u0026quot;\n  AND DP.\u0026quot;TradeMarkID\u0026quot; = PB.\u0026quot;TradeMarkID\u0026quot;\nWHERE\n  \u0026quot;IsPB\u0026quot; = 1 AND \u0026quot;Source_NPSales\u0026quot; = 0\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"NationalChainName\" AS \"RetailerName\",\n  SD.\"CustomerNumber\",\n  SD.\"DSD_CustomerNumber\",\n  \"CustomerName\",\n  SD.\"MaterialNumber\",\n  SD.\"BusDate\",\n  NULL AS \"WeekID\",\n  NULL AS \"Week_Start\",\n  NULL AS \"Week_End\",\n  0 AS \"Weekly_SalesQty\",\n  0 AS \"SingleDay_SalesQty\",\n  0 AS \"Weekly_SalesAmt\",\n  0 AS \"SingleDay_SaleAmt\",\n  0 AS \"IsPromoActivated\",\n  COALESCE(ML.\"IsPOG\", 0) AS \"IsPOG\",\n  COALESCE(ML.\"MaxShelfQty\", 0) AS \"MaxShelfQty\",\n  \"Source_NPSales IM(AT.\u0026quot;AccountID\u0026quot;, \u0026#x27;0\u0026#x27;) \u0026quot;DSD_CustomerNumber\u0026quot;\n\t\t,AT.\u0026quot;TradeMarkID\u0026quot;\n\t\t,CASE \n\t\t\tWHEN DB.\u0026quot;BCSystemID\u0026quot; = \u0026#x27;30013\u0026#x27; --- DSD Bottlers(PB)  \n\t\t\t\tTHEN 1\n\t\t\tELSE 0\n\t\t\tEND \u0026quot;IsPB\u0026quot;\n\tFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMMERCIALS.\u0026quot;V_Dim_ActiveTerritoryByAccount\u0026quot; AT\n\tLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMMERCIALS.\u0026quot;V_Dim_Bottler\u0026quot; DB ON DB.\u0026quot;BottlerID\u0026quot; = AT.\u0026quot;ServicingBottlerID\u0026quot;\n\tWHERE \u0026quot;ProductTypeID\u0026quot; = 1 */\nSELECT DISTINCT\n  LTRIM(\u0026quot;AccountID\u0026quot;, \u0026#x27;0\u0026#x27;) AS \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;TrademarkID\u0026quot; AS \u0026quot;TradeMarkID\u0026quot;,\n  1 AS \u0026quot;IsPB\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.DSD.\u0026quot;V_DIM_CUSTTRADEMARKSVC\u0026quot;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* SELECT DISTINCT LTRIM(AT.\"AccountID\", \u00270\u0027) \"DSD_CustomerNumber\"\n\t\t,AT.\"TradeMarkID\"\n\t\t,CASE \n\t\t\tWHEN DB.\"BCSystemID\" = \u002730013\u0027 --- DSD Bottlers(PB)  \n\t\t\t\tTHEN 1\n\t\t\tELSE 0\n\t\t\tEND \"IsPB\"\n\tFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_ActiveTerritoryByAccount\" AT\n\tLEFT JOIN \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Bottler\" DB ON DB.\"BottlerID\" = AT.\"ServicingBottlerID\"\n\tWHERE \"ProductTypeID\" = 1 */\nSELECT DISTINCT\n  LTRIM(\"AccountID\", \u00270\u0027) AS \"CustomerNumber\",\n  \"TrademarkID\" AS \"TradeMarkID\",\n  1 AS \"IsPB\"\nFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".DSD.\"V_DIM_CUSTTRADEMARKSVC\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:whi _NPSales\u0026quot;,\n  ML.\u0026quot;Material_Source\u0026quot;\nFROM \u0026quot;CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\u0026quot; AS ML\nWHERE\n  ML.\u0026quot;Material_Source\u0026quot; = \u0026#x27;Inbound\u0026#x27;\n  AND ML.\u0026quot;IsPOG\u0026quot; = 0\n  AND ML.\u0026quot;OnHandQty\u0026quot; \u0026gt;= 0\n  AND (\n    (LTRIM(ML.\u0026quot;CustomerNumber\u0026quot;, 0), LTRIM(ML.\u0026quot;MaterialNumber\u0026quot;, 0)) IN (\n      SELECT DISTINCT\n        LTRIM(\u0026quot;CustomerNumber\u0026quot;, 0),\n        LTRIM(\u0026quot;MaterialNumber\u0026quot;, 0)\n      FROM \u0026quot;CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\u0026quot; AS FQ\n      WHERE\n        FQ.\u0026quot;Material_Source\u0026quot; = \u0026#x27;Last_10Days_Ordered\u0026#x27;\n    )\n  ) /* earlier its \u0026gt;0 */\n/* -This needs to be confirm with Cameryn\t\t\t\t \t\t\t\t\t\t\t   */\nUNION\nSELECT DISTINCT\n  ML.\u0026quot;CustomerNumber\u0026quot;,\n  ML.\u0026quot;MaterialNumber\u0026quot;,\n  ML.\u0026quot;DSD_CustomerNumber\u0026quot;,\n  ML.\u0026quot;IsPOG\u0026quot;,\n  ML.\u0026quot;MaxShelfQty\u0026quot;,\n  ML.\u0026quot;OnHandQty\u0026quot;,\n  ML.\u0026quot;Source_NPSales\u0026quot;,\n  ML.\u0026quot;Material_Source\u0026quot;\nFROM \u0026quot;CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\u0026quot; AS ML\nWHERE\n  ML.\u0026quot;Material_Source\u0026quot; = \u0026#x27;Inbound\u0026#x27;\n  AND ML.\u0026quot;IsPOG\u0026quot; = 0\n  AND ML.\u0026quot;OnHandQty\u0026quot; \u0026gt; 0\n  AND (\n    (LTRIM(ML.\u0026quot;CustomerNumber\u0026quot;, 0), LTRIM(ML.\u0026quot;MaterialNumber\u0026quot;, 0)) \u0026lt;\u0026gt; ALL (\n      SELECT DISTINCT\n        LTRIM(\u0026quot;CustomerNumber\u0026quot;, 0),\n        LTRIM(\u0026quot;MaterialNumber\u0026quot;, 0)\n      FROM \u0026quot;CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\u0026quot; AS FQ\n      WHERE\n        FQ.\u0026quot;Material_Source\u0026quot; = \u0026#x27;Last_10Days_Ordered\u0026#x27;\n Source\" = \u0027Inbound\u0027\n  AND ML.\"IsPOG\" = 0\n  AND ML.\"OnHandQty\" \u003e= 0\n  AND (\n    (LTRIM(ML.\"CustomerNumber\", 0), LTRIM(ML.\"MaterialNumber\", 0)) IN (\n      SELECT DISTINCT\n        LTRIM(\"CustomerNumber\", 0),\n        LTRIM(\"MaterialNumber\", 0)\n      FROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS FQ\n      WHERE\n        FQ.\"Material_Source\" = \u0027Last_10Days_Ordered\u0027\n    )\n  ) /* earlier its \u003e0 */\n/* -This needs to be confirm with Cameryn\t\t\t\t \t\t\t\t\t\t\t   */\nUNION\nSELECT DISTINCT\n  ML.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"IsPOG\",\n  ML.\"MaxShelfQty\",\n  ML.\"OnHandQty\",\n  ML.\"Source_NPSales\",\n  ML.\"Material_Source\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS ML\nWHERE\n  ML.\"Material_Source\" = \u0027Inbound\u0027\n  AND ML.\"IsPOG\" = 0\n  AND ML.\"OnHandQty\" \u003e 0\n  AND (\n    (LTRIM(ML.\"CustomerNumber\", 0), LTRIM(ML.\"MaterialNumber\", 0)) \u003c\u003e ALL (\n      SELECT DISTINCT\n        LTRIM(\"CustomerNumber\", 0),\n        LTRIM(\"MaterialNumber\", 0)\n      FROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS FQ\n      WHERE\n        FQ.\"Material_Source\" = \u0027Last_10Days_Ordered\u0027\n    )\n  )\nUNION\nSELECT DISTINCT\n  ML.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"IsPOG\",\n  ML.\"MaxShelfQty\",\n  ML.\"OnHandQty\",\n  ML.\"Source_NPSales\",\n  ML.\"Material_Source\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS ML\nWHERE\n  ML.\"Material_Source\" IN (\u0027Last_10Days_Ordered\u0027) AND \"IsPOG\" = 1\nUNION\nSELECT DISTINCT\n  ML.\"CustomerNumber\",\n  ML.\"MaterialNumber\",\n  ML.\"DSD_CustomerNumber\",\n  ML.\"IsPOG\",\n  ML.\"MaxShelfQty\",\n  ML.\"OnHandQty\",\n  ML.\"Source_NPSales\",\n  ML.\"Material_Source\"\nFROM \"CTE_CustMatl_List_With_POG_Capacity_OnHandQty_All\" AS ML\nWHERE\n  ML.\"Material_Source\" IN (\u0027Last_10Days_Ordered\u0027)\n  AND ML.\"IsPOG\" = 0\n  AND ML.\"OnHandQty\" \u003e= 0 /* earlier its \u003e0 */`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "saleqty_splitted_daily_lf_with_case_converted", "label": "saleqty_splitted_daily_lf_with_case_converted", "opacity": 0.3, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003esaleqty_splitted_daily_lf_with_case_converted\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): saleqty_splitted_daily_lf, case_conversion\u003cbr\u003eUsed by  (1): final_data_to_load_in_history_table_lf_for_pos_available_week\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;, /* ,\u0026quot;IsSmallFormat\u0026quot; */\n  LF.\u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;IsMOD\u0026quot;,\n  \u0026quot;IsPromoActivated\u0026quot;,\n  \u0026quot;OnHandQty\u0026quot;,\n  \u0026quot;Max_ShelfCapacityQty\u0026quot;,\n  \u0026quot;Incremental_Capacity\u0026quot;,\n  \u0026quot;WeekID\u0026quot;,\n  COALESCE(\u0026quot;Weekly_SalesQty\u0026quot; * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0) AS \u0026quot;Weekly_SalesQty_ConvFactorToBase\u0026quot;,\n  COALESCE(\u0026quot;SalesQty_Splitted\u0026quot; * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0) AS \u0026quot;SalesQty_Splitted_ConvFactorToBase\u0026quot;,\n  COALESCE(\u0026quot;EveryDay_Demand_Qty\u0026quot; * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0) AS \u0026quot;EveryDay_Demand_Qty_ConvFactorToBase\u0026quot;,\n  COALESCE(\u0026quot;Promo_Demand_Qty\u0026quot; * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0) AS \u0026quot;Promo_Demand_Qty_ConvFactorToBase\u0026quot;,\n  \u0026quot;SalesAmt\u0026quot;,\n  \u0026quot;Intransit_CaseQty\u0026quot;,\n  \u0026quot;Ordered_CaseQty\u0026quot;,\n  \u0026quot;Delivered_CaseQty\u0026quot;,\n  \u0026quot;Invoiced_CaseQty\u0026quot;,\n  \u0026quot;Next14DaysForecastDemand\u0026quot;\nFROM \u0026quot;SaleQty_Splitted_Daily_LF\u0026quot; AS LF\nLEFT JOIN \u0026quot;Case_Conversion\u0026quot; AS CC\n  ON LTRIM(LF.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(CC.\u0026quot;MaterialNumber\u0026quot;, 0)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\", /* ,\"IsSmallFormat\" */\n  LF.\"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  COALESCE(\"Weekly_SalesQty\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"Weekly_SalesQty_ConvFactorToBase\",\n  COALESCE(\"SalesQty_Splitted\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"SalesQty_Splitted_ConvFactorToBase\",\n  COALESCE(\"EveryDay_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"EveryDay_Demand_Qty_ConvFactorToBase\",\n  COALESCE(\"Promo_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0) AS \"Promo_Demand_Qty_ConvFactorToBase\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"Next14DaysForecastDemand\"\nFROM \"SaleQty_Splitted_Daily_LF\" AS LF\nLEFT JOIN \"Case_Conversion\" AS CC\n  ON LTRIM(LF.\"MaterialNumber\", 0) = LTRIM(CC.\"MaterialNumber\", 0)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "saleqty_splitted_daily_lf", "label": "saleqty_splitted_daily_lf", "opacity": 0.3, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003esaleqty_splitted_daily_lf\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): saleqty_get_split_ratio_lf\u003cbr\u003eUsed by  (1): saleqty_splitted_daily_lf_with_case_converted\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;, /* ,\u0026quot;IsSmallFormat\u0026quot; */\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;IsMOD\u0026quot;,\n  \u0026quot;IsPromoActivated\u0026quot;,\n  \u0026quot;OnHandQty\u0026quot;,\n  \u0 emand_Qty\",\n  \"AlertID\",\n  \"Instock_Score\",\n  \"Instock_Score_Wmt\",\n  \"Lost_units\",\n  \"OOS_Adjustment\",\n  \"SuggestedOrderQty\",\n  CASE WHEN \"IsMOD\" = 0 AND \"SuggestedOrderQty\" = 0 THEN 1 ELSE 0 END AS \"NonModed_SOQ_Zero_Filtered\"\nFROM \"Final_Data_To_Load_In_History_Table_LF_For_POS_Not_Available_Week\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "instock_calc", "label": "instock_calc", "opacity": 0.3, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003einstock_calc\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): final_data_lf\u003cbr\u003eUsed by  (1): final_data_lf_after_instock\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;StartingInventory\u0026quot;,\n  \u0026quot;EndingInventory\u0026quot;,\n  \u0026quot;ConsumerDemand\u0026quot;,\n  \u0026quot;Projected_Inv_Depletion\u0026quot;,\n  \u0026quot;Lost_units\u0026quot;,\n  (\n    (\n      1 + (\n        IFF(\n          \u0026quot;ConsumerDemand\u0026quot; = 0 AND NOT \u0026quot;Lost_units\u0026quot; IS NULL,\n          0,\n          \u0026quot;Lost_units\u0026quot; / \u0026quot;ConsumerDemand\u0026quot;\n        )\n      )\n    ) * 100\n  ) AS \u0026quot;Instock_Score_1\u0026quot;,\n  CASE\n    WHEN \u0026quot;StartingInventory\u0026quot; = 0 AND \u0026quot;ConsumerDemand\u0026quot; = 0\n    THEN 0\n    ELSE \u0026quot;Instock_Score_1\u0026quot;\n  END AS \u0026quot;Instock_Score\u0026quot;\nFROM (\n  SELECT\n    \u0026quot;BusDate\u0026quot;,\n    \u0026quot;CustomerNumber\u0026quot;,\n    \u0026quot;MaterialNumber\u0026quot;,\n    \u0026quot;StartingInventory\u0026quot;,\n    \u0026quot;EndingInventory\u0026quot;,\n    \u0026quot;ConsumerDemand\u0026quot;,\n    \u0026quot;Projected_Inv_Depletion\u0026quot;,\n    CASE WHEN \u0026quot;Projected_Inv_Depletion\u0026quot; \u0026gt; 0 THEN 0 ELSE \u0026quot;Projected_Inv_Depletion\u0026quot; END AS \u0026quot;Lost_units\u0026quot;\n  FROM (\n    SELECT\n      \u0026quot;BusDate\u0026quot;,\n      \u0026quot;CustomerNumber\u0026quot;,\n      \u0026quot;MaterialNumber\u0026quot;,\n      \u0026quot;StartingInventory\u0026quot;,\n      \u0026quot;EndingInventory\u0026quot;,\n      \u0026quot;ConsumerDemand\u0026quot;,\n      (\n        \u0026quot;StartingInventory\u0026quot; - \u0026quot;ConsumerDemand\u0026quot;\n      ) AS \u0026quot;Projected_Inv_Depletion\u0026quot;\n    FROM (\n      SELECT\n        \u0026quot;BusDate\u0026quot;,\n        \u0026quot;CustomerNumber\u0026quot;,\n        \u0026quot;MaterialNumber\u0026quot;,\n        LAG(SUM(\u0026quot;OnHandQty\u0026quot;)) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;BusDate\u0026quot;) AS \u0026quot;StartingInventory\u0026quot;,\n        SUM(\u0026quot;OnHandQty\u0026quot;) AS \u0026quot;EndingInventory\u0026quot;,\n        SUM(\u0026quot;EveryDay_Demand_Qty\u0026quot; + \u0026quot;Promo_Demand_Qty\u0026quot;) AS \u0026quot;ConsumerDemand\u0026quot;\n      FROM \u0026quot;Final_Data_LF\u0026quot;\n      GROUP BY\n        \u0026quot;BusDate\u0026quot;,\n        \u0026quot;CustomerNumber\u0026quot;,\n        \u0026quot;MaterialNumber\u0026quot;\n    )\n  )\n)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  \"BusDate\",\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"StartingInventory\",\n  \"EndingInventory\",\n  \"ConsumerDemand\",\n  \"Projected_Inv_Depletion\",\n  \"Lost_units\",\n  (\n    (\n      1 + (\n        IFF(\n          \"ConsumerDemand\" = 0 AND NOT \"Lost_units\" IS NULL,\n          0,\n          \"Lost_units\" / \"ConsumerDemand\"\n        )\n      )\n    ) * 100\n  ) AS \"Instock_Score_1\",\n  CASE\n    WHEN \"StartingInventory\" = 0 AND \"ConsumerDemand\" = 0\n    THEN 0\n    ELSE \"Instock_Score_1\"\n  END AS \"Instock_Score\"\nFROM (\n  SELECT\n    \"BusDate\",\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    \"StartingInventory\",\n    \"EndingInventory\",\n    \"ConsumerDemand\",\n    \"Projected_Inv_Depletion\",\n    CASE WHEN \"Projected_Inv_Depletion\" \u003e 0 THEN 0 ELSE \"Projected_Inv_Depletion\" END AS \"Lost_units\"\n  FROM (\n    SELECT\n      \"BusDate\",\n      \"CustomerNumber\",\n      \"MaterialNumber\",\n      \"StartingInventory\",\n      \"EndingInventory\",\n      \"ConsumerDemand\",\n      (\n        \"StartingInventory\" - \"ConsumerDemand\"\n      ) AS \"Projected_Inv_Depletion\"\n    FROM (\n      SELECT\n        \"BusDate\",\n        \"CustomerNumber\",\n        \"MaterialNumber\",\n        LAG(SUM(\"OnHandQty\")) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"BusDate\") AS \"StartingInventory\",\n        SUM(\"OnHandQty\") AS \"EndingInventory\",\n        SUM(\"EveryDay_Demand_Qty\" + \"Promo_Demand_Qty\") AS \"ConsumerDemand\"\n      FROM \"Final_Data_LF\"\n      GROUP BY\n        \"BusDate\",\n        \"CustomerNumber\",\n        \"MaterialNumber\"\n    )\n  )\n)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "instock_retailer", "label": "instock_retailer", "opacity": 0.3, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003einstock_retailer\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): final_data_lf\u003cbr\u003eUsed by  (1): final_data_lf_after_instock\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;IsMOD\u0026quot;,\n  \u0026quot;StartingInventory\u0026quot;,\n  \u0026quot;EndingInventory\u0026quot;,\n  \u0026quot;ConsumerDemand\u0026quot;,\n  CASE\n    WHEN \u0026quot;IsMOD\u0026quot; = 1 AND \u0026quot;StartingInventory\u0026quot; \u0026gt; 0\n    THEN 100\n    WHEN \u0026quot;IsMOD\u0026quot; = 1 AND \u0026quot;StartingInventory\u0026quot; = 0\n    THEN 0\n    ELSE NULL\n  END AS \u0026quot;InstockScore_Retailer\u0026quot;\nFROM (\n  SELECT\n    \u0026quot;BusDate\u0026quot;,\n    \u0026quot;CustomerNumber\u0026quot;,\n    \u0026quot;MaterialNumber\u0026quot;,\n    \u0026quot;IsMOD\u0026quot;,\n    LAG(SUM(\u0026quot;OnHandQty\u0026quot;)) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;BusDate\u0026quot;) AS \u0026quot;StartingInventory\u0026quot;,\n    SUM(\u0026quot;OnHandQty\u0026quot;) AS \u0026quot;EndingInventory\u0026quot;,\n    SUM(\u0026quot;EveryDay_Demand_Qty\u0026quot; + \u0026quot;Promo_Demand_Qty\u0026quot;) AS \u0026quot;ConsumerDemand\u0026quot;\n  FROM \u0026quot;Final_Data_LF\u0026quot;\n  GROUP BY\n    \u0026quot;BusDate\u0026quot;,\n    \u0026quot;CustomerNumber\u0026quot;,\n    \u0026quot;MaterialNumber\u0026quot;,\n    \u0026quot;IsMOD\u0026quot;\n)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  \"BusDate\",\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"IsMOD\",\n  \"StartingInventory\",\n  \"EndingInventory\",\n  \"ConsumerDemand\",\n  CASE\n    WHEN \"IsMOD\" = 1 AND \"StartingInventory\" \u003e 0\n    THEN 100\n    WHEN \"IsMOD\" = 1 AND \"StartingInventory\" = 0\n    THEN 0\n    ELSE NULL\n  END AS \"InstockScore_Retailer\"\nFROM (\n  SELECT\n    \"BusDate\",\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    \"IsMOD\",\n    LAG(SUM(\"OnHandQty\")) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"BusDate\") AS \"StartingInventory\",\n    SUM(\"OnHandQty\") AS \"EndingInventory\",\n    SUM(\"EveryDay_Demand_Qty\" + \"Promo_Demand_Qty\") AS \"ConsumerDemand\"\n  FROM \"Final_Data_LF\"\n  GROUP BY\n    \"BusDate\",\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    \"IsMOD\"\n)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "orderpredicted", "label": "orderpredicted", "opacity": 0.3, "shadow": true, "shape": "box", "size": 31, "title": "\n    \u003cb\u003eorderpredicted\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): storelist\u003cbr\u003eUsed by  (2): final_data_lf_for_pos_not_available, final_data_lf_for_pos_available\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;BusDate\u0026quot;,\n  MO.\u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  COALESCE(\u0026quot;EverydayDemandQty\u0026quot;, 0) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  COALESCE(\u0026quot;PromoLiftQty\u0026quot;, 0) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n  COALESCE(\u0026quot;ForecastedSalesQty\u0026quot;, 0) AS \u0026quot;Forecast_Demand_Qty\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_RETAILER}\u0026quot;.FORECAST.\u0026quot;Fact_RetailerNPSales_OrderPredicted_ML_Outbound\u0026quot; AS MO\nJOIN \u0026quot;StoreList\u0026quot; AS PO\n  ON LTRIM(MO.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(PO.\u0026quot;CustomerNumber\u0026quot;, 0)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"BusDate\",\n  MO.\"CustomerNumber\",\n  \"MaterialNumber\",\n  COALESCE(\"EverydayDemandQty\", 0) AS \"EveryDay_Demand_Qty\",\n  COALESCE(\"PromoLiftQty\", 0) AS \"Promo_Demand_Qty\",\n  COALESCE(\"ForecastedSalesQty\", 0) AS \"Forecast_Demand_Qty\"\nFROM \"\u0026{VAR_SNOWDB_RETAILER}\".FORECAST.\"Fact_RetailerNPSales_OrderPredicted_ML_Outbound\" AS MO\nJOIN \"StoreList\" AS PO\n  ON LTRIM(MO.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", 0)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "saleqty_get_split_ratio_lf", "label": "saleqty_get_split_ratio_lf", "opacity": 0.3, "shadow": true, "shape": "box", "size": 34, "title": "\n    \u003cb\u003esaleqty_get_split_ratio_lf\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (3): splitted_daily_ratio, final_data_lf_pos_available_week, splitted_daily_ratio_avg_on_day_of_week\u003cbr\u003eUsed by  (1): saleqty_splitted_daily_lf\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;, /* ,\u0026quot;IsSmallFormat\u0026quot; */\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;IsMOD\u0026quot;,\n  \u0026quot;IsPromoActivated\u0026quot;,\n  \u0026quot;OnHandQty\u0026quot;,\n  \u0026quot;Max_ShelfCapacityQty\u0026quot;,\n  \u0026quot;Incremental_Capacity\u0026quot;,\n  \u0026quot;WeekID\u0026quot;,\n  LF.\u0026quot;Day_Of_Week\u0026quot;,\n  LF.\u0026quot;Week_Of_Year\u0026quot;,\n  \u0026quot;Weekly_SalesQty\u0026quot;,\n  ROUND(\n    COALESCE(\n      DR_FullMatch.\u0026quot;DailyRatio\u0026quot;,\n      DR_FallBack1.\u0026quot;DailyRatio\u0026quot;,\n      DR_FallBack2.\u0026quot;DailyRatio\u0026quot;,\n      DR_FallBack3.\u0026quot;AVG_DailyRatio\u0026quot;\n    ),\n    5\n  ) AS \u0026quot;SplitRatioSelected\u0026quot;,\n  ROUND(\n    \u0026quot;Weekly_SalesQty\u0026quot; * (\n      COALESCE(\n        DR_FullMatch.\u0026quot;DailyRatio\u0026quot;,\n        DR_FallBack1.\u0026quot;DailyRatio\u0026quot;,\n        DR_FallBack2.\u0026quot;DailyRatio\u0026quot;,\n        DR_FallBack3.\u0026quot;AVG_DailyRatio\u0026quot;\n      )\n    ),\n    5\n  ) AS \u0026quot;Weekly_SalesQty_Converted_To_Daily\u0026quot;,\n  CASE\n    WHEN DR_FullMatch.\u0026quot;DailyRatio\u0026quot; \u0026gt; 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \u0026quot;DSD_CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;, \u0026quot;BusDate\u0026quot;\n      ORDER BY DR_FullMatch.\u0026quot;DailyRatio\u0026quot;\n    )\n    WHEN DR_FallBack1.\u0026quot;DailyRatio\u0026quot; \u0026gt; 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \u0026quot;DSD_CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;, \u0026quot;BusDate\u0026quot;\n      ORDER BY DR_FallBack1.\u0026quot;DailyRatio\u0026quot;\n    )\n    WHEN DR_FallBack2.\u0026quot;DailyRatio\u0026quot; \u0026gt; 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \u0026quot;DSD_CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;, \u0026quot;BusDate\u0026quot;\n      ORDER BY DR_FallBack2.\u0026quot;DailyRatio\u0026quot;\n    )\n    ELSE ROW_NUMBER() OVER (\n      PARTITION BY \u0026quot;DSD_CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;, \u0026quot;BusDate\u0026quot;\n      ORDER BY DR_FallBack3.\u0026quot;AVG_DailyRatio\u0026quot;\n    )\n  END AS \u0026quot;rn\u0026quot;,\n  \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  \u0026quot;Promo_Demand_Qty\u0026quot;,\n  \u0026quot;SalesAmt\u0026quot;,\n  \u0026quot;Intransit_CaseQty\u0026quot;,\n  \u0026quot;Ordered_CaseQty\u0026quot;,\n  \u0026quot;Delivered_CaseQty\u0026quot;,\n  \u0026quot;Invoiced_CaseQty\u0026quot;,\n  \u0026quot;Next14DaysForecastDemand\u0026quot;\nFROM \u0026quot;Final_Data_LF_POS_Available_Week\u0026quot; AS LF\nINNER JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_MD}\u0026quot;.CALENDAR.\u0026quot;V_CalDay\u0026quot; AS CL\n  ON CL.\u0026quot;DayDate\u0026quot; = LF.\u0026quot;BusDate\u0026quot;\nLEFT JOIN \u0026quot;Splitted_Daily_Ratio\u0026quot; AS DR_FullMatch\n  ON CL.\u0026quot;HolidayName\u0026quot; = DR_FullMatch.\u0026quot;Holiday_Name\u0026quot;\n  AND LF.\u0026quot;Day_Of_Week\u0026quot; = DR_FullMatch.\u0026quot;Day_Of_Week\u0026quot;\n  AND LF.\u0026quot;Week_Of_Year\u0026quot; = DR_FullMatch.\u0026quot;WeekOfYear\u0026quot;\n  AND LF.\u0026quot;IsPromoActivated\u0026quot; = DR_FullMatch.\u0026quot;IsPromoActive\u0026quot;\nLEFT JOIN \u0026quot;Splitted_Daily_Ratio\u0026quot; AS DR_FallBack1\n  ON LF.\u0026quot;Day_Of_Week\u0026quot; = DR_FallBack1.\u0026quot;Day_Of_Week\u0026quot;\n  AND LF.\u0026quot;Week_Of_Year\u0026quot; = DR_FallBack1.\u0026quot;WeekOfYear\u0026quot;\n  AND LF.\u0026quot;IsPromoActivated\u0026quot; = DR_FallBack1.\u0026quot;IsPromoActive\u0026quot;\nLEFT JOIN \u0026quot;Splitted_Daily_Ratio\u0026quot; AS DR_FallBack2\n  ON LF.\u0026quot;Day_Of_Week\u0026quot; = DR_FallBack2.\u0026quot;Day_Of_Week\u0026quot;\n  AND LF.\u0026quot;Week_Of_Year\u0026quot; = DR_FallBack2.\u0026quot;WeekOfYear\u0026quot;\nLEFT JOIN \u0026quot;Splitted_Daily_Ratio_Avg_On_Day_Of_Week\u0026quot; AS DR_FallBack3\n  ON LF.\u0026quot;Day_Of_Week\u0026quot; = DR_FallBack3.\u0026quot;Day_Of_Week\u0026quot;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\", /* ,\"IsSmallFormat\" */\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  LF.\"Day_Of_Week\",\n  LF.\"Week_Of_Year\",\n  \"Weekly_SalesQty\",\n  ROUND(\n    COALESCE(\n      DR_FullMatch.\"DailyRatio\",\n      DR_FallBack1.\"DailyRatio\",\n      DR_FallBack2.\"DailyRatio\",\n      DR_FallBack3.\"AVG_DailyRatio\"\n    ),\n    5\n  ) AS \"SplitRatioSelected\",\n  ROUND(\n    \"Weekly_SalesQty\" * (\n      COALESCE(\n        DR_FullMatch.\"DailyRatio\",\n        DR_FallBack1.\"DailyRatio\",\n        DR_FallBack2.\"DailyRatio\",\n        DR_FallBack3.\"AVG_DailyRatio\"\n      )\n    ),\n    5\n  ) AS \"Weekly_SalesQty_Converted_To_Daily\",\n  CASE\n    WHEN DR_FullMatch.\"DailyRatio\" \u003e 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"BusDate\"\n      ORDER BY DR_FullMatch.\"DailyRatio\"\n    )\n    WHEN DR_FallBack1.\"DailyRatio\" \u003e 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"BusDate\"\n      ORDER BY DR_FallBack1.\"DailyRatio\"\n    )\n    WHEN DR_FallBack2.\"DailyRatio\" \u003e 0\n    THEN ROW_NUMBER() OVER (\n      PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"BusDate\"\n      ORDER BY DR_FallBack2.\"DailyRatio\"\n    )\n    ELSE ROW_NUMBER() OVER (\n      PARTITION BY \"DSD_CustomerNumber\", \"MaterialNumber\", \"BusDate\"\n      ORDER BY DR_FallBack3.\"AVG_DailyRatio\"\n    )\n  END AS \"rn\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"Next14DaysForecastDemand\"\nFROM \"Final_Data_LF_POS_Available_Week\" AS LF\nINNER JOIN \"\u0026{VAR_SNOWDB_MD}\".CALENDAR.\"V_CalDay\" AS CL\n  ON CL.\"DayDate\" = LF.\"BusDate\"\nLEFT JOIN \"Splitted_Daily_Ratio\" AS DR_FullMatch\n  ON CL.\"HolidayName\" = DR_FullMatch.\"Holiday_Name\"\n  AND LF.\"Day_Of_Week\" = DR_FullMatch.\"Day_Of_Week\"\n  AND LF.\"Week_Of_Year\" = DR_FullMatch.\"WeekOfYear\"\n  AND   SELECT\n      MAX(\"WeekID\")\n    FROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderNPSales_ML_Inbound\"\n  )`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "shipment_ordered_data_last_10_days", "label": "shipment_ordered_data_last_10_days", "opacity": 0.3, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003eshipment_ordered_data_last_10_days\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): storelist\u003cbr\u003eUsed by  (1): missing_material_data_from_last10days\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  SL.\u0026quot;CustomerNumber\u0026quot; AS \u0026quot;CustomerNumber\u0026quot;,\n  OO.\u0026quot;ItemNumber\u0026quot; AS \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.\u0026quot;ORDER\u0026quot;.\u0026quot;V_Fact_DSD_OriginalOrder\u0026quot; AS OO\nJOIN \u0026quot;StoreList\u0026quot; AS SL\n  ON LTRIM(SL.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(OO.\u0026quot;CustomerNumber\u0026quot;, 0)\nJOIN \u0026quot;\u0026amp;{VAR_SNOWDB_COMMERCIAL}\u0026quot;.TECHNICAL.\u0026quot;Xref_DSD_AccountBranchMaterial\u0026quot; AS AM\n  ON LTRIM(OO.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(AM.\u0026quot;AccountID\u0026quot;, 0)\n  AND LTRIM(OO.\u0026quot;ItemNumber\u0026quot;, 0) = LTRIM(AM.\u0026quot;MaterialID\u0026quot;, 0)\nWHERE\n  OO.\u0026quot;Type\u0026quot; = \u0026#x27;O\u0026#x27;\n  AND NOT OO.\u0026quot;OrderStatus\u0026quot; IN (-1, -2, 99)\n  AND (OO.\u0026quot;CustomerNumber\u0026quot;, OO.\u0026quot;ItemNumber\u0026quot;) IN (\n    SELECT DISTINCT\n      \u0026quot;CustomerNumber\u0026quot;,\n      \u0026quot;ItemNumber\u0026quot;\n    FROM \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.\u0026quot;ORDER\u0026quot;.\u0026quot;V_Fact_DSD_OriginalOrder\u0026quot;\n    WHERE\n      \u0026quot;OrderDate\u0026quot; \u0026gt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 5 /* Ref #1 */\n  )\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  SL.\"CustomerNumber\" AS \"CustomerNumber\",\n  OO.\"ItemNumber\" AS \"MaterialNumber\",\n  \"DSD_CustomerNumber\"\nFROM \"\u0026{VAR_SNOWDB_SALES}\".\"ORDER\".\"V_Fact_DSD_OriginalOrder\" AS OO\nJOIN \"StoreList\" AS SL\n  ON LTRIM(SL.\"DSD_CustomerNumber\", 0) = LTRIM(OO.\"CustomerNumber\", 0)\nJOIN \"\u0026{VAR_SNOWDB_COMMERCIAL}\".TECHNICAL.\"Xref_DSD_AccountBranchMaterial\" AS AM\n  ON LTRIM(OO.\"CustomerNumber\", 0) = LTRIM(AM.\"AccountID\", 0)\n  AND LTRIM(OO.\"ItemNumber\", 0) = LTRIM(AM.\"MaterialID\", 0)\nWHERE\n  OO.\"Type\" = \u0027O\u0027\n  AND NOT OO.\"OrderStatus\" IN (-1, -2, 99)\n  AND (OO.\"CustomerNumber\", OO.\"ItemNumber\") IN (\n    SELECT DISTINCT\n      \"CustomerNumber\",\n      \"ItemNumber\"\n    FROM \"\u0026{VAR_SNOWDB_SALES}\".\"ORDER\".\"V_Fact_DSD_OriginalOrder\"\n    WHERE\n      \"OrderDate\" \u003e= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 5 /* Ref #1 */\n  )`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "final_data_lf_for_pos_not_available", "label": "final_data_lf_for_pos_not_available", "opacity": 0.3, "shadow": true, "shape": "box", "size": 40, "title": "\n    \u003cb\u003efinal_data_lf_for_pos_not_available\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (5): orderpredicted, get_max_weekid_date_from_v_fact_retailerweekly, inbound_prep_rm_data, case_conversion, storelist\u003cbr\u003eUsed by  (1): final_data\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;,\n  \u0026quot;IsSmallFormat\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;IsMOD\u0026quot;,\n  \u0026quot;IsPromoActivated\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;OnHandQty\u0026quot;,\n  \u0026quot;Max_ShelfCapacityQty\u0026quot;,\n  \u0026quot;Incremental_Capacity\u0026quot;,\n  \u0026quot;WeekID\u0026quot;,\n  \u0026quot;Week_Start\u0026quot;,\n  \u0026quot;Week_End\u0026quot;,\n  \u0026quot;Weekly_SalesQty\u0026quot;,\n  \u0026quot;SalesQty\u0026quot;,\n  \u0026quot;Weekly_SalesAmt\u0026quot;,\n  \u0026quot;SalesAmt\u0026quot;,\n  \u0026quot;Intransit_CaseQty\u0026quot;,\n  \u0026quot;Ordered_CaseQty\u0026quot;,\n  \u0026quot;Delivered_CaseQty\u0026quot;,\n  \u0026quot;Invoiced_CaseQty\u0026quot;,\n  \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  \u0026quot;Promo_Demand_Qty\u0026quot;,\n  \u0026quot;Forecast_Demand_Qty\u0026quot;,\n  \u0026quot;Next14DaysForecastDemand\u0026quot;,\n  CASE\n    WHEN NOT \u0026quot;DeliveryDate\u0026quot; IS NULL\n    AND \u0026quot;OrderDate\u0026quot; IS NULL /* Ref #2 */\n    AND \u0026quot;DeliveryDate\u0026quot; \u0026gt; CURRENT_DATE\n    THEN \u0026quot;DeliveryDate\u0026quot;\n    ELSE NULL\n  END AS \u0026quot;DeliveryDateRnk\u0026quot;,\n  IFF(\n    \u0026quot;DeliveryDateRnk\u0026quot; IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;DeliveryDateRnk\u0026quot;)\n  ) AS \u0026quot;rnk\u0026quot;\nFROM (\n  SELECT DISTINCT\n    IB.\u0026quot;CustomerNumber\u0026quot;,\n    PO.\u0026quot;DSD_CustomerNumber\u0026quot;,\n    PO.\u0026quot;IsSmallFormat\u0026quot;,\n    IB.\u0026quot;MaterialNumber\u0026quot;,\n    IB.\u0026quot;BusDate\u0026quot;, /* ,COALESCE(IB.\u0026quot;OrderDate\u0026quot;, RMD1.\u0026quot;OrderDate\u0026quot;) AS \u0026quot;OrderDate\u0026quot; --Ref #2 */ /* ,COALESCE(IB.\u0026quot;DeliveryDate\u0026quot;, RMD1.\u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;DeliveryDate\u0026quot; */\n    IB.\u0026quot;OrderDate\u0026quot;,\n    IB.\u0026quot;DeliveryDate\u0026quot;,\n    \u0026quot;IsPOG\u0026quot; AS \u0026quot;IsMOD\u0026quot;,\n    \u0026quot;IsPromoActivated\u0026quot;, /* ,NULL AS \u0026quot;OnHandQty\u0026quot; */\n    CASE\n      WHEN \u0026quot;IsSmallFormat\u0026quot; = 0\n      THEN COALESCE(COALESCE(DI.\u0026quot;OnHandQty\u0026quot;, 0) * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0)\n      ELSE 0\n    END AS \u0026quot;OnHandQty\u0026quot;, /* ,\u0026quot;MaxShelfQty\u0026quot; AS \u0026quot;Max_ShelfCapacityQty\u0026quot; */\n    CASE\n      WHEN \u0026quot;IsSmallFormat\u0026quot; = 0\n      THEN COALESCE(COALESCE(IB.\u0026quot;MaxShelfQty\u0026quot;, 0) * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0)\n      ELSE 0\n    END AS \u0026quot;Max_ShelfCapacityQty\u0026quot;,\n    NULL AS \u0026quot;Incremental_Capacity\u0026quot;,\n    IB.\u0026quot;WeekID\u0026quot;,\n    \u0026quot;Week_Start\u0026quot;,\n    \u0026quot;Week_End\u0026quot;,\n    \u0026quot;Weekly_SalesQty\u0026quot;,\n    \u0026quot;SingleDay_SalesQty\u0026quot; AS \u0026quot;SalesQty\u0026quot;,\n    \u0026quot;Weekly_SalesAmt\u0026quot;,\n    \u0026quot;SingleDay_SaleAmt\u0026quot; AS \u0026quot;SalesAmt\u0026quot;,\n    COALESCE(IB.\u0026quot;Intransit_CaseQty\u0026quot;, 0) AS \u0026quot;Intransit_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Ordered_CaseQty\u0026quot;, 0) AS \u0026quot;Ordered_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Delivered_CaseQty\u0026quot;, 0) AS \u0026quot;Delivered_CaseQty\u0026quot;,\n    COALESCE(IB.\u0026quot;Invoiced_CaseQty\u0026quot;, 0) AS \u0026quot;Invoiced_CaseQty\u0026quot;,\n    COALESCE(OP.\u0026quot;EveryDay_Demand_Qty\u0026quot;, 0) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n    COALESCE(OP.\u0026quot;Promo_Demand_Qty\u0026quot;, 0) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n    COALESCE(OP.\u0026quot;Forecast_Demand_Qty\u0026quot;, 0) AS \u0026quot;Forecast_Demand_Qty\u0026quot;,\n    SUM(COALESCE(OP.\u0026quot;Forecast_Demand_Qty\u0026quot; * COALESCE(\u0026quot;ConvFactorToBase\u0026quot;, 1), 0)) OVER (PARTITION BY IB.\u0026quot;CustomerNumber\u0026quot;, IB.\u0026quot;MaterialNumber\u0026quot; ORDER BY IB.\u0026quot;BusDate\u0026quot; DESC) AS \u0026quot;Next14DaysForecastDemand\u0026quot;\n  FROM \u0026quot;InBound_Prep_RM_Data\u0026quot; AS IB\n  JOIN \u0026quot;StoreList\u0026quot; AS PO\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(PO.\u0026quot;CustomerNumber\u0026quot;, 0)\n  /* LEFT JOIN ( */ /* \tSELECT DISTINCT \u0026quot;CustomerNumber\u0026quot; */ /* \t\t,\u0026quot;DeliveryDate\u0026quot; */ /* \t\t,\u0026quot;OrderDate\u0026quot; --Ref #2 */ /* \tFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderShpmnt_ML_Inbound\u0026quot; */ /* \t) RMD1 ON LTRIM(PO.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(RMD1.\u0026quot;CustomerNumber\u0026quot;, 0) */ /* \tAND IB.\u0026quot;BusDate\u0026quot; = RMD1.\u0026quot;DeliveryDate\u0026quot; */ /* \tAND RMD1.\u0026quot;OrderDate\u0026quot; IS NOT NULL */\n  LEFT JOIN \u0026quot;Case_Conversion\u0026quot; AS CC\n    ON LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(CC.\u0026quot;MaterialNumber\u0026quot;, 0)\n  LEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_RETAILER}\u0026quot;.INVENTORY.\u0026quot;Fact_DailyInventory\u0026quot; AS DI\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(DI.\u0026quot;CustomerNumber\u0026quot;, 0)\n    AND LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(DI.\u0026quot;MaterialNumber\u0026quot;, 0)\n    AND IB.\u0026quot;BusDate\u0026quot; = DI.\u0026quot;BusDate\u0026quot;\n  LEFT JOIN \u0026quot;OrderPredicted\u0026quot; AS OP\n    ON LTRIM(IB.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(OP.\u0026quot;CustomerNumber\u0026quot;, 0)\n    AND LTRIM(IB.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(OP.\u0026quot;MaterialNumber\u0026quot;, 0)\n    AND IB.\u0026quot;BusDate\u0026quot; = OP.\u0026quot;BusDate\u0026quot;\n)\nWHERE\n  \u0026quot;BusDate\u0026quot; BETWEEN (\n    SELECT\n      DATEADD(DAY, 1, \u0026quot;WeekID_Source_LastDate\u0026quot;)\n    FROM \u0026quot;Get_Max_WeekId_Date_From_V_Fact_RetailerWeekly\u0026quot;\n  ) AND DATEADD(DAY, -1, TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))) /* DATE(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP)::TIMESTAMP_NTZ) */\n  AND \u0026quot;IsSmallFormat\u0026quot; = 0\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"IsSmallFormat\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"IsMOD\",\n  \"IsPromoActivated\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"OnHandQty\",\n  \"Max_ShelfCapacityQty\",\n  \"Incremental_Capacity\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  \"SalesQty\",\n  \"Weekly_SalesAmt\",\n  \"SalesAmt\",\n  \"Intransit_CaseQty\",\n  \"Ordered_CaseQty\",\n  \"Delivered_CaseQty\",\n  \"Invoiced_CaseQty\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"Forecast_Demand_Qty\",\n  \"Next14DaysForecastDemand\",\n  CASE\n    WHEN NOT \"DeliveryDate\" IS NULL\n    AND \"OrderDate\" IS NULL /* Ref #2 */\n    AND \"DeliveryDate\" \u003e CURRENT_DATE\n    THEN \"DeliveryDate\"\n    ELSE NULL\n  END AS \"DeliveryDateRnk\",\n  IFF(\n    \"DeliveryDateRnk\" IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDateRnk\")\n  ) AS \"rnk\"\nFROM (\n  SELECT DISTINCT\n    IB.\"CustomerNumber\",\n    PO.\"DSD_CustomerNumber\",\n    PO.\"IsSmallFormat\",\n    IB.\"MaterialNumber\",\n    IB.\"BusDate\", /* ,COALESCE(IB.\"OrderDate\", RMD1.\"OrderDate\") AS \"OrderDate\" --Ref #2 */ /* ,COALESCE(IB.\"DeliveryDate\", RMD1.\"DeliveryDate\") AS \"DeliveryDate\" */\n    IB.\"OrderDate\",\n    IB.\"DeliveryDate\",\n    \"IsPOG\" AS \"IsMOD\",\n    \"IsPromoActivated\", /* ,NULL AS \"OnHandQty\" */\n    CASE\n      WHEN \"IsSmallFormat\" = 0\n      THEN COALESCE(COALESCE(DI.\"OnHandQty\", 0) * COALESCE(\"ConvFactorToBase\", 1), 0)\n      ELSE 0\n    END AS \"OnHandQty\", /* ,\"MaxShelfQty\" AS \"Max_ShelfCapacityQty\" */\n    CASE\n      WHEN \"IsSmallFormat\" = 0\n      THEN COALESCE(COALESCE(IB.\"MaxShelfQty\", 0) * COALESCE(\"ConvFactorToBase\", 1), 0)\n      ELSE 0\n    END AS \"Max_ShelfCapacityQty\",\n    NULL AS \"Incremental_Capacity\",\n    IB.\"WeekID\",\n    \"Week_Start\",\n    \"Week_End\",\n    \"Weekly_SalesQty\",\n    \"SingleDay_SalesQty\" AS \"SalesQty\",\n    \"Weekly_SalesAmt\",\n    \"SingleDay_SaleAmt\" AS \"SalesAmt\",\n    COALESCE(IB.\"Intransit_CaseQty\", 0) AS \"Intransit_CaseQty\",\n    COALESCE(IB.\"Ordered_CaseQty\", 0) AS \"Ordered_CaseQty\",\n    COALESCE(IB.\"Delivered_CaseQty\", 0) AS \"Delivered_CaseQty\",\n    COALESCE(IB.\"Invoiced_CaseQty\", 0) AS \"Invoiced_CaseQty\",\n    COALESCE(OP.\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n    COALESCE(OP.\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n    COALESCE(OP.\"Forecast_Demand_Qty\", 0) AS \"Forecast_Demand_Qty\",\n    SUM(COALESCE(OP.\"Forecast_Demand_Qty\" * COALESCE(\"ConvFactorToBase\", 1), 0)) OVER (PARTITION BY IB.\"CustomerNumber\", IB.\"MaterialNumber\" ORDER BY IB.\"BusDate\" DESC) AS \"Next14DaysForecastDemand\"\n  FROM \"InBound_Prep_RM_Data\" AS IB\n  JOIN \"StoreList\" AS PO\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", 0)\n  /* LEFT JOIN ( */ /* \tSELECT DISTINCT \"CustomerNumber\" */ /* \t\t,\"DeliveryDate\" */ /* \t\t,\"OrderDate\" --Ref #2 */ /* \tFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\" */ /* \t) RMD1 ON LTRIM(PO.\"DSD_CustomerNumber\", 0) = LTRIM(RMD1.\"CustomerNumber\", 0) */ /* \tAND IB.\"BusDate\" = RMD1.\"DeliveryDate\" */ /* \tAND RMD1.\"OrderDate\" IS NOT NULL */\n  LEFT JOIN \"Case_Conversion\" AS CC\n    ON LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(CC.\"MaterialNumber\", 0)\n  LEFT JOIN \"\u0026{VAR_SNOWDB_RETAILER}\".INVENTORY.\"Fact_DailyInventory\" AS DI\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(DI.\"CustomerNumber\", 0)\n    AND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(DI.\"MaterialNumber\", 0)\n    AND IB.\"BusDate\" = DI.\"BusDate\"\n  LEFT JOIN \"OrderPredicted\" AS OP\n    ON LTRIM(IB.\"CustomerNumber\", 0) = LTRIM(OP.\"CustomerNumber\", 0)\n    AND LTRIM(IB.\"MaterialNumber\", 0) = LTRIM(OP.\"MaterialNumber\", 0)\n    AND IB.\"BusDate\" = OP.\"BusDate\"\n)\nWHERE\n  \"BusDate\" BETWEEN (\n    SELECT\n      DATEADD(DAY, 1, \"WeekID_Source_LastDate\")\n    FROM \"Get_Max_WeekId_Date_From_V_Fact_RetailerWeekly\"\n  ) AND DATEADD(DAY, -1, TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))) /* DATE(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP)::TIMESTAMP_NTZ) */\n  AND \"IsSmallFormat\" = 0`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "inbound_prep_rm_data", "label": "inbound_prep_rm_data", "opacity": 0.3, "shadow": true, "shape": "box", "size": 34, "title": "\n    \u003cb\u003einbound_prep_rm_data\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): inbound_prep_deliverydates, storelist\u003cbr\u003eUsed by  (2): final_data_lf_for_pos_not_available, final_data_lf_for_pos_available\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  \u0026quot;RetailerName\u0026quot;,\n  DD.\u0026quot;CustomerNumber\u0026quot;,\n  DD.\u0026quot;DSD_CustomerNumber\u0026quot;,\n  \u0026quot;CustomerName\u0026quot;,\n  DD.\u0026quot;MaterialNumber\u0026quot;,\n  DD.\u0026quot;BusDate\u0026quot;,\n  \u0026quot;ScheduledDeliveryDate\u0026quot;,\n  \u0026quot;ActualDeliveryDate\u0026quot;,\n  DD.\u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;WeekID\u0026quot;,\n  \u0026quot;Week_Start\u0026quot;,\n  \u0026quot;Week_End\u0026quot;,\n  \u0026quot;Weekly_SalesQty\u0026quot;,\n  \u0026quot;SingleDay_SalesQty\u0026quot;,\n  \u0026quot;Weekly_SalesAmt\u0026quot;,\n  \u0026quot;SingleDay_SaleAmt\u0026quot;,\n  \u0026quot;IsPromoActivated\u0026quot;,\n  DD.\u0026quot;IsPOG\u0026quot;,\n  DD.\u0026quot;MaxShelfQty\u0026quot;,\n  OO.\u0026quot;OrderNumber\u0026quot;,\n  OO.\u0026quot;OrderDate\u0026quot;,\n  OO.\u0026quot;CaseQty\u0026quot; AS \u0026quot;Ordered_CaseQty\u0026quot;,\n  CASE WHEN I.\u0026quot;OrderStatus\u0026quot; = 7 THEN I.\u0026quot;Caseqty\u0026quot; ELSE 0 END AS \u0026quot;Delivered_CaseQty\u0026quot;,\n  I.\u0026quot;Caseqty\u0026quot; AS \u0026quot;Invoiced_CaseQty\u0026quot;,\n  CASE WHEN D.\u0026quot;OrderStatus\u0026quot; IN (1, 2, 3, 4) THEN D.\u0026quot;CaseQty\u0026quot; ELSE 0 END AS \u0026quot;Intransit_CaseQty\u0026quot;,\n  D.\u0026quot;CaseQty\u0026quot; AS \u0026quot;ActualDeliveredCaseQty\u0026quot;,\n  \u0026quot;Source_NPSales\u0026quot;\nFROM \u0026quot;Inbound_Prep_DeliveryDates\u0026quot; AS DD\nLEFT JOIN \u0026quot;StoreList\u0026quot; AS SL\n  ON DD.\u0026quot;CustomerNumber\u0026quot; = SL.\u0026quot;DSD_CustomerNumber\u0026quot;\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.\u0026quot;ORDER\u0026quot;.\u0026quot;V_Fact_DSD_OriginalOrder\u0026quot; AS OO\n  ON DD.\u0026quot;DeliveryDate\u0026quot; = OO.\u0026quot;DeliveryDate\u0026quot;\n  AND LTRIM(DD.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(OO.\u0026quot;ItemNumber\u0026quot;, 0)\n  AND LTRIM(DD.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(OO.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND NOT OO.\u0026quot;OrderStatus\u0026quot; IN (-1, -2, 99)\n  AND OO.\u0026quot;Type\u0026quot; = \u0026#x27;O\u0026#x27;\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.DELIVERY.\u0026quot;V_Fact_DSD_Delivery\u0026quot; AS D\n  ON OO.\u0026quot;OrderNumber\u0026quot; = D.\u0026quot;OrderNumber\u0026quot;\n  AND LTRIM(OO.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(D.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND LTRIM(OO.\u0026quot;ItemNumber\u0026quot;, 0) = LTRIM(D.\u0026quot;ItemNumber\u0026quot;, 0)\n  AND OO.\u0026quot;RouteNumber\u0026quot; = D.\u0026quot;RouteNumber\u0026quot;\n  AND OO.\u0026quot;Type\u0026quot; = D.\u0026quot;Type\u0026quot;\n  AND OO.\u0026quot;OrderDate\u0026quot; = D.\u0026quot;OrderDate\u0026quot;\n  AND NOT D.\u0026quot;OrderStatus\u0026quot; IN (-1, -2, 99)\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.BILLING.\u0026quot;V_Fact_DSD_Invoice\u0026quot; AS I\n  ON OO.\u0026quot;OrderNumber\u0026quot; = I.\u0026quot;OrderNumber\u0026quot;\n  AND LTRIM(OO.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(I.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND LTRIM(OO.\u0026quot;ItemNumber\u0026quot;, 0) = LTRIM(I.\u0026quot;ItemNumber\u0026quot;, 0)\n  AND /* AND OO.\u0026quot;DeliveryDate\u0026quot; = I.\u0026quot;DeliveryDate\u0026quot; */ OO.\u0026quot;Type\u0026quot; = I.\u0026quot;Detail_InvoiceType\u0026quot;\n  AND NOT I.\u0026quot;OrderStatus\u0026quot; IN (-1, -2, 99)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  \"RetailerName\",\n  DD.\"CustomerNumber\",\n  DD.\"DSD_CustomerNumber\",\n  \"CustomerName\",\n  DD.\"MaterialNumber\",\n  DD.\"BusDate\",\n  \"ScheduledDeliveryDate\",\n  \"ActualDeliveryDate\",\n  DD.\"DeliveryDate\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  \"SingleDay_SalesQty\",\n  \"Weekly_SalesAmt\",\n  \"SingleDay_SaleAmt\",\n  \"IsPromoActivated\",\n  DD.\"IsPOG\",\n  DD.\"MaxShelfQty\",\n  OO.\"OrderNumber\",\n  OO.\"OrderDate\",\n  OO.\"CaseQty\" AS \"Ordered_CaseQty\",\n  CASE WHEN I.\"OrderStatus\" = 7 THEN I.\"Caseqty\" ELSE 0 END AS \"Delivered_CaseQty\",\n  I.\"Caseqty\" AS \"Invoiced_CaseQty\",\n  CASE WHEN D.\"OrderStatus\" IN (1, 2, 3, 4) THEN D.\"CaseQty\" ELSE 0 END AS \"Intransit_CaseQty\",\n  D.\"CaseQty\" AS \"ActualDeliveredCaseQty\",\n  \"Source_NPSales\"\nFROM \"Inbound_Prep_DeliveryDates\" AS DD\nLEFT JOIN \"StoreList\" AS SL\n  ON DD.\"CustomerNumber\" = SL.\"DSD_CustomerNumber\"\nLEFT JOIN \"\u0026{VAR_SNOWDB_SALES}\".\"ORDER\".\"V_Fact_DSD_OriginalOrder\" AS OO\n  ON DD.\"DeliveryDate\" = OO.\"DeliveryDate\"\n  AND LTRIM(DD.\"MaterialNumber\", 0) = LTRIM(OO.\"ItemNumber\", 0)\n  AND LTRIM(DD.\"CustomerNumber\", 0) = LTRIM(OO.\"CustomerNumber\", 0)\n  AND NOT OO.\"OrderStatus\" IN (-1, -2, 99)\n  AND OO.\"Type\" = \u0027O\u0027\nLEFT JOIN \"\u0026{VAR_SNOWDB_SALES}\".DELIVERY.\"V_Fact_DSD_Delivery\" AS D\n  ON OO.\"OrderNumber\" = D.\"OrderNumber\"\n  AND LTRIM(OO.\"CustomerNumber\", 0) = LTRIM(D.\"CustomerNumber\", 0)\n  AND LTRIM(OO.\"ItemNumber\", 0) = LTRIM(D.\"ItemNumber\", 0)\n  AND OO.\"RouteNumber\" = D.\"RouteNumber\"\n  AND OO.\"Type\" = D.\"Type\"\n  AND OO.\"OrderDate\" = D.\"OrderDate\"\n  AND NOT D.\"OrderStatus\" IN (-1, -2, 99)\nLEFT JOIN \"\u0026{VAR_SNOWDB_SALES}\".BILLING.\"V_Fact_DSD_Invoice\" AS I\n  ON OO.\"OrderNumber\" = I.\"OrderNumber\"\n  AND LTRIM(OO.\"CustomerNumber\", 0) = LTRIM(I.\"CustomerNumber\", 0)\n  AND LTRIM(OO.\"ItemNumber\", 0) = LTRIM(I.\"ItemNumber\", 0)\n  AND /* AND OO.\"DeliveryDate\" = I.\"DeliveryDate\" */ OO.\"Type\" = I.\"Detail_InvoiceType\"\n  AND NOT I.\"OrderStatus\" IN (-1, -2, 99)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "b mber\u0026quot;,\n    IB.\u0026quot;DSD_CustomerNumber\u0026quot;,\n    \u0026quot;CustomerName\u0026quot;,\n    IB.\u0026quot;MaterialNumber\u0026quot;,\n    IB.\u0026quot;BusDate\u0026quot;,\n    RMD.\u0026quot;DeliveryDate\u0026quot; AS \u0026quot;ScheduledDeliveryDate\u0026quot;,\n    OO.\u0026quot;DeliveryDate\u0026quot; AS \u0026quot;ActualDeliveryDate\u0026quot;,\n    COALESCE(I.\u0026quot;DeliveryDate\u0026quot;, D.\u0026quot;DeliveryDate\u0026quot;, RMD.\u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;DeliveryDate\u0026quot;,\n    \u0026quot;WeekID\u0026quot;,\n    \u0026quot;Week_Start\u0026quot;,\n    \u0026quot;Week_End\u0026quot;,\n    \u0026quot;Weekly_SalesQty\u0026quot;,\n    \u0026quot;SingleDay_SalesQty\u0026quot;,\n    \u0026quot;Weekly_SalesAmt\u0026quot;,\n    \u0026quot;SingleDay_SaleAmt\u0026quot;,\n    \u0026quot;IsPromoActivated\u0026quot;,\n    IB.\u0026quot;IsPOG\u0026quot;,\n    IB.\u0026quot;MaxShelfQty\u0026quot;,\n    \u0026quot;Source_NPSales\u0026quot;\n  FROM \u0026quot;Inbound_Prep\u0026quot; AS IB\n  LEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_WHSE_LOGISTICS}\u0026quot;.STORE_SERVICE.\u0026quot;Fact_RM_DeliverySchedule\u0026quot; AS RMD\n    ON LTRIM(IB.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(RMD.\u0026quot;CustomerNumber\u0026quot;, 0)\n    AND IB.\u0026quot;BusDate\u0026quot; = RMD.\u0026quot;DeliveryDate\u0026quot;\n  LEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.\u0026quot;ORDER\u0026quot;.\u0026quot;V_Fact_DSD_OriginalOrder\u0026quot; AS OO\n    ON LTRIM(IB.\u0026quot;DSD_CustomerNumber\u0026quot;, 0) = LTRIM(OO.\u0026quot;CustomerNumber\u0026quot;, 0)\n    AND NOT OO.\u0026quot;OrderStatus\u0026quot; IN (-1, -2, 99)\n    AND OO.\u0026quot;Type\u0026quot; = \u0026#x27;O\u0026#x27;\n    AND /* AND SLD.\u0026quot;MaterialNumber\u0026quot;=OO.\u0026quot;ItemNumber\u0026quot; */ IB.\u0026quot;BusDate\u0026quot; = OO.\u0026quot;DeliveryDate\u0026quot;\n  LEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.DELIVERY.\u0026quot;V_Fact_DSD_Delivery\u0026quot; AS D\n    ON OO.\u0026quot;OrderNumber\u0026quot; = D.\u0026quot;OrderNumber\u0026quot;\n    AND OO.\u0026quot;CustomerNumber\u0026quot; = D.\u0026quot;CustomerNumber\u0026quot;\n    AND OO.\u0026quot;ItemNumber\u0026quot; = D.\u0026quot;ItemNumber\u0026quot;\n    AND OO.\u0026quot;RouteNumber\u0026quot; = D.\u0026quot;RouteNumber\u0026quot;\n    AND OO.\u0026quot;Type\u0026quot; = D.\u0026quot;Type\u0026quot;\n    AND OO.\u0026quot;OrderDate\u0026quot; = D.\u0026quot;OrderDate\u0026quot;\n    AND NOT D.\u0026quot;OrderStatus\u0026quot; IN (-1, -2, 99)\n  LEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.BILLING.\u0026quot;V_Fact_DSD_Invoice\u0026quot; AS I\n    ON OO.\u0026quot;OrderNumber\u0026quot; = I.\u0026quot;OrderNumber\u0026quot;\n    AND OO.\u0026quot;CustomerNumber\u0026quot; = I.\u0026quot;CustomerNumber\u0026quot;\n    AND OO.\u0026quot;ItemNumber\u0026quot; = I.\u0026quot;ItemNumber\u0026quot;\n    AND /* AND OO.\u0026quot;DeliveryDate\u0026quot; = I.\u0026quot;DeliveryDate\u0026quot; */ OO.\u0026quot;Type\u0026quot; = I.\u0026quot;Detail_InvoiceType\u0026quot;\n    AND NOT I.\u0026quot;OrderStatus\u0026quot; IN (-1, -2, 99)\n)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  \"RetailerName\",\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"CustomerName\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"ScheduledDeliveryDate\",\n  \"ActualDeliveryDate\",\n  \"DeliveryDate\",\n  \"WeekID\",\n  \"Week_Start\",\n  \"Week_End\",\n  \"Weekly_SalesQty\",\n  \"SingleDay_SalesQty\",\n  \"Weekly_SalesAmt\",\n  \"SingleDay_SaleAmt\",\n  \"IsPromoActivated\",\n  \"IsPOG\",\n  \"MaxShelfQty\",\n  \"Source_NPSales\",\n  CASE\n    WHEN \"DeliveryDate\" = \"ScheduledDeliveryDate\"\n    THEN 1\n    WHEN \"DeliveryDate\" = \"ActualDeliveryDate\"\n    THEN 0\n    ELSE NULL\n  END AS \"IsScheduledDelivery\"\nFROM (\n  SELECT DISTINCT\n    \"RetailerName\",\n    IB.\"CustomerNumber\",\n    IB.\"DSD_CustomerNumber\",\n    \"CustomerName\",\n    IB.\"MaterialNumber\",\n    IB.\"BusDate\",\n    RMD.\"DeliveryDate\" AS \"ScheduledDeliveryDate\",\n    OO.\"DeliveryDate\" AS \"ActualDeliveryDate\",\n    COALESCE(I.\"DeliveryDate\", D.\"DeliveryDate\", RMD.\"DeliveryDate\") AS \"DeliveryDate\",\n    \"WeekID\",\n    \"Week_Start\",\n    \"Week_End\",\n    \"Weekly_SalesQty\",\n    \"SingleDay_SalesQty\",\n    \"Weekly_SalesAmt\",\n    \"SingleDay_SaleAmt\",\n    \"IsPromoActivated\",\n    IB.\"IsPOG\",\n    IB.\"MaxShelfQty\",\n    \"Source_NPSales\"\n  FROM \"Inbound_Prep\" AS IB\n  LEFT JOIN \"\u0026{VAR_SNOWDB_WHSE_LOGISTICS}\".STORE_SERVICE.\"Fact_RM_DeliverySchedule\" AS RMD\n    ON LTRIM(IB.\"DSD_CustomerNumber\", 0) = LTRIM(RMD.\"CustomerNumber\", 0)\n    AND IB.\"BusDate\" = RMD.\"DeliveryDate\"\n  LEFT JOIN \"\u0026{VAR_SNOWDB_SALES}\".\"ORDER\".\"V_Fact_DSD_OriginalOrder\" AS OO\n    ON LTRIM(IB.\"DSD_CustomerNumber\", 0) = LTRIM(OO.\"CustomerNumber\", 0)\n    AND NOT OO.\"OrderStatus\" IN (-1, -2, 99)\n    AND OO.\"Type\" = \u0027O\u0027\n    AND /* AND SLD.\"MaterialNumber\"=OO.\"ItemNumber\" */ IB.\"BusDate\" = OO.\"DeliveryDate\"\n  LEFT JOIN \"\u0026{VAR_SNOWDB_SALES}\".DELIVERY.\"V_Fact_DSD_Delivery\" AS D\n    ON OO.\"OrderNumber\" = D.\"OrderNumber\"\n    AND OO.\"CustomerNumber\" = D.\"CustomerNumber\"\n    AND OO.\"ItemNumber\" = D.\"ItemNumber\"\n    AND OO.\"RouteNumber\" = D.\"RouteNumber\"\n    AND OO.\"Type\" = D.\"Type\"\n    AND OO.\"OrderDate\" = D.\"OrderDate\"\n    AND NOT D.\"OrderStatus\" IN (-1, -2, 99)\n  LEFT JOIN \"\u0026{VAR_SNOWDB_SALES}\".BILLING.\"V_Fact_DSD_Invoice\" AS I\n    ON OO.\"OrderNumber\" = I.\"OrderNumber\"\n    AND OO.\"CustomerNumber\" = I.\"CustomerNumber\"\n    AND OO.\"ItemNumber\" = I.\"ItemNumber\"\n    AND /* AND OO.\"DeliveryDate\" = I.\"DeliveryDate\" */ OO.\"Type\" = I.\"Detail_InvoiceType\"\n    AND NOT I.\"OrderStatus\" IN (-1, -2, 99)\n)`)\"\n        style=\"\n
