ery date, replacing any nulls with a default date of \u0026#x27;1900-01-01\u0026#x27;. */\nSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;InvoiceDate\u0026quot;,\n  \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  \u0026quot;Promo_Demand_Qty\u0026quot;,\n  \u0026quot;ForecastDemandQty\u0026quot;,\n  \u0026quot;NextDeliveryDate\u0026quot;,\n  \u0026quot;NextToNextDeliveryDate\u0026quot;, /* * */\n  COALESCE(\n    LAST_VALUE(\u0026quot;DeliveryDate\u0026quot;) IGNORE NULLS OVER (\n      PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot;\n      ORDER BY \u0026quot;BusDate\u0026quot; ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ),\n    \u0026#x27;1900-01-01\u0026#x27;\n  ) AS \u0026quot;NewDeliveryDate\u0026quot;\nFROM \u0026quot;Cte_CummDemand_1_CurrentDate\u0026quot;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* This CTE adds a new delivery date for each customer and material combination by capturing the last available delivery date, replacing any nulls with a default date of \u00271900-01-01\u0027. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  \"EveryDay_Demand_Qty\",\n  \"Promo_Demand_Qty\",\n  \"ForecastDemandQty\",\n  \"NextDeliveryDate\",\n  \"NextToNextDeliveryDate\", /* * */\n  COALESCE(\n    LAST_VALUE(\"DeliveryDate\") IGNORE NULLS OVER (\n      PARTITION BY \"CustomerNumber\", \"MaterialNumber\"\n      ORDER BY \"BusDate\" ASC\n      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW\n    ),\n    \u00271900-01-01\u0027\n  ) AS \"NewDeliveryDate\"\nFROM \"Cte_CummDemand_1_CurrentDate\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#F59E0B", "border": "#B45309", "highlight": {"background": "#FCD34D", "border": "#B45309"}, "hover": {"background": "#FCD34D", "border": "#B45309"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_final_agg", "label": "cte_cummdemand_final_agg", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_cummdemand_final_agg\u003c/b\u003e\u003cbr\u003e\u003ci\u003eTerminal CTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_cummdemand_final_agg_2, nonmod_not90daydelivered\u003cbr\u003eUsed by  (0): \u2014\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  a.*,\n  CASE\n    WHEN \u0026quot;Last_Intransit_CaseQty\u0026quot; \u0026gt; 0\n    THEN \u0026quot;Last_Ordered_CaseQty_Inv\u0026quot; - \u0026quot;Last_Invoiced_CaseQty_Inv\u0026quot;\n    WHEN \u0026quot;Last_Intransit_CaseQty\u0026quot; = 0\n    THEN \u0026quot;Last_Ordered_CaseQty\u0026quot; - \u0026quot;Last_Invoiced_CaseQty\u0026quot;\n    ELSE 0\n  END AS \u0026quot;LastOrderedCutsCaseQty\u0026quot;,\n  CASE WHEN \u0026quot;rnk\u0026quot; = 1 AND NOT b.\u0026quot;MaterialNumber\u0026quot; IS NULL THEN 1 ELSE NULL END AS \u0026quot;ImpSuggestedOrderQty_1\u0026quot;,\n  CASE\n    WHEN \u0026quot;rnk\u0026quot; = 1\n    AND \u0026quot;AvgDemand_60day\u0026quot; \u0026lt; 1\n    AND COALESCE(\u0026quot;Last_Invoiced_CaseQty_Inv\u0026quot;, 0) \u0026gt; /* ROUND(\u0026quot;NextToNext_DlvryFcstDmndQty\u0026quot;) */ \u0026quot;Cumm_Demand_Buffer\u0026quot;\n    THEN 0\n    WHEN \u0026quot;rnk\u0026quot; = 1\n    AND \u0026quot;AvgDemand_60day\u0026quot; \u0026lt; 1\n    AND COALESCE(\u0026quot;Last_Invoiced_CaseQty_Inv\u0026quot;, 0) \u0026lt;= /* ROUND(\u0026quot;NextToNext_DlvryFcstDmndQty\u0026quot;) */ \u0026quot;Cumm_Demand_Buffer\u0026quot;\n    THEN ROUND(\u0026quot;NextToNext_DlvryFcstDmndQtyPBI\u0026quot;)\n    WHEN \u0026quot;rnk\u0026quot; = 1 AND \u0026quot;AvgDemand_60day\u0026quot; \u0026gt;= 1\n    THEN CEIL(\u0026quot;NextToNext_DlvryFcstDmndQtyPBI\u0026quot;)\n    WHEN \u0026quot;rnk\u0026quot; \u0026gt; 1\n    THEN ROUND(\u0026quot;NextToNext_DlvryFcstDmndQtyPBI\u0026quot;)\n    ELSE NULL\n  END AS \u0026quot;ImpSuggestedOrderQty_2\u0026quot;,\n  COALESCE(\u0026quot;ImpSuggestedOrderQty_1\u0026quot;, \u0026quot;ImpSuggestedOrderQty_2\u0026quot; + \u0026quot;LastOrderedCutsCaseQty\u0026quot;) AS \u0026quot;ImpSuggestedOrderQty\u0026quot;\nFROM \u0026quot;Cte_CummDemand_final_agg_2\u0026quot; AS a\nLEFT JOIN \u0026quot;NonMod_Not90DayDelivered\u0026quot; AS b\n  ON a.\u0026quot;CustomerNumber\u0026quot; = b.\u0026quot;CustomerNumber\u0026quot;\n  AND a.\u0026quot;MaterialNumber\u0026quot; = b.\u0026quot;MaterialNumber\u0026quot;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  a.*,\n  CASE\n    WHEN \"Last_Intransit_CaseQty\" \u003e 0\n    THEN \"Last_Ordered_CaseQty_Inv\" - \"Last_Invoiced_CaseQty_Inv\"\n    WHEN \"Last_Intransit_CaseQty\" = 0\n    THEN \"Last_Ordered_CaseQty\" - \"Last_Invoiced_CaseQty\"\n    ELSE 0\n  END AS \"LastOrderedCutsCaseQty\",\n  CASE WHEN \"rnk\" = 1 AND NOT b.\"MaterialNumber\" IS NULL THEN 1 ELSE NULL END AS \"ImpSuggestedOrderQty_1\",\n  CASE\n    WHEN \"rnk\" = 1\n    AND \"AvgDemand_60day\" \u003c 1\n    AND COALESCE(\"Last_Invoiced_CaseQty_Inv\", 0) \u003e /* ROUND(\"NextToNext_DlvryFcstDmndQty\") */ \"Cumm_Demand_Buffer\"\n    THEN 0\n    WHEN \"rnk\" = 1\n    AND \"AvgDemand_60day\" \u003c 1\n    AND COALESCE(\"Last_Invoiced_CaseQty_Inv\", 0) \u003c= /* ROUND(\"NextToNext_DlvryFcstDmndQty\") */ \"Cumm_Demand_Buffer\"\n    THEN ROUND(\"NextToNext_DlvryFcstDmndQtyPBI\")\n    WHEN \"rnk\" = 1 AND \"AvgDemand_60day\" \u003e= 1\n    THEN CEIL(\"NextToNext_DlvryFcstDmndQtyPBI\")\n    WHEN \"rnk\" \u003e 1\n    THEN ROUND(\"NextToNext_DlvryFcstDmndQtyPBI\")\n    ELSE NULL\n  END AS \"ImpSuggestedOrderQty_2\",\n  COALESCE(\"ImpSuggestedOrderQty_1\", \"ImpSuggestedOrderQty_2\" + \"LastOrderedCutsCaseQty\") AS \"ImpSuggestedOrderQty\"\nFROM \"Cte_CummDemand_final_agg_2\" AS a\nLEFT JOIN \"NonMod_Not90DayDelivered\" AS b\n  ON a.\"CustomerNumber\" = b.\"CustomerNumber\"\n  AND a.\"MaterialNumber\" = b.\"MaterialNumber\"`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "nonmod_not90daydelivered", "label": "nonmod_not90daydelivered", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003enonmod_not90daydelivered\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): inbound_prep_nonmod\u003cbr\u003eUsed by  (1): cte_cummdemand_final_agg\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  *\nFROM (\n  SELECT DISTINCT\n    \u0026quot;CustomerNumber\u0026quot;,\n    \u0026quot;MaterialNumber\u0026quot;,\n    MAX(\u0026quot;OrderDate\u0026quot;) AS \u0026quot;Max_OrderDate\u0026quot;\n  FROM \u0026quot;Inbound_Prep_NONMOD\u0026quot;\n  GROUP BY ALL\n)\nWHERE\n  \u0026quot;Max_OrderDate\u0026quot; \u0026lt; TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 /* 60 */\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  *\nFROM (\n  SELECT DISTINCT\n    \"CustomerNumber\",\n    \"MaterialNumber\",\n    MAX(\"OrderDate\") AS \"Max_OrderDate\"\n  FROM \"Inbound_Prep_NONMOD\"\n  GROUP BY ALL\n)\nWHERE\n  \"Max_OrderDate\" \u003c TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90 /* 60 */`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "orderrecommqty", "label": "orderrecommqty", "opacity": 1.0, "shadow": true, "shape": "box", "size": 34, "title": "\n    \u003cb\u003eorderrecommqty\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_storelist\u003cbr\u003eUsed by  (3): missedpogalerts, underorderalert, cutsalerts\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  *,\n  IFF(\n    \u0026quot;rnk_1\u0026quot; IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;rnk_1\u0026quot;)\n  ) AS \u0026quot;DeliveryRnk\u0026quot;\nFROM (\n  SELECT\n    *,\n    CASE\n      WHEN \u0026quot;DeliveryDate\u0026quot; \u0026lt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \u0026quot;DeliveryDate\u0026quot; IS NULL\n      AND NOT \u0026quot;OrderDate\u0026quot; IS NULL\n      THEN IFF(\n        \u0026quot;DeliveryDate\u0026quot; IS NULL,\n        NULL,\n        ROW_NUMBER() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;DeliveryDate\u0026quot; DESC)\n      )\n      ELSE NULL\n    END AS \u0026quot;rnk_1\u0026quot;\n  FROM (\n    SELECT DISTINCT\n      a.\u0026quot;CustomerNumber\u0026quot;,\n      a.\u0026quot;DSD_CustomerNumber\u0026quot;,\n      a.\u0026quot;MaterialNumber\u0026quot;,\n      a.\u0026quot;BusDate\u0026quot;,\n      a.\u0026quot;OrderDate\u0026quot;,\n      a.\u0026quot;DeliveryDate\u0026quot;,\n      a.\u0026quot;SuggestedOrderQty\u0026quot; AS \u0026quot;RecommendedOrderQty\u0026quot;,\n      a.\u0026quot;Ordered_CaseQty\u0026quot; AS \u0026quot;ActualOrderQty\u0026quot;,\n      (\n        a.\u0026quot;Ordered_CaseQty\u0026quot; - a.\u0026quot;Invoiced_CaseQty\u0026quot;\n      ) AS \u0026quot;WHSE_Invoice_Cut\u0026quot;\n    FROM \u0026quot;\u0026amp;{VAR_SNOWDB_DATA_PRODUCT}\u0026quot;.RETAILER_INSIGHTS.\u0026quot;Fact_CustItemOrderUDSHistory\u0026quot; AS a\n    JOIN \u0026quot;CTE_StoreList\u0026quot; AS PO\n      ON LTRIM(a.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(PO.\u0026quot;CustomerNumber\u0026quot;, 0)\n    /* added to exclude voided orders */\n    WHERE\n      NOT EXISTS(\n        SELECT\n          1\n        FROM \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.DELIVERY.\u0026quot;V_Fact_DSD_Delivery\u0026quot; AS dd\n        WHERE\n          LTRIM(a.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;) = LTRIM(dd.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;)\n          AND LTRIM(a.\u0026quot;MaterialNumber\u0026quot;, \u0026#x27;0\u0026#x27;) = LTRIM(dd.\u0026quot;ItemNumber\u0026quot;, \u0026#x27;0\u0026#x27;)\n          AND a.\u0026quot;OrderDate\u0026quot; = dd.\u0026quot;OrderDate\u0026quot;\n          AND a.\u0026quot;DeliveryDate\u0026quot; = dd.\u0026quot;DeliveryDate\u0026quot;\n          AND COALESCE(dd.\u0026quot;OrderStatus\u0026quot;, 0) IN (-1, -2, 99)\n      )\n  )\n)\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  *,\n  IFF(\n    \"rnk_1\" IS NULL,\n    NULL,\n    ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk_1\")\n  ) AS \"DeliveryRnk\"\nFROM (\n  SELECT\n    *,\n    CASE\n      WHEN \"DeliveryDate\" \u003c= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\n      AND NOT \"DeliveryDate\" IS NULL\n      AND NOT \"OrderDate\" IS NULL\n      THEN IFF(\n        \"DeliveryDate\" IS NULL,\n        NULL,\n        ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\" DESC)\n      )\n      ELSE NULL\n    END AS \"rnk_1\"\n  FROM (\n    SELECT DISTINCT\n      a.\"CustomerNumber\",\n      a.\"DSD_CustomerNumber\",\n      a.\"MaterialNumber\",\n      a.\"BusDate\",\n      a.\"OrderDate\",\n      a.\"DeliveryDate\",\n      a.\"SuggestedOrderQty\" AS \"RecommendedOrderQty\",\n      a.\"Ordered_CaseQty\" AS \"ActualOrderQty\",\n      (\n        a.\"Ordered_CaseQty\" - a.\"Invoiced_CaseQty\"\n      ) AS \"WHSE_Invoice_Cut\"\n    FROM \"\u0026{VAR_SNOWDB_DATA_PRODUCT}\".RETAILER_INSIGHTS.\"Fact_CustItemOrderUDSHistory\" AS a\n    JOIN \"CTE_StoreList\" AS PO\n      ON LTRIM(a.\"CustomerNumber\", 0) = LTRIM(PO.\"CustomerNumber\", 0)\n    /* added to exclude voided orders */\n    WHERE\n      NOT EXISTS(\n        SELECT\n          1\n        FROM \"\u0026{VAR_SNOWDB_SALES}\".DELIVERY.\"V_Fact_DSD_Delivery\" AS dd\n        WHERE\n          LTRIM(a.\"CustomerNumber\", \u00270\u0027) = LTRIM(dd.\"CustomerNumber\", \u00270\u0027)\n          AND LTRIM(a.\"MaterialNumber\", \u00270\u0027) = LTRIM(dd.\"ItemNumber\", \u00270\u0027)\n          AND a.\"OrderDate\" = dd.\"OrderDate\"\n          AND a.\"DeliveryDate\" = dd.\"DeliveryDate\"\n          AND COALESCE(dd.\"OrderStatus\", 0) IN (-1, -2, 99)\n      )\n  )\n)`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_1_currentdate", "label": "cte_cummdemand_1_currentdate", "opacity": 1.0, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003ecte_cummdemand_1_currentdate\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (1): final_data\u003cbr\u003eUsed by  (1): cte_cummdemand_2_currentdate\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003e/* This CTE extracts cumulative demand data, including daily and promotional quantities, along with forecasted demand and the next two delivery dates for each customer and material combination. */\nSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;BusDate\u0026quot;,\n  \u0026quot;OrderDate\u0026quot;,\n  \u0026quot;DeliveryDate\u0026quot;,\n  \u0026quot;InvoiceDate\u0026quot;,\n  COALESCE(\u0026quot;EveryDay_Demand_Qty\u0026quot;, 0) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  COALESCE(\u0026quot;Promo_Demand_Qty\u0026quot;, 0) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n  COALESCE(\u0026quot;Forecast_Demand_Qty\u0026quot;, 0) AS \u0026quot;ForecastDemandQty\u0026quot;,\n  LEAD(\u0026quot;DeliveryDate\u0026quot;, 1) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;NextDeliveryDate\u0026quot;,\n  LEAD(\u0026quot;DeliveryDate\u0026quot;, 2) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;NextToNextDeliveryDate\u0026quot;\nFROM \u0026quot;final_data\u0026quot;\nWHERE\n  \u0026quot;BusDate\u0026quot; \u0026gt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* This CTE extracts cumulative demand data, including daily and promotional quantities, along with forecasted demand and the next two delivery dates for each customer and material combination. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"BusDate\",\n  \"OrderDate\",\n  \"DeliveryDate\",\n  \"InvoiceDate\",\n  COALESCE(\"EveryDay_Demand_Qty\", 0) AS \"EveryDay_Demand_Qty\",\n  COALESCE(\"Promo_Demand_Qty\", 0) AS \"Promo_Demand_Qty\",\n  COALESCE(\"Forecast_Demand_Qty\", 0) AS \"ForecastDemandQty\",\n  LEAD(\"DeliveryDate\", 1) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\") AS \"NextDeliveryDate\",\n  LEAD(\"DeliveryDate\", 2) OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"DeliveryDate\") AS \"NextToNextDeliveryDate\"\nFROM \"final_data\"\nWHERE\n  \"BusDate\" \u003e= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ))`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#10B981", "border": "#047857", "highlight": {"background": "#34D399", "border": "#047857"}, "hover": {"background": "#34D399", "border": "#047857"}}, "font": {"color": "#1E293B"}, "id": "inbound_prep_nonmod", "label": "inbound_prep_nonmod", "opacity": 1.0, "shadow": true, "shape": "box", "size": 34, "title": "\n    \u003cb\u003einbound_prep_nonmod\u003c/b\u003e\u003cbr\u003e\u003ci\u003eCTE\u003c/i\u003e\u003cbr\u003eDepends on (2): cte_pb_bottlers, cte_storelist\u003cbr\u003eUsed by  (2): nonmod_not90daydelivered, inbound_prep\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  SP.\u0026quot;CustomerNumber\u0026quot;,\n  SP.\u0026quot;MaterialNumber\u0026quot;,\n  SP.\u0026quot;BusDate\u0026quot;,\n  SP.\u0026quot;OrderDate\u0026quot;,\n  SP.\u0026quot;DeliveryDate\u0026quot;,\n  SP.\u0026quot;InvoiceDate\u0026quot;,\n  SUM(COALESCE(\u0026quot;Intransit_CaseQty\u0026quot;, 0)) AS \u0026quot;Intransit_CaseQty\u0026quot;,\n  SUM(COALESCE(\u0026quot;Ordered_CaseQty\u0026quot;, 0)) AS \u0026quot;Ordered_CaseQty\u0026quot;,\n  SUM(COALESCE(\u0026quot;Delivered_CaseQty\u0026quot;, 0)) AS \u0026quot;Delivered_CaseQty\u0026quot;,\n  SUM(COALESCE(\u0026quot;Invoiced_CaseQty\u0026quot;, 0)) AS \u0026quot;Invoiced_CaseQty\u0026quot;\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderShpmnt_ML_Inbound\u0026quot; AS SP\nINNER JOIN \u0026quot;CTE_StoreList\u0026quot; AS UDS\n  ON LTRIM(SP.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(UDS.\u0026quot;DSD_CustomerNumber\u0026quot;, 0)\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMMERCIALS.\u0026quot;V_Dim_Prod\u0026quot; AS DP\n  ON LTRIM(SP.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(DP.\u0026quot;SAPMaterialID\u0026quot;, 0)\nLEFT JOIN \u0026quot;Cte_PB_Bottlers\u0026quot; AS PB\n  ON LTRIM(UDS.\u0026quot;CustomerNumber\u0026quot;, 0) = PB.\u0026quot;CustomerNumber\u0026quot;\n  AND DP.\u0026quot;TradeMarkID\u0026quot; = PB.\u0026quot;TradeMarkID\u0026quot;\nWHERE\n  \u0026quot;IsPB\u0026quot; = 1\n  AND (SP.\u0026quot;CustomerNumber\u0026quot;, SP.\u0026quot;MaterialNumber\u0026quot;) IN (\n    SELECT DISTINCT\n      \u0026quot;CustomerNumber\u0026quot;,\n      \u0026quot;MaterialNumber\u0026quot;\n    FROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderShpmnt_ML_Inbound\u0026quot;\n    WHERE\n      \u0026quot;OrderDate\u0026quot; \u0026gt;= TO_DATE(CAST(CONVERT_TIMEZONE(\u0026#x27;UTC\u0026#x27;, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90\n  )\nGROUP BY ALL\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  SP.\"CustomerNumber\",\n  SP.\"MaterialNumber\",\n  SP.\"BusDate\",\n  SP.\"OrderDate\",\n  SP.\"DeliveryDate\",\n  SP.\"InvoiceDate\",\n  SUM(COALESCE(\"Intransit_CaseQty\", 0)) AS \"Intransit_CaseQty\",\n  SUM(COALESCE(\"Ordered_CaseQty\", 0)) AS \"Ordered_CaseQty\",\n  SUM(COALESCE(\"Delivered_CaseQty\", 0)) AS \"Delivered_CaseQty\",\n  SUM(COALESCE(\"Invoiced_CaseQty\", 0)) AS \"Invoiced_CaseQty\"\nFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\" AS SP\nINNER JOIN \"CTE_StoreList\" AS UDS\n  ON LTRIM(SP.\"CustomerNumber\", 0) = LTRIM(UDS.\"DSD_CustomerNumber\", 0)\nLEFT JOIN \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS DP\n  ON LTRIM(SP.\"MaterialNumber\", 0) = LTRIM(DP.\"SAPMaterialID\", 0)\nLEFT JOIN \"Cte_PB_Bottlers\" AS PB\n  ON LTRIM(UDS.\"CustomerNumber\", 0) = PB.\"CustomerNumber\"\n  AND DP.\"TradeMarkID\" = PB.\"TradeMarkID\"\nWHERE\n  \"IsPB\" = 1\n  AND (SP.\"CustomerNumber\", SP.\"MaterialNumber\") IN (\n    SELECT DISTINCT\n      \"CustomerNumber\",\n      \"MaterialNumber\"\n    FROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderShpmnt_ML_Inbound\"\n    WHERE\n      \"OrderDate\" \u003e= TO_DATE(CAST(CONVERT_TIMEZONE(\u0027UTC\u0027, CURRENT_TIMESTAMP()) AS TIMESTAMPNTZ)) - 90\n  )\nGROUP BY ALL`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cte_cummdemand_5", "label": "cte_cummdemand_5", "opacity": 0.3, "shadow": true, "shape": "box", "size": 25, "title": "\n    \u003cb\u003ecte_cummdemand_5\u003c/b\u003e\u003cbr\u003e\u003ci\u003eTerminal CTE\u003c/i\u003e\u003cbr\u003eDepends on (1): cte_cummdemand_4\u003cbr\u003eUsed by  (0): \u2014\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003e/* This CTE calculates cumulative sums of daily, promotional, and forecast demand quantities by customer, material, and delivery rank, enabling analysis of total demand over time. */\nSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  \u0026quot;rnk1\u0026quot;,\n  SUM(\u0026quot;EveryDay_Demand_Qty\u0026quot;) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;rnk1\u0026quot;) AS \u0026quot;EveryDay_Demand_Qty\u0026quot;,\n  SUM(\u0026quot;Promo_Demand_Qty\u0026quot;) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;rnk1\u0026quot;) AS \u0026quot;Promo_Demand_Qty\u0026quot;,\n  SUM(\u0026quot;ForecastDemandQty\u0026quot;) OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;rnk1\u0026quot;) AS \u0026quot;ForecastDemandQty\u0026quot;\nFROM \u0026quot;Cte_CummDemand_4\u0026quot; AS a\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* This CTE calculates cumulative sums of daily, promotional, and forecast demand quantities by customer, material, and delivery rank, enabling analysis of total demand over time. */\nSELECT\n  \"CustomerNumber\",\n  \"MaterialNumber\",\n  \"rnk1\",\n  SUM(\"EveryDay_Demand_Qty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"EveryDay_Demand_Qty\",\n  SUM(\"Promo_Demand_Qty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"Promo_Demand_Qty\",\n  SUM(\"ForecastDemandQty\") OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"rnk1\") AS \"ForecastDemandQty\"\nFROM \"Cte_CummDemand_4\" AS a`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#F59E0B", "border": "#B45309", "highlight": {"background": "#FCD34D", "border": "#B45309"}, "hover": {"background": "#FCD34D", "border": "#B45309"}}, "font": {"color": "#1E293B"}, "id": "missedpogalerts", "label": "missedpogalerts", "opacity": 1.0, "shadow": true, "shape": "box", "size": 25, "title": "\n    \u003cb\u003emissedpogalerts\u003c/b\u003e\u003cbr\u003e\u003ci\u003eTerminal CTE\u003c/i\u003e\u003cbr\u003eDepends on (1): orderrecommqty\u003cbr\u003eUsed by  (0): \u2014\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  a.*,\n  b.\u0026quot;DeliveryDate\u0026quot; AS \u0026quot;SchDeliveryDate\u0026quot;,\n  CASE\n    WHEN \u0026quot;RecommendedOrderQty\u0026quot; \u0026gt; 0 AND \u0026quot;ActualOrderQty\u0026quot; = 0\n    THEN \u0026#x27;203\u0026#x27;\n    ELSE \u0026#x27;999\u0026#x27;\n  END AS \u0026quot;AlertID\u0026quot;,\n  CASE\n    WHEN \u0026quot;RecommendedOrderQty\u0026quot; \u0026gt; 0 AND \u0026quot;ActualOrderQty\u0026quot; = 0\n    THEN \u0026quot;RecommendedOrderQty\u0026quot;\n    ELSE NULL\n  END AS \u0026quot;ImpSuggestedOrderQty_upd_MissingItem\u0026quot;\nFROM (\n  SELECT\n    *,\n    DENSE_RANK() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot; ORDER BY \u0026quot;rnk_2\u0026quot;) AS \u0026quot;rnk3\u0026quot; /* row_number() over(partition by \u0026quot;CustomerNumber\u0026quot;,\u0026quot;MaterialNumber\u0026quot; order by \u0026quot;rnk\u0026quot; ) \u0026quot;rnk1\u0026quot; */\n  FROM (\n    SELECT\n      *,\n      CASE\n        WHEN NOT \u0026quot;OrderDate\u0026quot; IS NULL\n        THEN ROW_NUMBER() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot;, \u0026quot;MaterialNumber\u0026quot; ORDER BY \u0026quot;OrderDate\u0026quot; DESC)\n      END AS \u0026quot;rnk\u0026quot;,\n      CASE\n        WHEN NOT \u0026quot;OrderDate\u0026quot; IS NULL\n        THEN DENSE_RANK() OVER (PARTITION BY \u0026quot;CustomerNumber\u0026quot; ORDER BY \u0026quot;OrderDate\u0026quot; DESC)\n      END AS \u0026quot;rnk_2\u0026quot;\n    FROM \u0026quot;OrderRecommQty\u0026quot; AS a\n    WHERE\n      NOT EXISTS(\n        SELECT\n          1\n        FROM \u0026quot;\u0026amp;{VAR_SNOWDB_SALES}\u0026quot;.DELIVERY.\u0026quot;V_Fact_DSD_Delivery\u0026quot; AS dd /* Ref #1 */\n        WHERE\n          LTRIM(a.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;) = LTRIM(dd.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;)\n          AND LTRIM(a.\u0026quot;MaterialNumber\u0026quot;, \u0026#x27;0\u0026#x27;) = LTRIM(dd.\u0026quot;ItemNumber\u0026quot;, \u0026#x27;0\u0026#x27;)\n          AND a.\u0026quot;OrderDate\u0026quot; = dd.\u0026quot;OrderDate\u0026quot;\n          AND a.\u0026quot;DeliveryDate\u0026quot; = dd.\u0026quot;DeliveryDate\u0026quot;\n          AND COALESCE(dd.\u0026quot;OrderStatus\u0026quot;, 0) IN (-1, -2, 99)\n      )\n  )\n) AS a\nLEFT JOIN \u0026quot;\u0026amp;{VAR_SNOWDB_WHSE_LOGISTICS}\u0026quot;.STORE_SERVICE.\u0026quot;Fact_RM_DeliverySchedule\u0026quot; AS b\n  ON LTRIM(a.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(b.\u0026quot;CustomerNumber\u0026quot;, 0)\nWHERE\n  \u0026quot;rnk3\u0026quot; = 1 AND \u0026quot;SchDeliveryDate\u0026quot; \u0026gt; CURRENT_DATE\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  a.*,\n  b.\"DeliveryDate\" AS \"SchDeliveryDate\",\n  CASE\n    WHEN \"RecommendedOrderQty\" \u003e 0 AND \"ActualOrderQty\" = 0\n    THEN \u0027203\u0027\n    ELSE \u0027999\u0027\n  END AS \"AlertID\",\n  CASE\n    WHEN \"RecommendedOrderQty\" \u003e 0 AND \"ActualOrderQty\" = 0\n    THEN \"RecommendedOrderQty\"\n    ELSE NULL\n  END AS \"ImpSuggestedOrderQty_upd_MissingItem\"\nFROM (\n  SELECT\n    *,\n    DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"rnk_2\") AS \"rnk3\" /* row_number() over(partition by \"CustomerNumber\",\"MaterialNumber\" order by \"rnk\" ) \"rnk1\" */\n  FROM (\n    SELECT\n      *,\n      CASE\n        WHEN NOT \"OrderDate\" IS NULL\n        THEN ROW_NUMBER() OVER (PARTITION BY \"CustomerNumber\", \"MaterialNumber\" ORDER BY \"OrderDate\" DESC)\n      END AS \"rnk\",\n      CASE\n        WHEN NOT \"OrderDate\" IS NULL\n        THEN DENSE_RANK() OVER (PARTITION BY \"CustomerNumber\" ORDER BY \"OrderDate\" DESC)\n      END AS \"rnk_2\"\n    FROM \"OrderRecommQty\" AS a\n    WHERE\n      NOT EXISTS(\n        SELECT\n          1\n        FROM \"\u0026{VAR_SNOWDB_SALES}\".DELIVERY.\"V_Fact_DSD_Delivery\" AS dd /* Ref #1 */\n        WHERE\n          LTRIM(a.\"CustomerNumber\", \u00270\u0027) = LTRIM(dd.\"CustomerNumber\", \u00270\u0027)\n          AND LTRIM(a.\"MaterialNumber\", \u00270\u0027) = LTRIM(dd.\"ItemNumber\", \u00270\u0027)\n          AND a.\"OrderDate\" = dd.\"OrderDate\"\n          AND a.\"DeliveryDate\" = dd.\"DeliveryDate\"\n          AND COALESCE(dd.\"OrderStatus\", 0) IN (-1, -2, 99)\n      )\n  )\n) AS a\nLEFT JOIN \"\u0026{VAR_SNOWDB_WHSE_LOGISTICS}\".STORE_SERVICE.\"Fact_RM_DeliverySchedule\" AS b\n  ON LTRIM(a.\"CustomerNumber\", 0) = LTRIM(b.\"CustomerNumber\", 0)\nWHERE\n  \"rnk3\" = 1 AND \"SchDeliveryDate\" \u003e CURRENT_DATE`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "underorderalert", "label": "underorderalert", "opacity": 0.3, "shadow": true, "shape": "box", "size": 28, "title": "\n    \u003cb\u003eunderorderalert\u003c/b\u003e\u003cbr\u003e\u003ci\u003eTerminal CTE\u003c/i\u003e\u003cbr\u003eDepends on (2): orderrecommqty, prevwknbr\u003cbr\u003eUsed by  (0): \u2014\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT\n  \u0026quot;CustomerNumber\u0026quot;,\n  \u0026quot;DSD_CustomerNumber\u0026quot;,\n  \u0026quot;MaterialNumber\u0026quot;,\n  b.\u0026quot;WeekRnk\u0026quot;,\n  SUM(\u0026quot;ActualOrderQty\u0026quot;) AS \u0026quot;ActualOrderQty\u0026quot;,\n  SUM(\u0026quot;RecommendedOrderQty\u0026quot;) AS \u0026quot;RecommendedOrderQty\u0026quot;,\n  IFF(\n    100 = 0 AND NOT (\n      SUM(\u0026quot;RecommendedOrderQty\u0026quot;) * 70\n    ) IS NULL,\n    0,\n    (\n      SUM(\u0026quot;RecommendedOrderQty\u0026quot;) * 70\n    ) / 100\n  ) AS \u0026quot;ThresholdReccomPerc\u0026quot;,\n  CASE\n    WHEN (\n      \u0026quot;WeekRnk\u0026quot; IN (2, 3, 4)\n      AND SUM(\u0026quot;ActualOrderQty\u0026quot;) \u0026lt; IFF(\n        100 = 0 AND NOT (\n          SUM(\u0026quot;RecommendedOrderQty\u0026quot;) * 70\n        ) IS NULL,\n        0,\n        (\n          SUM(\u0026quot;RecommendedOrderQty\u0026quot;) * 70\n        ) / 100\n      )\n    )\n    THEN 1\n    ELSE 0\n  END AS \u0026quot;Flag1\u0026quot;,\n  CASE\n    WHEN (\n      \u0026quot;WeekRnk\u0026quot; IN (1) AND SUM(\u0026quot;RecommendedOrderQty\u0026quot;) \u0026gt; 0\n    )\n    THEN 1\n    ELSE 0\n  END AS \u0026quot;Flag2\u0026quot;,\n  CASE WHEN \u0026quot;Flag1\u0026quot; = 1 AND \u0026quot;Flag2\u0026quot; = 1 THEN \u0026#x27;201\u0026#x27; ELSE \u0026#x27;999\u0026#x27; END AS \u0026quot;AlertID\u0026quot;\nFROM \u0026quot;OrderRecommQty\u0026quot; AS a\nLEFT JOIN \u0026quot;PrevWkNbr\u0026quot; AS b\n  ON a.\u0026quot;BusDate\u0026quot; = b.\u0026quot;DayDate\u0026quot;\n/* where \u0026quot;CustomerNumber\u0026quot;=\u0026#x27;0012593095\u0026#x27; and \u0026quot;MaterialNumber\u0026quot;=\u0026#x27;20028240\u0026#x27; */ /* where \u0026quot;WeekRnk\u0026quot; in (2,3,4) */\nGROUP BY ALL\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT\n  \"CustomerNumber\",\n  \"DSD_CustomerNumber\",\n  \"MaterialNumber\",\n  b.\"WeekRnk\",\n  SUM(\"ActualOrderQty\") AS \"ActualOrderQty\",\n  SUM(\"RecommendedOrderQty\") AS \"RecommendedOrderQty\",\n  IFF(\n    100 = 0 AND NOT (\n      SUM(\"RecommendedOrderQty\") * 70\n    ) IS NULL,\n    0,\n    (\n      SUM(\"RecommendedOrderQty\") * 70\n    ) / 100\n  ) AS \"ThresholdReccomPerc\",\n  CASE\n    WHEN (\n      \"WeekRnk\" IN (2, 3, 4)\n      AND SUM(\"ActualOrderQty\") \u003c IFF(\n        100 = 0 AND NOT (\n          SUM(\"RecommendedOrderQty\") * 70\n        ) IS NULL,\n        0,\n        (\n          SUM(\"RecommendedOrderQty\") * 70\n        ) / 100\n      )\n    )\n    THEN 1\n    ELSE 0\n  END AS \"Flag1\",\n  CASE\n    WHEN (\n      \"WeekRnk\" IN (1) AND SUM(\"RecommendedOrderQty\") \u003e 0\n    )\n    THEN 1\n    ELSE 0\n  END AS \"Flag2\",\n  CASE WHEN \"Flag1\" = 1 AND \"Flag2\" = 1 THEN \u0027201\u0027 ELSE \u0027999\u0027 END AS \"AlertID\"\nFROM \"OrderRecommQty\" AS a\nLEFT JOIN \"PrevWkNbr\" AS b\n  ON a.\"BusDate\" = b.\"DayDate\"\n/* where \"CustomerNumber\"=\u00270012593095\u0027 and \"MaterialNumber\"=\u002720028240\u0027 */ /* where \"WeekRnk\" in (2,3,4) */\nGROUP BY ALL`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cma_trademark", "label": "cma_trademark", "opacity": 0.3, "shadow": true, "shape": "box", "size": 22, "title": "\n    \u003cb\u003ecma_trademark\u003c/b\u003e\u003cbr\u003e\u003ci\u003eTerminal CTE\u003c/i\u003e\u003cbr\u003eDepends on (0): \u2014\u003cbr\u003eUsed by  (0): \u2014\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003e/* -only ghost trademark for CMA as confirmed by houston on 28th Jan */\nSELECT\n  CMA.*\nFROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMML_SALES.\u0026quot;Fact_PerfectOrderUDS_CMA\u0026quot; AS CMA\nJOIN \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.COMMERCIALS.\u0026quot;V_Dim_Prod\u0026quot; AS dp\n  ON LTRIM(CMA.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(dp.\u0026quot;SAPMaterialID\u0026quot;, 0)\nINNER JOIN (\n  SELECT DISTINCT\n    \u0026quot;AccountID\u0026quot;\n  FROM \u0026quot;\u0026amp;{VAR_SNOWDB_SOLUTIONS}\u0026quot;.commercials.\u0026quot;V_Dim_Account\u0026quot;\n  WHERE\n    \u0026quot;NationalChainName\u0026quot; = \u0026#x27;ALL OTHER\u0026#x27;\n    AND \u0026quot;ChannelDesc\u0026quot; = \u0026#x27;INDEPEND CONVENIENCE\u0026#x27;\n    AND \u0026quot;BranchID\u0026quot; IN (\u0026#x27;1080\u0026#x27;, \u0026#x27;1009\u0026#x27;, \u0026#x27;1103\u0026#x27;, \u0026#x27;1225\u0026#x27;)\n) AS DA /* -Ref #1 */\n  ON LTRIM(CMA.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(DA.\u0026quot;AccountID\u0026quot;, 0) /* Ref #1 */\nWHERE\n  dp.\u0026quot;TradeMarkID\u0026quot; = \u0026#x27;G28\u0026#x27;\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`/* -only ghost trademark for CMA as confirmed by houston on 28th Jan */\nSELECT\n  CMA.*\nFROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMML_SALES.\"Fact_PerfectOrderUDS_CMA\" AS CMA\nJOIN \"\u0026{VAR_SNOWDB_SOLUTIONS}\".COMMERCIALS.\"V_Dim_Prod\" AS dp\n  ON LTRIM(CMA.\"MaterialNumber\", 0) = LTRIM(dp.\"SAPMaterialID\", 0)\nINNER JOIN (\n  SELECT DISTINCT\n    \"AccountID\"\n  FROM \"\u0026{VAR_SNOWDB_SOLUTIONS}\".commercials.\"V_Dim_Account\"\n  WHERE\n    \"NationalChainName\" = \u0027ALL OTHER\u0027\n    AND \"ChannelDesc\" = \u0027INDEPEND CONVENIENCE\u0027\n    AND \"BranchID\" IN (\u00271080\u0027, \u00271009\u0027, \u00271103\u0027, \u00271225\u0027)\n) AS DA /* -Ref #1 */\n  ON LTRIM(CMA.\"CustomerNumber\", 0) = LTRIM(DA.\"AccountID\", 0) /* Ref #1 */\nWHERE\n  dp.\"TradeMarkID\" = \u0027G28\u0027`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}, {"borderWidth": 2, "borderWidthSelected": 3, "color": {"background": "#E2E8F0", "border": "#CBD5E1", "highlight": {"background": "#F1F5F9", "border": "#CBD5E1"}, "hover": {"background": "#F1F5F9", "border": "#CBD5E1"}}, "font": {"color": "#1E293B"}, "id": "cutsalerts", "label": "cutsalerts", "opacity": 0.3, "shadow": true, "shape": "box", "size": 25, "title": "\n    \u003cb\u003ecutsalerts\u003c/b\u003e\u003cbr\u003e\u003ci\u003eTerminal CTE\u003c/i\u003e\u003cbr\u003eDepends on (1): orderrecommqty\u003cbr\u003eUsed by  (0): \u2014\n    \u003cbr\u003e\u003cbr\u003e\n    \u003cb\u003eSQL:\u003c/b\u003e\u003cbr\u003e\n    \u003cpre style=\"\n        max-width:600px;\n        white-space:pre-wrap;\n        font-size:11px;\n        background:#0f172a;\n        color:#e2e8f0;\n        padding:10px;\n        border-radius:6px;\n    \"\u003eSELECT DISTINCT\n  a.\u0026quot;CustomerNumber\u0026quot;,\n  a.\u0026quot;MaterialNumber\u0026quot;,\n  a.\u0026quot;DeliveryDate_Cnt\u0026quot;,\n  a.\u0026quot;WH_DeliveryDate_Cnt\u0026quot;,\n  a.\u0026quot;CutRate\u0026quot;, /* ,\u0026quot;DeliveryRnk\u0026quot;,\u0026quot;DeliveryDate\u0026quot; */\n  \u0026quot;WHSE_Invoice_Cut\u0026quot;,\n  CASE\n    WHEN (\n      \u0026quot;CutRate\u0026quot; \u0026gt;= 50\n    ) OR (\n      \u0026quot;DeliveryRnk\u0026quot; = 1 AND \u0026quot;WHSE_Invoice_Cut\u0026quot; \u0026gt; 0\n    )\n    THEN \u0026#x27;202\u0026#x27;\n    ELSE \u0026#x27;999\u0026#x27;\n  END AS \u0026quot;AlertID\u0026quot;\nFROM (\n  SELECT\n    a.\u0026quot;CustomerNumber\u0026quot;,\n    a.\u0026quot;MaterialNumber\u0026quot;,\n    COUNT(DISTINCT a.\u0026quot;DeliveryDate\u0026quot;) AS \u0026quot;DeliveryDate_Cnt\u0026quot;,\n    COUNT(DISTINCT CASE WHEN \u0026quot;WHSE_Invoice_Cut\u0026quot; \u0026gt; 0 THEN a.\u0026quot;DeliveryDate\u0026quot; END) AS \u0026quot;WH_DeliveryDate_Cnt\u0026quot;,\n    IFF(\n      \u0026quot;DeliveryDate_Cnt\u0026quot; = 0 AND NOT \u0026quot;WH_DeliveryDate_Cnt\u0026quot; IS NULL,\n      0,\n      \u0026quot;WH_DeliveryDate_Cnt\u0026quot; / \u0026quot;DeliveryDate_Cnt\u0026quot;\n    ) * 100 AS \u0026quot;CutRate\u0026quot;\n  FROM \u0026quot;OrderRecommQty\u0026quot; AS a\n  WHERE\n    NOT EXISTS(\n      SELECT\n        1\n      FROM SALES_PROD.DELIVERY.\u0026quot;V_Fact_DSD_Delivery\u0026quot; AS dd\n      WHERE\n        LTRIM(a.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;) = LTRIM(dd.\u0026quot;CustomerNumber\u0026quot;, \u0026#x27;0\u0026#x27;)\n        AND LTRIM(a.\u0026quot;MaterialNumber\u0026quot;, \u0026#x27;0\u0026#x27;) = LTRIM(dd.\u0026quot;ItemNumber\u0026quot;, \u0026#x27;0\u0026#x27;)\n        AND a.\u0026quot;OrderDate\u0026quot; = dd.\u0026quot;OrderDate\u0026quot;\n        AND a.\u0026quot;DeliveryDate\u0026quot; = dd.\u0026quot;DeliveryDate\u0026quot;\n        AND COALESCE(dd.\u0026quot;OrderStatus\u0026quot;, 0) IN (-1, -2, 99)\n    )\n    AND a.\u0026quot;OrderDate\u0026quot; BETWEEN CURRENT_DATE - 30 AND CURRENT_DATE\n  GROUP BY ALL\n) AS a\nJOIN \u0026quot;OrderRecommQty\u0026quot; AS b\n  ON LTRIM(a.\u0026quot;CustomerNumber\u0026quot;, 0) = LTRIM(b.\u0026quot;CustomerNumber\u0026quot;, 0)\n  AND LTRIM(a.\u0026quot;MaterialNumber\u0026quot;, 0) = LTRIM(b.\u0026quot;MaterialNumber\u0026quot;, 0)\nWHERE\n  \u0026quot;DeliveryRnk\u0026quot; = 1\u003c/pre\u003e\n\n    \u003cbutton onclick=\"navigator.clipboard.writeText(`SELECT DISTINCT\n  a.\"CustomerNumber\",\n  a.\"MaterialNumber\",\n  a.\"DeliveryDate_Cnt\",\n  a.\"WH_DeliveryDate_Cnt\",\n  a.\"CutRate\", /* ,\"DeliveryRnk\",\"DeliveryDate\" */\n  \"WHSE_Invoice_Cut\",\n  CASE\n    WHEN (\n      \"CutRate\" \u003e= 50\n    ) OR (\n      \"DeliveryRnk\" = 1 AND \"WHSE_Invoice_Cut\" \u003e 0\n    )\n    THEN \u0027202\u0027\n    ELSE \u0027999\u0027\n  END AS \"AlertID\"\nFROM (\n  SELECT\n    a.\"CustomerNumber\",\n    a.\"MaterialNumber\",\n    COUNT(DISTINCT a.\"DeliveryDate\") AS \"DeliveryDate_Cnt\",\n    COUNT(DISTINCT CASE WHEN \"WHSE_Invoice_Cut\" \u003e 0 THEN a.\"DeliveryDate\" END) AS \"WH_DeliveryDate_Cnt\",\n    IFF(\n      \"DeliveryDate_Cnt\" = 0 AND NOT \"WH_DeliveryDate_Cnt\" IS NULL,\n      0,\n      \"WH_DeliveryDate_Cnt\" / \"DeliveryDate_Cnt\"\n    ) * 100 AS \"CutRate\"\n  FROM \"OrderRecommQty\" AS a\n  WHERE\n    NOT EXISTS(\n      SELECT\n        1\n      FROM SALES_PROD.DELIVERY.\"V_Fact_DSD_Delivery\" AS dd\n      WHERE\n        LTRIM(a.\"CustomerNumber\", \u00270\u0027) = LTRIM(dd.\"CustomerNumber\", \u00270\u0027)\n        AND LTRIM(a.\"MaterialNumber\", \u00270\u0027) = LTRIM(dd.\"ItemNumber\", \u00270\u0027)\n        AND a.\"OrderDate\" = dd.\"OrderDate\"\n        AND a.\"DeliveryDate\" = dd.\"DeliveryDate\"\n        AND COALESCE(dd.\"OrderStatus\", 0) IN (-1, -2, 99)\n    )\n    AND a.\"OrderDate\" BETWEEN CURRENT_DATE - 30 AND CURRENT_DATE\n  GROUP BY ALL\n) AS a\nJOIN \"OrderRecommQty\" AS b\n  ON LTRIM(a.\"CustomerNumber\", 0) = LTRIM(b.\"CustomerNumber\", 0)\n  AND LTRIM(a.\"MaterialNumber\", 0) = LTRIM(b.\"MaterialNumber\", 0)\nWHERE\n  \"DeliveryRnk\" = 1`)\"\n        style=\"\n            margin-top:6px;\n            padding:4px 8px;\n            font-size:11px;\n            background:#2563eb;\n            color:white;\n            border:none;\n            border-radius:4px;\n            cursor:pointer;\n        \"\u003e\n        \ud83d\udccb Copy SQL\n    \u003c/button\u003e\n    "}]);
